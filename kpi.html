<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wilson's Pet Food — Operations KPI Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
const KPI_QS=new URLSearchParams(location.search);
const KPI_TOKEN=KPI_QS.get('token')||'';
const KPI_SHARED=!!KPI_TOKEN;
const KPI_DISPLAY=KPI_QS.has('display');
const KPI_MINI=KPI_QS.has('mini');
if(KPI_MINI)document.documentElement.classList.add('mini');
const KPI_EMBED=KPI_QS.has('embed')||KPI_DISPLAY;
if(KPI_EMBED)document.documentElement.classList.add('embed');
if(KPI_DISPLAY)document.documentElement.classList.add('display');
let KPI_CAPS={settings:true,input:true};
</script>

<style>

  :root{
    --bg:#0f1419; --panel:#1a2128; --panel2:#222b34; --border:#2d3742;
    --text:#e7eef5; --muted:#8a99a8; --accent:#f37d89; --accent2:#fbbac1;
    --green:#22c55e; --amber:#f59e0b; --red:#ef4444; --grey:#64748b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;line-height:1.4}
  header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;background:linear-gradient(180deg,#1a2128 0%,#0f1419 100%)}
  h1{margin:0;font-size:20px;font-weight:600;letter-spacing:-0.01em}
  h1 .sub{color:var(--muted);font-weight:400;font-size:14px;margin-left:8px}

  .brand{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand-logo{height:44px;width:auto;display:block}
  .brand .sub{color:var(--muted);font-size:14px;font-weight:400;letter-spacing:.01em;border-left:1px solid var(--border);padding-left:14px;line-height:1.2}
  .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .toggle{display:inline-flex;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:3px}
  .toggle button{background:transparent;border:0;color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
  .toggle button.active{background:var(--accent);color:white}
  select{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;cursor:pointer}
  .filters{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;background:var(--panel)}
  .chip{background:var(--panel2);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:999px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
  .chip:hover{color:var(--text)}
  .chip.active{background:var(--accent);color:white;border-color:var(--accent)}
  main{padding:24px 28px}
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:24px}
  .summary .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .summary .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .summary .val{font-size:22px;font-weight:600;margin-top:4px}
  .summary .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative;overflow:hidden}
  .kpi:hover{border-color:#3a4856;transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,.25)}
  .kpi .strip{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--grey)}
  .kpi.green .strip{background:var(--green)}
  .kpi.amber .strip{background:var(--amber)}
  .kpi.red .strip{background:var(--red)}
  .kpi .group{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:6px}
  .kpi .badge{font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(78,161,255,.15);color:var(--accent2);text-transform:none;letter-spacing:0;font-weight:600}
  .kpi .name{font-size:14px;font-weight:600;margin-top:4px;margin-bottom:10px}
  .kpi .row{display:flex;justify-content:space-between;align-items:flex-end;gap:10px}
  .kpi .actual{font-size:26px;font-weight:700;letter-spacing:-0.01em}
  .kpi .actual.pos{color:var(--red)}
  .kpi .actual.neg{color:var(--green)}
  .kpi .target{font-size:12px;color:var(--muted)}
  .kpi .delta{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;margin-top:6px}
  .kpi .delta.green{background:rgba(34,197,94,.15);color:var(--green)}
  .kpi .delta.amber{background:rgba(245,158,11,.15);color:var(--amber)}
  .kpi .delta.red{background:rgba(239,68,68,.15);color:var(--red)}
  .kpi .delta.grey{background:rgba(100,116,139,.15);color:var(--grey)}
  .kpi .note{font-size:10px;color:var(--accent2);margin-top:6px;font-style:italic}
  .kpi canvas{margin-top:10px;height:50px!important;width:100%!important;display:block}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal.open{display:flex}
  .modal-body{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:900px;width:100%;max-height:90vh;overflow:auto}
  .modal-body h2{margin:0 0 4px 0;font-size:18px}
  .modal-body .desc{color:var(--muted);font-size:13px;margin-bottom:16px}
  .modal-body canvas{width:100%!important;height:380px!important}
  .modal-close{float:right;background:transparent;border:0;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;margin-top:-4px}
  .empty{padding:30px;text-align:center;color:var(--muted)}
  footer{padding:18px 28px;border-top:1px solid var(--border);color:var(--muted);font-size:12px}


  .tabs{display:inline-flex;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:3px}
  .tabs button{background:transparent;border:0;color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
  .tabs button.active{background:var(--accent);color:#fff}
  .btn{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 12px;font-size:13px;cursor:pointer;font-weight:500}
  .btn:hover{border-color:#3a4856}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .status{font-size:12px;color:var(--muted)}
  #settingsView{padding:24px 28px;max-width:1000px}
  .setblock{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px}
  .setblock h3{margin:0 0 4px 0;font-size:15px}
  .setblock p.help{margin:0 0 14px 0;color:var(--muted);font-size:12px}
  .rate-row,.tg-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  .rate-row input,.tg-row input{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:13px}
  .rate-row input[type=date]{width:150px}.rate-row input.rate{width:90px}
  .tg-row label{flex:1;min-width:230px;font-size:13px}
  .tg-row .uom{color:var(--muted);font-size:11px;width:46px}
  .site-h{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent2);margin:14px 0 6px}
  .setgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:6px 24px}
  .cat-h{grid-column:1/-1;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:12px 0 2px;border-top:1px solid var(--border);padding-top:10px}
  .setbar{position:sticky;top:0;background:var(--bg);padding:8px 0 14px;display:flex;gap:10px;z-index:2}
  .linkbtn{background:transparent;border:0;color:var(--accent);cursor:pointer;font-size:12px;padding:2px 6px}


  .kpi .gctl{display:flex;gap:7px;align-items:center}
  .kpi .grip{cursor:move;color:var(--muted);opacity:.45;font-size:12px;letter-spacing:-1px}
  .kpi:hover .grip{opacity:.9}
  .kpi .hidebtn{cursor:pointer;color:var(--muted);opacity:0;font-size:12px;font-weight:700;line-height:1}
  .kpi:hover .hidebtn{opacity:.6}
  .kpi .hidebtn:hover{opacity:1;color:var(--red)}
  .kpi.dragging{opacity:.35}
  .kpi.dragover{border-color:var(--accent);box-shadow:0 0 0 2px rgba(243,125,137,.35)}
  .vis-row{font-size:13px;display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer}
  .vis-row input{accent-color:var(--accent);width:15px;height:15px}
  .budget-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  .budget-row input{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:13px}
  .budget-row input[type=date]{width:150px}.budget-row input.budget{width:110px}
  .repbar{display:flex;gap:10px;align-items:center;padding:12px 16px;flex-wrap:wrap}
  .repbar input[type=date]{padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--panel2);color:var(--text)}
  .reppage{background:#fff;color:#143644;max-width:860px;margin:0 auto 30px;padding:28px 34px;border-radius:10px}
  .rephead{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #f37d89;padding-bottom:10px;margin-bottom:14px}
  .reppage h2{margin:0;color:#143644}.repsub{color:#5b6f7a;margin-top:2px}
  .repbrand{font-weight:700;color:#f37d89}
  .repcols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .reppage h3{margin:14px 0 6px;color:#143644;font-size:15px;border-bottom:1px solid #e5e0d2;padding-bottom:3px}
  table.rep{width:100%;border-collapse:collapse;font-size:13.5px}
  table.rep td{padding:4px 6px;border-bottom:1px solid #f0ece0;color:#143644}
  table.rep td.num{text-align:right;font-weight:600}
  table.rep td.num.pos{color:#2e8b6f}table.rep td.num.neg{color:#c0563b}
  table.rep .reason{font-weight:400;color:#5b6f7a;font-style:italic}
  .repfoot{margin-top:18px;color:#8895a3;font-size:11px;text-align:center}
  @media print{ body *{visibility:hidden} .reppage,.reppage *{visibility:visible} .reppage{position:absolute;left:0;top:0;width:100%;max-width:none;border-radius:0} .noprint{display:none!important} }
</style>
<style id="wilsonsTheme">
@font-face{font-family:'Bobby Jones';src:url('/assets/BobbyJones-Regular.otf') format('opentype');font-weight:400;font-display:swap}
@font-face{font-family:'Effra';src:url('/assets/Effra_Rg.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'Effra';src:url('/assets/Effra_Md.ttf') format('truetype');font-weight:500;font-display:swap}
@font-face{font-family:'Effra';src:url('/assets/Effra_Bd.ttf') format('truetype');font-weight:700;font-display:swap}
:root{
  --bg:#f7f4ec; --panel:#ffffff; --panel2:#f1eee4; --border:#e2ddcd;
  --text:#143644; --muted:#7a8a94; --accent:#f37d89; --accent2:#e2606c;
  --green:#2e8b6f; --amber:#e0a13f; --red:#c0563b; --grey:#8a99a8;
}
html,body{font-family:'Effra',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
header{background:transparent;border-bottom:1px solid var(--border);padding:16px 26px}
.brand-logo{display:none}
.brand .sub{border-left:0;padding-left:0;font-family:'Bobby Jones','Effra',sans-serif;font-size:20px;color:var(--text);text-transform:uppercase;letter-spacing:.03em}
.tabs,.toggle{background:#fff;border:1px solid var(--border);border-radius:20px}
.tabs button,.toggle button{font-family:'Bobby Jones','Effra',sans-serif;text-transform:uppercase;font-size:12px;letter-spacing:.04em;border-radius:16px;color:var(--muted)}
.tabs button.active,.toggle button.active{background:var(--accent);color:var(--text)}
.chip{background:#fff;border-color:var(--border)}
.chip.active{background:var(--accent);color:var(--text);border-color:var(--accent);font-weight:700}
.filters{background:transparent;border-bottom:0;padding-top:12px}
select{background:#fff;border-color:var(--border);border-radius:8px;color:var(--text)}
.btn{background:#fff;border-color:var(--border);border-radius:10px;color:var(--text)}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--text);font-weight:700}
.summary .card{border-radius:16px;border-color:#eee9db;box-shadow:0 1px 4px rgba(20,54,68,.08);border:0}
.summary .val{font-family:'Bobby Jones','Effra',sans-serif;font-weight:400;font-size:24px}
.kpi{border-radius:16px;border:0;box-shadow:0 1px 4px rgba(20,54,68,.08)}
.kpi:hover{border:0;box-shadow:0 6px 18px rgba(20,54,68,.14)}
.kpi .name{font-size:14px}
.kpi .actual{font-family:'Bobby Jones','Effra',sans-serif;font-weight:400;font-size:24px}
.kpi .delta.green{background:rgba(46,139,111,.12)}
.kpi .delta.amber{background:rgba(224,161,63,.14)}
.kpi .delta.red{background:rgba(192,86,59,.12)}
.kpi .badge{background:rgba(243,125,137,.16);color:var(--accent2)}
.modal{background:rgba(20,54,68,.5)}
.modal-body{border-radius:16px;border:0;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-body h2{font-family:'Bobby Jones','Effra',sans-serif;font-weight:400;text-transform:uppercase}
.setblock{border-radius:16px;border-color:#eee9db;box-shadow:0 1px 4px rgba(20,54,68,.08);border:0}
.setblock h3{font-family:'Bobby Jones','Effra',sans-serif;font-weight:400;text-transform:uppercase;font-size:14px}
input[type=number],input[type=date],input[type=text]{background:#fff;color:var(--text);border:1px solid var(--border);border-radius:8px}
footer{border-top:1px solid var(--border)}
/* embedded in Wilsons HQ: the app supplies the page title */
html.embed header{padding:10px 4px 8px}
html.embed .brand{display:none}
html.embed main{padding:16px 4px}
html.embed .filters{padding-left:4px;padding-right:4px}
html.embed #settingsView{padding:16px 4px}
html.embed footer{display:none}
/* mini mode: a condensed strip of chosen KPI cards for the home screen */
html.mini body{background:transparent}
html.mini header,html.mini .filters,html.mini #summary,html.mini #grid,html.mini footer,html.mini #settingsView,html.mini .empty,html.mini .modal{display:none!important}
html.mini main{padding:0}
#miniStrip{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:2px}
.minicard{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(20,54,68,.08);padding:10px 14px;cursor:pointer;border-top:3px solid var(--grey)}
.minicard:hover{box-shadow:0 4px 12px rgba(20,54,68,.14)}
.minicard.green{border-top-color:var(--green)}
.minicard.amber{border-top-color:var(--amber)}
.minicard.red{border-top-color:var(--red)}
.minicard .mn{font-size:10.5px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.minicard .mv{font-family:'Bobby Jones','Effra',sans-serif;font-size:20px;color:var(--text);margin-top:2px;line-height:1.1}
.minicard .mv.pos{color:var(--red)} .minicard .mv.neg{color:var(--green)}
.minicard .mt{font-size:10.5px;color:var(--muted);margin-top:2px}
/* display mode: wall screen — dashboard only, nothing clickable needed */
html.display .tabs,html.display #uploadBtn,html.display #fullscreenBtn,html.display footer{display:none!important}
html.display header{padding:14px 22px}
html.display .brand{display:flex}
html.display .brand .sub{font-size:22px}
html.display main{padding:18px 22px}
#displayOverlay{position:fixed;inset:0;background:rgba(20,54,68,.85);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:#fff;font-family:'Effra',sans-serif}
#displayOverlay button{background:var(--accent);color:#143644;border:0;border-radius:24px;padding:16px 34px;font-size:18px;font-weight:700;cursor:pointer;font-family:'Bobby Jones','Effra',sans-serif;text-transform:uppercase;letter-spacing:.04em}
#displayOverlay p{margin:0;color:#c8d2d8;font-size:14px}
.syncnote{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:16px;background:#e7f2ec;color:#2e8b6f;white-space:nowrap}
.syncnote.off{background:#f7dcd9;color:#b4231f}
</style>
</head>

  const recAyr = sumA(recOf(volAyr,"ayrFill","ayr"), recOf(volAyr,"ayrCook","ayr"), recOf(volDespA,"despatch","despatch"));
  const recBlair = sumA(recOf(volCP,"cpProduce","blair"), recOf(volDespB,"cpDespatch","blair"));
  /* labour recovery variance = recovered − spent (positive = the day paid for itself) */
  const spentAyrAll = sumA(sA, sD);                                  // Ayr areas incl. despatch
  const rvA = recAyr.map((r,i)=> (r==null||spentAyrAll[i]==null)?null: round(r-spentAyrAll[i]));
  const rvB = recBlair.map((r,i)=> (r==null||sB[i]==null)?null: round(r-sB[i]));
  const rvT = sumA(rvA, rvB);
  /* volume vs target: a per-day target typed/auto-filled on the input screen wins;
     otherwise the default daily targets from Settings (weekday / friday) */
  const tgtDef = site => RAW.dates.map(iso=>{ const wd=new Date(iso+"T00:00:00").getDay(); const t=(SETTINGS.voltargets||{})[site]; if(!t) return null; return (wd===5||wd===0||wd===6) ? (t.friday!=null?t.friday:t.weekday) : (t.weekday!=null?t.weekday:null); });
  const tgtAyr = numArr("Volume Target Ayr (kg)").map((v,i)=> v!=null?v:tgtDef("ayr")[i]);
  const tgtBlair = numArr("Volume Target Blair (kg)").map((v,i)=> v!=null?v:tgtDef("blair")[i]);
  const vvA = volAyr.map((v,i)=> (v==null||tgtAyr[i]==null)?null: round(v-tgtAyr[i]));
  const vvB = volCP.map((v,i)=> (v==null||tgtBlair[i]==null)?null: round(v-tgtBlair[i]));
  const budArr = site => RAW.dates.map(iso=> budgetFor(site, iso));
  const bB=budArr("blair"), bA=budArr("ayr"), bD=budArr("despatch"), bT=sumA(bB,bA,bD);
  const vOf=(s,b)=> s.map((x,i)=> (x==null||b[i]==null)?null: round(x-b[i]));
  const vB=vOf(sB,bB), vA=vOf(sA,bA), vD=vOf(sD,bD), vT=sumA(vB,vA,vD);
  const addA=(a,b)=> a.map((x,i)=>{ const vs=[x,b[i]].filter(z=>z!=null); return vs.length?round(vs.reduce((s,z)=>s+z,0)):null; });
  const worked = hB.map((b,i)=>{ const vs=[b,hA[i],hD[i],hBD2[i]].filter(z=>z!=null); return vs.length?vs.reduce((s,z)=>s+z,0):null; });
  const denom = i => { const vs=[worked[i],G("Absence Hours")[i],G("Holiday Hours")[i]].filter(z=>z!=null); return vs.length?vs.reduce((s,z)=>s+z,0):null; };
  const pct=(num,den)=> (num==null||den==null||den===0)?null: round(num/den,4);
  const absRate = G("Absence Hours").map((ab,i)=> pct(ab, denom(i)));
  const holUse  = G("Holiday Hours").map((ho,i)=> pct(ho, denom(i)));
  const rejPct  = G("Fresh/Cooked Rejects (kg)").map((rj,i)=> pct(rj, G("Fresh/Cooked Produced (kg)")[i]));
  const computed = {
    "Accidents":G("Accidents"), "Riddors":G("Riddors"), "Near Miss Incidents":G("Near Miss Incidents"),
    "Customer Complaints":addA(G("D2C Complaints"),G("Trade Complaints")), "D2C Complaints":G("D2C Complaints"), "Trade Complaints":G("Trade Complaints"),
    "Total Labour Spend":sT, "Cold Press Labour \u00a3/kg":divA(sB,G("Cold Pressed Produced (kg)")),
    "Fresh/Cooked Labour \u00a3/kg":divA(sA,G("Fresh/Cooked Produced (kg)")), "Despatch Labour \u00a3/kg":divA(sD,G("Despatched Internally (kg)")),
    "Cold Pressed Produced":G("Cold Pressed Produced (kg)"), "Fresh/Cooked Produced":G("Fresh/Cooked Produced (kg)"),
    "Total Despatched":addA(G("Despatched Internally (kg)"),G("Despatched 3PL (kg)")), "Fresh/Cooked Rejects %":rejPct,
    "Training Hours Completed":G("Training Hours"), "Absenteeism Rate":absRate, "Holiday Usage":holUse,
    "Orders Late >24hrs (DC2)":G("Orders Late >24hrs (DC2)"), "Orders Late >48hrs (Trade)":G("Orders Late >48hrs (Trade)"),
    "Trade Sales (Indep/Multis)":G("Trade Sales \u00a3 (Indep/Multis)"), "New Customers":G("New Customers"),
    "Active Customer Orders":G("Active Customer Orders"), "Prospects Called":G("Prospects Called"), "Current Customers Called":G("Current Customers Called"),
    "Labour Spend Blair":sB, "Labour Spend Ayr":sA, "Labour Spend Despatch":sD,
    "Labour Variance Blair":vB, "Labour Variance Ayr":vA, "Labour Variance Despatch":vD, "Labour Variance Total":vT,
    "Recovered Labour Ayr":recAyr, "Recovered Labour Blair":recBlair,
    "Labour Recovery Ayr":rvA, "Labour Recovery Blair":rvB, "Labour Recovery Total":rvT,
    "Volume Variance Ayr":vvA, "Volume Variance Blair":vvB
  };
  /* everything the daily/weekly report needs, in one place */
  REPORT = { dates:RAW.dates, volAyr, volCP, tgtAyr, tgtBlair, vvA, vvB,
    recAyr, recBlair, spentAyr:spentAyrAll, spentBlair:sB, rvA, rvB,
    acc:G("Accidents"), rid:G("Riddors"), nm:G("Near Miss Incidents"),
    reAyrVol:G("Reason — Ayr volume"), reBlairVol:G("Reason — Blair volume"),
    reAyrLab:G("Reason — Ayr labour"), reBlairLab:G("Reason — Blair labour"),
    oos:G("Out of stocks (what & why)"), notes:G("Daily notes") };
  const budgets = {"Labour Spend Blair":bB,"Labour Spend Ayr":bA,"Labour Spend Despatch":bD,"Total Labour Spend":bT};
  const kpis = KPI_META.map(m => {
    const actual = computed[m.name] || constArr(null);
    let target;
    if (m.kind==="variance") target = constArr(0);
    else if (budgets[m.name]) target = budgets[m.name];
    else { target = RAW.dates.map(iso=>{ const tv = targetFor(m.name, iso); return tv==null?0:tv; }); }
    return {group:m.group,name:m.name,uom:m.uom,agg:m.agg,kind:m.kind,direction:m.direction,actual,target};
  });
  DATA = {dates:RAW.dates, kpis};
  PERIODS = buildPeriods();
}

// ---------- spreadsheet parsing ----------
const norm = s => s==null ? "" : String(s).trim().replace(/\s+/g," ").toLowerCase();
function numv(v){ if(v===null||v===undefined||v==="") return null; const n=Number(v); if(Number.isNaN(n)) return null; return n%1?round(n,4):n; }
function isoOf(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
const DIRECT_MAP = {
 "Accidents":"accidents","Riddors":"riddors","Near Miss Incidents":"near miss incidents",
 "Customer Complaints":"customer complaints","D2C Complaints":"d2c complaints","Trade Complaints":"trade complaints",
 "Cold Pressed Produced":"cold pressed produced","Fresh/Cooked Produced":"fresh/ cooked produced","Total Despatched":"total despatched kg",
 "Training Hours Completed":"training hours completed","Absenteeism Rate":"absenteeism rate","Holiday Usage":"holiday usage",
 "Orders Late >24hrs (DC2)":"number of orders over 24hrs dc2","Orders Late >48hrs (Trade)":"number of orders over 48hrs trade",
 "Trade Sales (Indep/Multis)":"trade sales independents/ multis(net of vat)","New Customers":"new customers",
 "Active Customer Orders":"active customers orders","Prospects Called":"number of prospects called",
 "Current Customers Called":"number of current customers called"
};
function parseWorkbook(buf){
  const wb = XLSX.read(buf, {type:"array", cellDates:true});
  const ws = wb.Sheets["Daily Input"] || wb.Sheets[wb.SheetNames[0]];
  if (!ws) throw new Error('Sheet "Daily Input" not found in this workbook.');
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true});
  const header = rows[0] || [];
  const colOf = {};
  header.forEach((hh,c)=>{ if (hh!=null) colOf[String(hh).trim()] = c; });
  const dateCol = ("Date" in colOf) ? colOf["Date"] : 0;
  const dates=[], ridx=[];
  for (let r=1; r<rows.length; r++){ const row=rows[r]; if(!row) continue; const dv=row[dateCol];
    if (dv instanceof Date){ dates.push(isoOf(dv)); ridx.push(r); } }
  if (!dates.length) throw new Error("No dated rows found in the Daily Input sheet.");
  const FIELDS = ["Accidents","Riddors","Near Miss Incidents","D2C Complaints","Trade Complaints",
    "Labour Hours Blair","Labour Hours Ayr","Labour Hours Despatch",
    "Cold Pressed Produced (kg)","Fresh/Cooked Produced (kg)","Fresh/Cooked Rejects (kg)",
    "Despatched Internally (kg)","Despatched 3PL (kg)","Training Hours","Holiday Hours","Absence Hours",
    "Orders Late >24hrs (DC2)","Orders Late >48hrs (Trade)","Trade Sales \u00a3 (Indep/Multis)",
    "New Customers","Active Customer Orders","Prospects Called","Current Customers Called"];
  const inp={};
  FIELDS.forEach(f=>{ const c=colOf[f]; inp[f]= ridx.map(r=> c==null?null: numv((rows[r]||[])[c])); });
  return {dates, in:inp};
}

// ---------- rendering (dashboard) ----------
let REPORT=null;
const state = { freq: "month", period: null, group: "All" };
let dragName = null, wasDragged = false, dashStale = false;
function orderIndex(name){ const i = SETTINGS.order.indexOf(name); return i<0 ? 9999 : i; }
function displayedKpis(){
  return DATA.kpis
    .filter(k => (state.group==="All" || k.group===state.group) && SETTINGS.visible[k.name] !== false)
    .sort((a,b)=> orderIndex(a.name) - orderIndex(b.name));
}
function reorderKpi(from, to){
  if (!from || from===to) return;
  const o = SETTINGS.order;
  const fi = o.indexOf(from); if (fi>-1) o.splice(fi,1);
  const ti = o.indexOf(to); o.splice(ti<0 ? o.length : ti, 0, from);
  persistSettings(); render();
}
function renderPeriodSelect() {
  const sel = document.getElementById("periodSelect"); sel.innerHTML = "";
  PERIODS[state.freq].forEach(p => { const o=document.createElement("option"); o.value=p.key; o.textContent=p.label; sel.appendChild(o); });
  const periods = PERIODS[state.freq];
  let defaultIdx = periods.length - 1;
  for (let i = periods.length-1; i >= 0; i--) {
    const hasData = DATA.kpis.some(k => periods[i].idx.some(j => { const v=k.actual[j]; return v!==null && v!==0; }));
    if (hasData) { defaultIdx = i; break; }
  }
  if (state.period && periods.find(p=>p.key===state.period)) sel.value = state.period;
  else { state.period = periods[defaultIdx].key; sel.value = state.period; }
}
function renderFilters() {
  const groups = ["All", ...new Set(DATA.kpis.map(k=>k.group))];
  const f = document.getElementById("filters"); f.innerHTML = "";
  groups.forEach(g => {
    const c = document.createElement("button");
    c.className = "chip" + (g===state.group?" active":"");
    c.textContent = g + (g==="All"?"":` (${DATA.kpis.filter(k=>k.group===g).length})`);
    c.onclick = () => { state.group = g; render(); };
    f.appendChild(c);
  });
}
function getPeriod() { return PERIODS[state.freq].find(p => p.key === state.period); }
function renderSummary() {
  const period = getPeriod();
  const visible = displayedKpis();
  const ragCounts = { green:0, amber:0, red:0, grey:0 };
  visible.forEach(k => { ragCounts[rag(aggregate(k.actual,period.idx,k.agg), aggregate(k.target,period.idx,k.agg), k.direction, k.kind)]++; });
  document.getElementById("summary").innerHTML = `
    <div class="card"><div class="label">Period</div><div class="val">${period.label}</div><div class="sub">${period.idx.length} day${period.idx.length===1?"":"s"}</div></div>
    <div class="card" style="border-color:rgba(34,197,94,.4)"><div class="label">On Track</div><div class="val" style="color:var(--green)">${ragCounts.green}</div><div class="sub">at or beating target</div></div>
    <div class="card" style="border-color:rgba(245,158,11,.4)"><div class="label">Watch</div><div class="val" style="color:var(--amber)">${ragCounts.amber}</div><div class="sub">slightly off target</div></div>
    <div class="card" style="border-color:rgba(239,68,68,.4)"><div class="label">Off Track</div><div class="val" style="color:var(--red)">${ragCounts.red}</div><div class="sub">missing target</div></div>
    <div class="card"><div class="label">No Target / Data</div><div class="val" style="color:var(--grey)">${ragCounts.grey}</div><div class="sub">cannot evaluate</div></div>`;
}
function renderGrid() {
  const period = getPeriod(); const periods = (state.freq==="year" ? PERIODS.month : PERIODS[state.freq]);
  const grid = document.getElementById("grid"); grid.innerHTML = "";
  const visible = displayedKpis();
  document.getElementById("empty").style.display = visible.length ? "none" : "block";
  visible.forEach((k, idx) => {
    const a = aggregate(k.actual, period.idx, k.agg), t = aggregate(k.target, period.idx, k.agg);
    const status = rag(a, t, k.direction, k.kind), dpct = deltaPct(a, t);
    const card = document.createElement("div"); card.className = "kpi " + status;
    card.setAttribute("draggable","true"); card.dataset.name = k.name;
    const isVar = k.kind === "variance";
    const actualClass = isVar && a !== null ? (a > 0 ? "pos" : a < 0 ? "neg" : "") : "";
    const actualHtml = isVar
      ? `<div class="actual ${actualClass}">${fmt(a, k.uom, {signed:true})}</div><div class="target">${a===null?"":(a>0?"over budget":a<0?"under budget":"on budget")}</div>`
      : `<div class="actual">${fmt(a, k.uom)}</div><div class="target">vs target ${fmt(t, k.uom)}</div>`;
    card.innerHTML = `
      <div class="strip"></div>
      <div class="group"><span>${k.group}</span><span class="gctl">${isVar?'<span class="badge">VARIANCE</span>':''}<span class="grip" title="Drag to reorder">⣿</span><span class="hidebtn" title="Hide this KPI">✕</span></span></div>
      <div class="name">${k.name}</div>
      <div class="row"><div>${actualHtml}</div>${(!isVar && dpct !== null) ? `<span class="delta ${status}">${dpct>0?"+":""}${dpct.toFixed(0)}%</span>` : ''}</div>
      <canvas id="spark-${idx}"></canvas>`;
    card.onclick = () => { if (wasDragged) return; openDetail(k); };
    card.querySelector(".hidebtn").onclick = (e) => { e.stopPropagation(); SETTINGS.visible[k.name] = false; persistSettings(); render(); };
    card.addEventListener("dragstart", (e) => { dragName = k.name; card.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; });
    card.addEventListener("dragend", () => { card.classList.remove("dragging"); document.querySelectorAll(".kpi").forEach(c=>c.classList.remove("dragover")); wasDragged = true; setTimeout(()=> wasDragged = false, 60); });
    card.addEventListener("dragover", (e) => { e.preventDefault(); card.classList.add("dragover"); });
    card.addEventListener("dragleave", () => card.classList.remove("dragover"));
    card.addEventListener("drop", (e) => { e.preventDefault(); card.classList.remove("dragover"); reorderKpi(dragName, k.name); });
    grid.appendChild(card);
    const trend = periods.map(p => aggregate(k.actual, p.idx, k.agg));
    new Chart(card.querySelector(`#spark-${idx}`), {
      type:"line",
      data:{ labels: periods.map(p=>p.key), datasets:[{ data:trend, borderColor:isVar?"#f59e0b":"#f37d89",
        backgroundColor:isVar?"rgba(245,158,11,.12)":"rgba(243,125,137,.15)", borderWidth:1.5, pointRadius:0, fill:true, tension:.3, spanGaps:true }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{enabled:false}}, scales:{x:{display:false},y:{display:false}}, animation:false }
    });
  });
}
const charts = {};
function openDetail(k) {
  const periods = (state.freq==="year" ? PERIODS.month : PERIODS[state.freq]);
  document.getElementById("modalTitle").textContent = k.name;
  const isVar = k.kind === "variance";
  const desc = `${k.group} · UoM: ${k.uom} · ${k.agg==="sum"?"Summed":"Averaged"} from daily data` +
    (isVar ? " · Variance: positive = over budget, negative = under budget" : ` · Higher is ${k.direction==="higher"?"better":"worse"}`);
  document.getElementById("modalDesc").textContent = desc;
  const labels = periods.map(p => p.label);
  const actuals = periods.map(p => aggregate(k.actual, p.idx, k.agg));
  const targets = periods.map(p => aggregate(k.target, p.idx, k.agg));
  if (charts.modal) charts.modal.destroy();
  const datasets = isVar
    ? [{ type:"bar", label:"Variance £", data:actuals, backgroundColor: actuals.map(v=> v===null?"#64748b":v>0?"#ef4444":"#22c55e"), borderRadius:4 }]
    : [{ type:"bar", label:"Actual", data:actuals, backgroundColor:"#f37d89", borderRadius:4 },
       { type:"line", label:"Target", data:targets, borderColor:"#f59e0b", backgroundColor:"#f59e0b", borderWidth:2, pointRadius:3, tension:.2, fill:false, spanGaps:true }];
  charts.modal = new Chart(document.getElementById("modalChart"), {
    type:"bar", data:{ labels, datasets },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:"#143644"}}},
      scales:{ x:{ticks:{color:"#8a99a8",maxRotation:60,minRotation:0,autoSkip:true,maxTicksLimit:14},grid:{color:"#e2ddcd"}}, y:{ticks:{color:"#8a99a8"},grid:{color:"#e2ddcd"}} } }
  });
  document.getElementById("modal").classList.add("open");
}

  const skip = new Set(["Labour Spend Blair","Labour Spend Ayr","Labour Spend Despatch","Total Labour Spend"]);
  html += `<div class="setblock"><h3>KPI targets</h3>
    <p class="help">Set the <b>per-day</b> target for each KPI (for rates/percentages this is simply the target level). Totals over a week/month scale automatically. Press <b>+ change from a date\u2026</b> to set a new target from a chosen day \u2014 earlier days keep the old target, so the change shows honestly in the trend. Labour spend targets come from the budget columns in the spreadsheet, and variances are measured against £0.</p>
    <div class="setgrid">`;
  let lastCat = "";
  KPI_META.forEach(m=>{
    if (m.kind==="variance" || skip.has(m.name)) return;
    if (m.group !== lastCat){ html += `<div class="cat-h">${m.group}</div>`; lastCat = m.group; }
    const isPct = m.uom==="%";
    const uomLabel = isPct? "%": m.uom;
    const entries = targetEntries(m.name);
    const multi = entries.length>1;
    html += `<div class="tg-row" data-tgname="${m.name.replace(/"/g,'&quot;')}"><label>${m.name}</label><span class="uom">${uomLabel}</span><span style="display:flex;flex-direction:column;gap:4px;align-items:flex-start">`;
    entries.forEach((e,i)=>{
      const val = (e.value==null||e.value==="")?"":(isPct? round(+e.value*100,4): e.value);
      html += `<span style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">`+
        (multi?`<span style="font-size:11px;color:var(--muted)">from</span><input type="date" class="tgfrom" value="${e.from}" style="width:135px">`:``)+
        `<input type="number" step="any" class="tgval" value="${val}" style="width:110px">`+
        (multi?`<button class="linkbtn" data-tgremove="${i}">remove</button>`:``)+
      `</span>`;
    });
    html += `<button class="linkbtn" data-tgadd="1" title="Set a new target from a chosen date — earlier days keep the old target">+ change from a date…</button></span></div>`;
  });
  html += `</div></div>`;

  html += `<div class="setblock"><h3>Show / hide KPIs</h3>
    <p class="help">Tick the KPIs you want on the dashboard. You can also drag any card on the dashboard to reorder it, or click the ✕ on a card to hide it.</p>
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <button class="btn" id="showAll">Show all</button><button class="btn" id="hideAll">Hide all</button></div>
    <div class="setgrid">`;
  lastCat = "";
  KPI_META.forEach(m=>{
    if (m.group !== lastCat){ html += `<div class="cat-h">${m.group}</div>`; lastCat = m.group; }
    const ch = SETTINGS.visible[m.name] !== false ? "checked" : "";
    html += `<label class="vis-row"><input type="checkbox" data-name="${m.name.replace(/"/g,'&quot;')}" ${ch}>${m.name}</label>`;
  });
  html += `</div></div>`;

  v.innerHTML = html;

  v.querySelectorAll(".vis-row input").forEach(cb=> cb.onchange = ()=>{
    SETTINGS.visible[cb.getAttribute("data-name")] = cb.checked; persistSettings(); dashStale = true;
  });
  document.getElementById("showAll").onclick = ()=>{ KPI_META.forEach(m=> SETTINGS.visible[m.name]=true); persistSettings(); dashStale=true; renderSettings(); };
  document.getElementById("hideAll").onclick = ()=>{ KPI_META.forEach(m=> SETTINGS.visible[m.name]=false); persistSettings(); dashStale=true; renderSettings(); };

  v.querySelectorAll("[data-add]").forEach(b=> b.onclick = ()=>{
    const site=b.getAttribute("data-add");
  v.querySelectorAll("[data-stdadd]").forEach(b=> b.onclick=()=>{ const k=b.dataset.stdadd; SETTINGS.standards=SETTINGS.standards||{}; (SETTINGS.standards[k]=SETTINGS.standards[k]||[]).push({from:new Date().toISOString().slice(0,10),kgh:0}); renderSettings(); });
    SETTINGS.rates = readRates();           // capture current edits for all sites
    SETTINGS.rates[site].push({from:"2026-06-01",rate:16.8});
    renderSettings();
  });
  v.querySelectorAll("[data-remove]").forEach(b=> b.onclick = ()=>{
    const [site,i]=b.getAttribute("data-remove").split("|");
    SETTINGS.rates = readRates();           // capture current edits for all sites
    SETTINGS.rates[site].splice(+i,1); renderSettings();
  });
  v.querySelectorAll("[data-badd]").forEach(b=> b.onclick = ()=>{
    const site=b.getAttribute("data-badd");
    SETTINGS.budgets = readBudgets();
    SETTINGS.budgets[site].push({from:"2026-06-01",budget:0});
    renderSettings();
  });
  v.querySelectorAll("[data-bremove]").forEach(b=> b.onclick = ()=>{
    const [site,i]=b.getAttribute("data-bremove").split("|");
    SETTINGS.budgets = readBudgets();
    SETTINGS.budgets[site].splice(+i,1); renderSettings();
  });
  v.querySelectorAll("[data-tgadd]").forEach(b=> b.onclick = ()=>{
    SETTINGS.targets = readTargets();
    const name=b.closest('.tg-row').getAttribute('data-tgname');
    const es=targetEntries(name); const last=es[es.length-1];
    es.push({from:new Date().toISOString().slice(0,10), value:(last?last.value:null)});
    SETTINGS.targets[name]=es;
    renderSettings();
  });
  v.querySelectorAll("[data-tgremove]").forEach(b=> b.onclick = ()=>{
    SETTINGS.targets = readTargets();
    const name=b.closest('.tg-row').getAttribute('data-tgname');
    const i=+b.getAttribute('data-tgremove');
    const es=targetEntries(name); es.splice(i,1);
    SETTINGS.targets[name]= es.length===1 ? es[0].value : es;
    renderSettings();
  });
  document.getElementById("saveSettings").onclick = saveSettings;
  document.getElementById("resetSettings").onclick = ()=>{ SETTINGS=JSON.parse(JSON.stringify(SETTINGS_DEFAULT)); persistSettings(); dashStale=true; renderSettings(); setStatus("Reset to defaults."); };
}
function rateRowHtml(site,i,e){
  return `<div class="rate-row" data-site="${site}" data-i="${i}">
    <span class="status">from</span>
    <input type="date" class="from" value="${e.from}">
    <span class="status">£</span>
    <input type="number" step="0.01" class="rate" value="${e.rate}">
    <button class="linkbtn" data-remove="${site}|${i}">remove</button></div>`;
}
function budgetRowHtml(site,i,e){
  return `<div class="budget-row" data-bsite="${site}" data-i="${i}">
    <span class="status">from</span>
    <input type="date" class="bfrom" value="${e.from}">
    <span class="status">\u00a3/day</span>
    <input type="number" step="1" class="budget" value="${e.budget}">
    <button class="linkbtn" data-bremove="${site}|${i}">remove</button></div>`;
}
function readRates(filterSite){
  // read all rate rows from DOM into a per-site structure; returns array for filterSite, or sets all
  const sites={blair:[],ayr:[],despatch:[]};
  document.querySelectorAll(".rate-row").forEach(row=>{
    const site=row.getAttribute("data-site");
    const from=row.querySelector(".from").value;
    const rate=parseFloat(row.querySelector(".rate").value);
    if(site && from && !Number.isNaN(rate)) sites[site].push({from,rate});
  });
  if(filterSite) return sites[filterSite];
  return sites;
}
function readBudgets(filterSite){
  const sites={blair:[],ayr:[],despatch:[]};
  document.querySelectorAll(".budget-row").forEach(row=>{
    const site=row.getAttribute("data-bsite");
    const from=row.querySelector(".bfrom").value;
    const budget=parseFloat(row.querySelector(".budget").value);
    if(site && from && !Number.isNaN(budget)) sites[site].push({from,budget});
  });
  return filterSite ? sites[filterSite] : sites;
}
function slug(s){ return s.replace(/[^a-z0-9]+/gi,"_"); }
function targetEntries(name){
  const t = SETTINGS.targets[name];
  if (Array.isArray(t)) return t.slice().sort((a,b)=>String(a.from).localeCompare(String(b.from)));
  return [{from:(RAW.dates&&RAW.dates[0])||"2025-08-01", value:(t==null?null:t)}];
}
function targetFor(name, iso){
  let v=null;
  targetEntries(name).forEach(e=>{ if(String(e.from)<=iso && e.value!=null && e.value!=="") v=+e.value; });
  return v;
}
function readTargets(){
  const out = Object.assign({}, SETTINGS.targets);
  document.querySelectorAll('.tg-row[data-tgname]').forEach(row=>{
    const name=row.getAttribute('data-tgname');
    const m=KPI_META.find(x=>x.name===name); const isPct=m&&m.uom==="%";
    const vals=row.querySelectorAll('.tgval');
    const froms=row.querySelectorAll('.tgfrom');
    const startFrom=(RAW.dates&&RAW.dates[0])||"2025-08-01";
    if(froms.length===0){
      let v=parseFloat(vals[0]?vals[0].value:""); if(Number.isNaN(v)) v=0;
      if(isPct) v=round(v/100,6);
      out[name]=v;
    } else {
      const es=[];
      vals.forEach((inp,i)=>{
        let v=parseFloat(inp.value); if(Number.isNaN(v)) v=0;
        if(isPct) v=round(v/100,6);
        es.push({from:(froms[i]&&froms[i].value)||startFrom, value:v});
      });
      out[name]=es;
    }
  });
  return out;
}
function readSettingsFromDom(){
  const rates=readRates();
  ["blair","ayr","despatch"].forEach(s=>{ if(rates[s].length) SETTINGS.rates[s]=rates[s]; });
  const budgets=readBudgets();
  ["blair","ayr","despatch"].forEach(s=>{ if(budgets[s].length) SETTINGS.budgets[s]=budgets[s]; });
  SETTINGS.targets = readTargets();
  // productivity standards (kg per hour, date-effective)
  const stds={};
  document.querySelectorAll("[data-stdrow]").forEach(el=>{
    const [act,i,f]=el.dataset.stdrow.split("|");
    (stds[act]=stds[act]||[])[+i]=stds[act][+i]||{};
    stds[act][+i][f]= f==="kgh" ? parseFloat(el.value)||0 : el.value;
  });
  Object.keys(stds).forEach(a=>{ const list=stds[a].filter(e=>e&&e.from&&e.kgh>0); if(list.length) (SETTINGS.standards=SETTINGS.standards||{})[a]=list; });
  // default daily volume targets
  const vt={};
  document.querySelectorAll("[data-vt]").forEach(el=>{ const [site,f]=el.dataset.vt.split("|"); (vt[site]=vt[site]||{})[f]=el.value===""?null:parseFloat(el.value); });
  if(Object.keys(vt).length) SETTINGS.voltargets=vt;
}
function settingsObj(){ return {rates:SETTINGS.rates,targets:SETTINGS.targets,visible:SETTINGS.visible,order:SETTINGS.order,budgets:SETTINGS.budgets,standards:SETTINGS.standards,voltargets:SETTINGS.voltargets}; }
function persistSettings(){
  if(KPI_SHARED){ kpiPut({settings:settingsObj()}).catch(()=>setStatus("Save failed — check connection and try again.")); return; }
  try{ localStorage.setItem("wilsonsSettings", JSON.stringify(settingsObj())); }catch(e){}
}
async function kpiApi(method,body){
  const r=await fetch('/api/kpi',{method:method||'GET',headers:{'Content-Type':'application/json',Authorization:'Bearer '+KPI_TOKEN},body:body?JSON.stringify(body):undefined,cache:'no-store'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
function kpiPut(body){ return kpiApi('PUT',body); }
function saveSettings(){ readSettingsFromDom(); persistSettings(); render(); setStatus("Saved. Dashboard updated."); }
function setStatus(msg){ const s=document.getElementById("setStatus"); if(s){ s.textContent=msg; setTimeout(()=>{ if(s) s.textContent=""; },2500);} }


// ---------- Daily / Weekly management report ----------
let repMode="day", repDate=null;
function repDefaultDate(){ const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
function fmtGBP(v){ return v==null?"—":(v<0?"−£":"£")+Math.abs(Math.round(v)).toLocaleString(); }
function fmtKg(v){ return v==null?"—":Math.round(v).toLocaleString()+" kg"; }
function varCls(v){ return v==null?"":(v>=0?"pos":"neg"); }
function renderReport(){
  const v=document.getElementById("reportView"); if(!v) return;
  if(!REPORT){ v.innerHTML='<p style="padding:20px">No data yet.</p>'; return; }
  if(!repDate) repDate=repDefaultDate();
  // day indices covered by this report
  let idx=[], title="", sub="";
  if(repMode==="day"){
    const i=REPORT.dates.indexOf(repDate);
    idx = i>=0?[i]:[];
    title="Daily Report"; sub=new Date(repDate+"T00:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  } else {
    const d=new Date(repDate+"T00:00:00"); const dow=(d.getDay()+6)%7; // Monday start
    const mon=new Date(d); mon.setDate(d.getDate()-dow);
    const days=[]; for(let n=0;n<7;n++){ const x=new Date(mon); x.setDate(mon.getDate()+n); days.push(x.toISOString().slice(0,10)); }
    idx = days.map(iso=>REPORT.dates.indexOf(iso)).filter(i=>i>=0);
    title="Weekly Report"; sub="Week beginning "+mon.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
  }
  const S=a=>{ const vs=idx.map(i=>a[i]).filter(x=>typeof x==="number"); return vs.length?vs.reduce((s,x)=>s+x,0):null; };
  const T=a=>{ const vs=idx.map(i=>a[i]).filter(x=>typeof x==="string"&&x.trim()); return vs.join(" · "); };
  const R=REPORT;
  const row=(label,val,extra)=>`<tr><td>${label}</td><td class="num ${extra||""}">${val}</td></tr>`;
  const siteBlock=(site,vol,tgt,vv,rec,spent,rv,reVol,reLab)=>{
    const vvv=S(vv), rvv=S(rv);
    return `<h3>${site}</h3><table class="rep">
      ${row("Volume produced", fmtKg(S(vol)))}
      ${row("Volume target", fmtKg(S(tgt)))}
      ${row("Volume variance", fmtKg(vvv), varCls(vvv))}
      ${T(reVol)?row("Reason", '<span class="reason">'+T(reVol)+'</span>'):""}
      ${row("Labour spent", fmtGBP(S(spent)))}
      ${row("Recovered labour", fmtGBP(S(rec)))}
      ${row("Labour recovery variance", fmtGBP(rvv), varCls(rvv))}
      ${T(reLab)?row("Reason", '<span class="reason">'+T(reLab)+'</span>'):""}
    </table>`;
  };
  const safe=`<h3>Safety</h3><table class="rep">
    ${row("Accidents", S(R.acc)??"—")}${row("Riddors", S(R.rid)??"—")}${row("Near misses raised", S(R.nm)??"—")}</table>`;
  const oos=T(R.oos), notes=T(R.notes);
  const extras=(oos||notes)?`<h3>Stocks & notes</h3><table class="rep">
    ${oos?row("Out of stocks", '<span class="reason">'+oos+'</span>'):""}
    ${notes?row("Notes", '<span class="reason">'+notes+'</span>'):""}</table>`:"";
  v.innerHTML=`
  <div class="repbar noprint">
    <div class="toggle"><button class="${repMode==="day"?"active":""}" onclick="repMode='day';renderReport()">Daily</button><button class="${repMode==="week"?"active":""}" onclick="repMode='week';renderReport()">Weekly</button></div>
    <input type="date" value="${repDate}" onchange="repDate=this.value;renderReport()">
    <button class="btn primary" onclick="window.print()">🖨 Print / save PDF</button>
    <span class="help">Everything here is calculated from the daily KPI input — nothing extra to fill in.</span>
  </div>
  <div class="reppage" id="repPage">
    <div class="rephead"><div><h2>${title}</h2><div class="repsub">${sub}</div></div><div class="repbrand">Wilsons Pet Food</div></div>
    ${idx.length?`
      <div class="repcols">
        <div>${siteBlock("Ayr — fresh / cooked",R.volAyr,R.tgtAyr,R.vvA,R.recAyr,R.spentAyr,R.rvA,R.reAyrVol,R.reAyrLab)}</div>
        <div>${siteBlock("Blair — cold pressed",R.volCP,R.tgtBlair,R.vvB,R.recBlair,R.spentBlair,R.rvB,R.reBlairVol,R.reBlairLab)}</div>
      </div>${safe}${extras}`
      :'<p style="padding:14px">No numbers entered for this '+(repMode==="day"?"day":"week")+' yet — fill in the KPI Daily Input first.</p>'}
    <div class="repfoot">Generated by Wilsons HQ · rates & standards as at the report date · recovery = volume ÷ standard × £/hour</div>
  </div>`;
}
// ---------- tabs / upload ----------
function showTab(tab){
  document.querySelectorAll("#tabs button").forEach(b=> b.classList.toggle("active", b.dataset.tab===tab));
  const dash = tab==="dashboard";
  document.getElementById("dashboardView").style.display = dash?"":"none";
  document.getElementById("filters").style.display = dash?"":"none";
  document.getElementById("settingsView").style.display = tab==="settings"?"block":"none";
  document.getElementById("reportView").style.display = tab==="report"?"block":"none";
  document.getElementById("freqToggle").style.display = dash?"":"none";
  document.getElementById("periodSelect").style.display = dash?"":"none";
  if (tab==="settings") renderSettings();
  else if (tab==="report") renderReport();
  else if (dashStale) { dashStale = false; render(); }
}
document.getElementById("tabs").addEventListener("click", e=>{ if(e.target.dataset.tab) showTab(e.target.dataset.tab); });
document.getElementById("uploadBtn").onclick = ()=> document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try {
      const parsed = parseWorkbook(new Uint8Array(ev.target.result));
      RAW = parsed;
      lastRefresh = new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
      if(KPI_SHARED){ kpiPut({raw:RAW}).catch(()=>alert("Upload read OK but saving to the server failed — check the connection and try again.")); }
      else { try { localStorage.setItem("wilsonsRaw", JSON.stringify(RAW)); localStorage.setItem("wilsonsRefresh", lastRefresh); } catch(err){} }
      state.period = null; showTab("dashboard"); render();
      alert("Loaded "+file.name+"\\n"+parsed.dates.length+" days ("+parsed.dates[0]+" → "+parsed.dates[parsed.dates.length-1]+").");
    } catch(err){ alert("Could not read this file:\\n"+err.message+"\\n\\nMake sure it is the Wilsons KPI Input file with a \"Daily Input\" tab."); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = "";
};
document.getElementById("freqToggle").addEventListener("click", e => {
  if (e.target.dataset.freq) {
    state.freq = e.target.dataset.freq; state.period = null;
    document.querySelectorAll("#freqToggle button").forEach(b => b.classList.toggle("active", b.dataset.freq===state.freq));
    render();
  }
});
document.getElementById("periodSelect").addEventListener("change", e => { state.period = e.target.value; renderSummary(); renderGrid(); });
document.getElementById("modalClose").onclick = () => document.getElementById("modal").classList.remove("open");
document.getElementById("modal").onclick = e => { if (e.target.id === "modal") document.getElementById("modal").classList.remove("open"); };

const fsBtn = document.getElementById("fullscreenBtn");
function fsActive(){ return document.fullscreenElement || document.webkitFullscreenElement; }
fsBtn.onclick = () => {
  if (!fsActive()) { const el = document.documentElement; (el.requestFullscreen || el.webkitRequestFullscreen).call(el); }
  else { (document.exitFullscreen || document.webkitExitFullscreen).call(document); }
};
document.addEventListener("fullscreenchange", () => { fsBtn.innerHTML = fsActive() ? "&#10005; Exit full screen" : "&#9974; Full screen"; });
document.addEventListener("keydown", (e) => { if (e.key === "F11" && !fsActive()) { e.preventDefault(); fsBtn.click(); } });

function applyCaps(){
  if(!KPI_CAPS.settings){
    const st=document.querySelector('#tabs button[data-tab="settings"]'); if(st) st.style.display='none';
    const ub=document.getElementById('uploadBtn'); if(ub) ub.style.display='none';
  }
}
let _kpiSnapshot='';
function kpiSnapshotStr(d){ return JSON.stringify([d.raw,d.settings]); }
function startKpiPolling(mins){
  setInterval(async()=>{
    try{
      const d=await kpiApi('GET');
      const snap=kpiSnapshotStr(d);
      if(snap!==_kpiSnapshot){
        _kpiSnapshot=snap;
        if(d.raw) RAW=d.raw;
        SETTINGS=JSON.parse(JSON.stringify(SETTINGS_DEFAULT)); applySettingsObj(d.settings); normalizeMeta();
        if(d.refresh) lastRefresh=d.refresh;
        state.period=null; render();
      }
      const n=document.getElementById('kpiSync'); if(n){ n.className='syncnote'; n.textContent='● Live · updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
    }catch(e){ const n=document.getElementById('kpiSync'); if(n){ n.className='syncnote off'; n.textContent='Connection lost — retrying'; } }
  }, (mins||5)*60*1000);
}
function setupDisplay(){
  const ov=document.createElement('div'); ov.id='displayOverlay';
  ov.innerHTML='<button>Start display</button><p>Goes full screen and refreshes itself every few minutes.</p>';
  document.body.appendChild(ov);
  ov.querySelector('button').onclick=async()=>{
    ov.remove();
    try{ const el=document.documentElement; await (el.requestFullscreen||el.webkitRequestFullscreen).call(el); }catch(e){}
    try{ if(navigator.wakeLock){ let wl=await navigator.wakeLock.request('screen'); document.addEventListener('visibilitychange',async()=>{ if(document.visibilityState==='visible'){ try{ wl=await navigator.wakeLock.request('screen'); }catch(e){} } }); } }catch(e){}
  };
  const ctr=document.querySelector('.controls');
  if(ctr){ const n=document.createElement('span'); n.id='kpiSync'; n.className='syncnote'; n.textContent='● Live'; ctr.appendChild(n); }
}
async function kpiBoot(){
  if(KPI_SHARED){
    try{
      const d=await kpiApi('GET');
      _kpiSnapshot=kpiSnapshotStr(d);
      if(d.raw) RAW=d.raw;
      applySettingsObj(d.settings); normalizeMeta();
      if(d.refresh) lastRefresh=d.refresh;
      KPI_CAPS=d.caps||KPI_CAPS;
    }catch(e){
      document.getElementById('dashboardView').innerHTML='<div class="empty">Could not load the shared KPI data — check the connection and reload.</div>';
      return;
    }
    applyCaps();
    startKpiPolling(KPI_DISPLAY?5:3);
  }
  if(KPI_DISPLAY) setupDisplay();
  if(KPI_MINI) state.freq='week';
  render();
}
kpiBoot();
</script>
