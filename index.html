<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Wilsons Production Manager</title>
<style>
:root{
  --navy:#143644; --slate:#4b5f6d; --cream:#e0ddcb; --coral:#f37d89; --coral-deep:#e2606c;
  --bg:#f3f1ea; --card:#fff; --ink:#143644; --muted:#6f7b82; --line:#e3dfd3;
  --warn:#c0563b; --ok:#3f7d3f; --low:#b8860b; --out:#b4231f;
  --wilsons:#143644; --tuggs:#e2606c; --wild:#007985; --nutriment:#7a3b8f; --greenpantry:#3f7d3f;
  --font-display:"Bobby Jones Soft","Poppins","Trebuchet MS","Segoe UI",sans-serif;
  --font-body:"Effra",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
h1,h2,h3,h4,.viewtitle{font-family:var(--font-display);letter-spacing:.2px}
a{color:var(--navy)}
button{font-family:inherit}
.btn{background:var(--navy);color:#fff;border:0;padding:8px 14px;border-radius:7px;cursor:pointer;font-weight:600;font-size:13px}
.btn:hover{background:#0e2935}
.btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
.btn.ghost:hover{background:#f6f4ec}
.btn.coral{background:var(--coral-deep)}
.btn.coral:hover{background:#c84f5b}
.btn.sm{padding:5px 9px;font-size:12px;border-radius:6px}
.btn.danger{background:#fff;color:var(--out);border:1px solid #e7c4c0}
.btn.danger:hover{background:#fbeeec}
input,select,textarea{font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--coral);outline-offset:0}
label.fld{display:flex;flex-direction:column;gap:3px;font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
label.fld input,label.fld select{font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink)}
table{border-collapse:collapse;width:100%;background:#fff}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:#faf8f2;position:sticky;top:0}
tr:hover td{background:#fbfaf4}
.num{text-align:right;font-variant-numeric:tabular-nums}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.pill.ok{background:#e3efe1;color:var(--ok)}
.pill.low{background:#fbf0d6;color:var(--low)}
.pill.out{background:#f7dcd9;color:var(--out)}
.chip{display:inline-block;background:#eef0ea;border:1px solid var(--line);border-radius:14px;padding:2px 10px;font-size:12px;font-weight:600;margin:2px}
.brandtag{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;padding:2px 8px;border-radius:5px}
.brandtag.Wilsons{background:var(--wilsons)} .brandtag.TUGGS{background:var(--tuggs)}
.brandtag.Wild{background:var(--wild)} .brandtag.Nutriment{background:var(--nutriment)} .brandtag\.GreenPantry,.brandtag.GreenPantry{background:var(--greenpantry)}
/* header */
header.appbar{background:var(--navy);color:#fff;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;border-bottom:3px solid var(--coral)}
.brandlogo svg{height:28px;width:auto;display:block}
.brandlogo{display:flex;align-items:center}
.apptitle{font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:.3px;padding-left:10px;border-left:1px solid rgba(255,255,255,.3)}
nav.tabs{display:flex;gap:4px;flex-wrap:wrap}
nav.tabs button{background:rgba(255,255,255,.12);color:#fff;border:0;padding:6px 11px;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:600}
nav.tabs button.active{background:#fff;color:var(--navy)}
nav.tabs button:hover{background:rgba(255,255,255,.28)}
.spacer{margin-left:auto}
.who{font-size:12px;color:#dfe6e9;display:flex;align-items:center;gap:8px}
.who b{color:#fff}
.linkbtn{background:none;border:0;color:#bfe6cd;cursor:pointer;font-size:12px;font-weight:700;text-decoration:underline}
main{max-width:1180px;margin:0 auto;padding:18px 16px 80px}
.view{display:none} .view.active{display:block}
.viewtitle{font-size:20px;margin:2px 0 4px}
.sub{color:var(--muted);font-size:13px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 1px 2px rgba(20,54,68,.04)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.toolbar .spacer{margin-left:auto}
.grid{display:grid;gap:12px}
.kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;min-width:120px}
.kpi .n{font-size:22px;font-weight:800;font-family:var(--font-display)}
.kpi .l{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.kpi.alarm .n{color:var(--out)} .kpi.warnk .n{color:var(--low)}
.recipe-card{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:#fff;cursor:pointer}
.recipe-card:hover{border-color:var(--coral);box-shadow:0 2px 8px rgba(20,54,68,.08)}
.recipe-card h4{margin:6px 0 4px;font-size:15px}
.recipe-card .meta{font-size:12px;color:var(--muted)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.modal-bg{position:fixed;inset:0;background:rgba(20,54,68,.45);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:30px 14px;overflow:auto}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:12px;max-width:820px;width:100%;padding:20px;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.modal h3{margin:0 0 12px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>*{flex:1;min-width:140px}
.muted{color:var(--muted)} .small{font-size:12px}
.hint{font-size:12px;color:var(--muted)}
.danger-row td{background:#fdeceb}
.ing-row{display:grid;grid-template-columns:1fr 110px 90px 36px;gap:8px;align-items:center;margin-bottom:6px}
.daycol{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;min-height:120px}
.daycol h4{margin:0 0 8px;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.plan-entry{border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:8px;background:#faf8f2}
.plan-entry .pe-top{display:flex;justify-content:space-between;gap:6px;font-weight:700;font-size:13px}
.weekgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
@media(max-width:900px){.weekgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){
  main{padding:12px 10px 80px}
  nav.tabs{width:100%;overflow:auto}
  .weekgrid{grid-template-columns:1fr}
  .ing-row{grid-template-columns:1fr 80px 70px 30px}
  table.responsive thead{display:none}
  table.responsive tr{display:block;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;padding:6px}
  table.responsive td{display:flex;justify-content:space-between;border:0;padding:4px 6px}
  table.responsive td::before{content:attr(data-l);font-weight:700;color:var(--muted);font-size:11px;text-transform:uppercase}
}
/* login */
#loginScreen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:500;padding:18px}
.loginbox{background:#fff;border-radius:14px;padding:28px;max-width:380px;width:100%;box-shadow:0 16px 50px rgba(0,0,0,.35);text-align:center}
.loginbox .logo{margin-bottom:8px}
.loginbox h2{margin:6px 0 2px;color:var(--navy)}
.loginbox p{color:var(--muted);font-size:13px;margin:0 0 18px}
.loginbox label.fld{text-align:left;margin-bottom:12px}
.loginerr{color:var(--out);font-size:13px;font-weight:600;min-height:18px;margin-bottom:8px}
.busy{opacity:.5;pointer-events:none}
/* print */
@media print{
  header.appbar,nav.tabs,.toolbar,.noprint{display:none!important}
  body{background:#fff}
  main{max-width:none;padding:0}
  .view{display:none!important} .view.printing{display:block!important}
}
@page{size:A4 landscape;margin:8mm}
.mixsheet{font-family:var(--font-body);color:#000}
.mixsheet .hd{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--navy);padding-bottom:6px;margin-bottom:8px}
.mixsheet .hd .t{font-family:var(--font-display);font-size:20px;color:var(--navy)}
.mixsheet table{width:100%;border-collapse:collapse}
.mixsheet th,.mixsheet td{border:1px solid #333;padding:4px 6px;font-size:12px}
.printroot{display:none}
</style>
</head>

<!-- generic modal -->
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>
<div class="printroot" id="printRoot"></div>

<script>
/* ============================ API LAYER ============================ */
const API=''; // same origin as backend
let TOKEN=localStorage.getItem('wpm_token')||'';
let DB={user:null,ingredients:[],recipes:[],suppliers:[],packaging:[],stock:[]};
let LISTS={production:[],deliveries:[],adjustments:[],users:[]};

async function api(path,method,body){
  const h={'Content-Type':'application/json'};
  if(TOKEN) h['Authorization']='Bearer '+TOKEN;
  const r=await fetch(API+path,{method:method||'GET',headers:h,body:body?JSON.stringify(body):undefined,cache:'no-store'});
  if(r.status===401){ TOKEN=''; localStorage.removeItem('wpm_token'); showLogin(); throw new Error('Signed out'); }
  const ct=r.headers.get('content-type')||'';
  const data=ct.includes('json')?await r.json():await r.text();
  if(!r.ok) throw new Error((data&&data.error)||('Error '+r.status));
  return data;
}

/* ============================ HELPERS ============================ */
const $=s=>document.querySelector(s);
function esc(s){return (''+(s==null?'':s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(n,d){ n=+n||0; return n.toLocaleString(undefined,{minimumFractionDigits:d||0,maximumFractionDigits:d==null?1:d}); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function ingById(id){ return DB.ingredients.find(i=>i.id===id); }
function ingName(id){ const i=ingById(id); return i?i.name:id; }
function recById(id){ return DB.recipes.find(r=>r.id===id); }
function packKg(p){ p=(''+p).toLowerCase().replace(/\s/g,''); let m=p.match(/([\d.]+)kg/); if(m)return parseFloat(m[1]); m=p.match(/([\d.]+)g/); if(m)return parseFloat(m[1])/1000; m=p.match(/([\d.]+)/); return m?parseFloat(m[1])/1000:0; }
function brandClass(b){ return (b||'').replace(/\s+/g,''); }

// grouping (matches existing app): proteins -> plants -> additives; heaviest first
const CAT_GROUP={'Meat':0,'Offal':0,'Fish':0,'Vegetable':1,'Fruit':1,'Grain & Seed':1,'Oil':2,'Supplement & Premix':2,'Other':2};
function ingGroupOf(id){ const it=ingById(id); const c=it?it.category:''; return (c in CAT_GROUP)?CAT_GROUP[c]:3; }
function sortRecipeIngredients(items){ items.sort((a,b)=>{const ga=ingGroupOf(a.ingId),gb=ingGroupOf(b.ingId); if(ga!==gb)return ga-gb; return (parseFloat(b.kg)||0)-(parseFloat(a.kg)||0);}); return items; }

// cook capacity (per cook of each size): bags & hours
const COOK_CATS={'700g':{time:2,bags:585},'400g/500g':{time:2,bags:780},'380g':{time:3,bags:936},'250/300g':{time:2,bags:936}};
function cookBucket(p){ const g=Math.round(packKg(p)*1000); const opts=[[700,'700g'],[500,'400g/500g'],[400,'400g/500g'],[380,'380g'],[300,'250/300g'],[250,'250/300g']]; let best=opts[0],bd=1e9; opts.forEach(o=>{const d=Math.abs(o[0]-g); if(d<bd){bd=d;best=o;}}); return best[1]; }

/* deductions for a produced quantity */
function deductionsFor(recipe,bags,pkg){
  const mixKg=bags*packKg(pkg); // recipes are per-100kg base -> li.kg is %
  return (recipe.ingredients||[]).map(li=>({ing_id:li.ingId,kg:+( mixKg*(+li.kg||0)/100 ).toFixed(4)}));
}

/* ============================ MODAL ============================ */
function modal(html){ $('#modalBox').innerHTML=html; $('#modalBg').classList.add('show'); }
function closeModal(){ $('#modalBg').classList.remove('show'); $('#modalBox').innerHTML=''; }
$('#modalBg').addEventListener('click',e=>{ if(e.target===$('#modalBg')) closeModal(); });

/* ============================ TABS ============================ */
const TABS=[
  {id:'library',label:'Recipe Library'},
  {id:'ingredients',label:'Ingredients'},
  {id:'planner',label:'Planner'},
  {id:'mixing',label:'Mixing Sheets'},
  {id:'production',label:'Record Production'},
  {id:'stock',label:'Stock'},
  {id:'deliveries',label:'Deliveries'},
  {id:'adjustments',label:'Stocktake'},
  {id:'packaging',label:'Packaging'},
  {id:'suppliers',label:'Suppliers'},
  {id:'users',label:'Users',admin:true},
];
let CURRENT='library';
function buildTabs(){
  $('#tabs').innerHTML=TABS.filter(t=>!t.admin||(DB.user&&DB.user.role==='admin'))
    .map(t=>`<button data-id="${t.id}"${t.id===CURRENT?' class="active"':''}>${esc(t.label)}</button>`).join('');
}
$('#tabs').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return; go(b.dataset.id); });
function go(id){ CURRENT=id; document.querySelectorAll('#tabs button').forEach(x=>x.classList.toggle('active',x.dataset.id===id)); renderTab(id); }

function renderTab(id){
  const v=$('#views');
  ({library:renderLibrary,ingredients:renderIngredients,planner:renderPlanner,mixing:renderMixing,
    production:renderProduction,stock:renderStock,deliveries:renderDeliveries,adjustments:renderAdjustments,
    packaging:renderPackaging,suppliers:renderSuppliers,users:renderUsers}[id]||renderLibrary)(v);
}

/* ============================ BOOT / LOGIN ============================ */
function setSync(txt){ $('#syncPill').textContent=txt||''; }
async function bootstrap(){
  setSync('Loading…');
  const d=await api('/api/bootstrap');
  DB.user=d.user; DB.ingredients=d.ingredients||[]; DB.suppliers=d.suppliers||[]; DB.packaging=d.packaging||[]; DB.stock=d.stock||[];
  DB.recipes=(d.recipes||[]).map(r=>({...r,packs:r.packs||[],ingredients:r.ingredients||[]}));
  $('#whoName').textContent=DB.user.username+(DB.user.role==='admin'?' (admin)':'');
  buildTabs(); setSync('');
}
async function refreshStock(){ DB.stock=await api('/api/stock'); }
async function startApp(){
  await bootstrap();
  $('#loginScreen').style.display='none'; $('#app').style.display='block';
  go('library');
}
function showLogin(){ $('#app').style.display='none'; $('#loginScreen').style.display='flex'; $('#luser').focus(); }

$('#loginForm').addEventListener('submit',async e=>{
  e.preventDefault(); $('#loginErr').textContent='';
  const btn=$('#loginBtn'); btn.classList.add('busy');
  try{
    const d=await api('/api/login','POST',{username:$('#luser').value,password:$('#lpass').value});
    TOKEN=d.token; localStorage.setItem('wpm_token',TOKEN);
    await startApp();
  }catch(err){ $('#loginErr').textContent=err.message||'Sign-in failed'; }
  btn.classList.remove('busy');
});
$('#signout').addEventListener('click',async()=>{ try{await api('/api/logout','POST');}catch(e){} TOKEN=''; localStorage.removeItem('wpm_token'); $('#luser').value='';$('#lpass').value=''; showLogin(); });

(async function init(){
  if(!TOKEN){ showLogin(); return; }
  try{ await startApp(); }catch(e){ showLogin(); }
})();

/* ============================ 1. RECIPE LIBRARY ============================ */
function renderLibrary(v){
  const brands=[...new Set(DB.recipes.map(r=>r.brand))];
  v.innerHTML=`<h1 class="viewtitle">Recipe Library</h1>
  <p class="sub">${DB.recipes.length} recipes · ${DB.ingredients.length} ingredients. Click a recipe to view or edit.</p>
  <div class="toolbar">
    <input id="recSearch" placeholder="Search recipes…" style="min-width:200px">
    <select id="recBrand"><option value="">All brands</option>${brands.map(b=>`<option>${esc(b)}</option>`).join('')}</select>
    <span class="spacer"></span>
    <button class="btn coral" id="newRecBtn">+ New recipe</button>
  </div>
  <div id="recCards"></div>`;
  const draw=()=>{
    const q=($('#recSearch').value||'').toLowerCase(), bf=$('#recBrand').value;
    const list=DB.recipes.filter(r=>(!bf||r.brand===bf)&&(!q||(r.name+' '+r.brand).toLowerCase().includes(q)))
      .sort((a,b)=>a.brand.localeCompare(b.brand)||a.name.localeCompare(b.name));
    $('#recCards').innerHTML=brands.filter(b=>!bf||b===bf).map(b=>{
      const rs=list.filter(r=>r.brand===b); if(!rs.length)return'';
      return `<h3 style="margin:14px 0 8px"><span class="brandtag ${brandClass(b)}">${esc(b)}</span></h3>
      <div class="cards">${rs.map(r=>`<div class="recipe-card" data-id="${r.id}">
        <div class="meta">${(r.packs||[]).map(p=>`<span class="chip">${esc(p)}</span>`).join('')||'<span class="muted">no pack sizes</span>'}</div>
        <h4>${esc(r.name)}</h4>
        <div class="meta">${(r.ingredients||[]).length} ingredients</div></div>`).join('')}</div>`;
    }).join('')||'<p class="muted">No recipes match.</p>';
    document.querySelectorAll('#recCards .recipe-card').forEach(c=>c.onclick=()=>openRecipe(c.dataset.id));
  };
  $('#recSearch').oninput=draw; $('#recBrand').onchange=draw; $('#newRecBtn').onclick=()=>editRecipe(null); draw();
}

function openRecipe(id){
  const r=recById(id); if(!r)return;
  const total=(r.ingredients||[]).reduce((s,li)=>s+(+li.kg||0),0)||100;
  modal(`<h3><span class="brandtag ${brandClass(r.brand)}">${esc(r.brand)}</span> &nbsp;${esc(r.name)}</h3>
  <p class="hint">Pack sizes: ${(r.packs||[]).map(p=>esc(p)).join(', ')||'—'} · base 100&nbsp;kg</p>
  <table><thead><tr><th>Ingredient</th><th>Category</th><th class="num">kg / 100kg</th><th class="num">%</th></tr></thead>
  <tbody>${sortRecipeIngredients([...(r.ingredients||[])]).map(li=>`<tr><td>${esc(ingName(li.ingId))}</td><td class="muted">${esc((ingById(li.ingId)||{}).category||'')}</td><td class="num">${fmt(li.kg,2)}</td><td class="num">${fmt((+li.kg||0)/total*100,1)}%</td></tr>`).join('')}</tbody>
  <tfoot><tr><th>Total</th><th></th><th class="num">${fmt(total,1)}</th><th class="num">100%</th></tr></tfoot></table>
  <div class="row" style="margin-top:16px">
    <button class="btn" onclick="editRecipe('${r.id}')">Edit recipe</button>
    <button class="btn ghost" onclick="mixingFor('${r.id}')">Mixing sheet</button>
    <button class="btn ghost" onclick="closeModal()">Close</button>
    <span class="spacer"></span>
    <button class="btn danger" onclick="deleteRecipe('${r.id}')">Delete</button>
  </div>`);
}

let editBuf=null;
function editRecipe(id){
  const r=id?JSON.parse(JSON.stringify(recById(id))):{id:null,brand:'Wilsons',name:'',packs:[],ingredients:[]};
  editBuf=r;
  drawEditor();
}
function drawEditor(){
  const r=editBuf;
  const brands=[...new Set([...DB.recipes.map(x=>x.brand),'Wilsons','TUGGS','Wild','Nutriment','Green Pantry'])];
  const ingOpts=sel=>`<option value=""${sel?'':' selected'}>— choose ingredient —</option>`+
    [...DB.ingredients].sort((a,b)=>a.name.localeCompare(b.name)).map(i=>`<option value="${i.id}"${i.id===sel?' selected':''}>${esc(i.name)}${i.category?' · '+esc(i.category):''}</option>`).join('');
  modal(`<h3>${r.id?'Edit recipe':'New recipe'}</h3>
  <div class="row">
    <label class="fld">Brand<select id="edBrand">${brands.map(b=>`<option${b===r.brand?' selected':''}>${esc(b)}</option>`).join('')}</select></label>
    <label class="fld" style="flex:2">Recipe name<input id="edName" value="${esc(r.name)}"></label>
    <label class="fld">Pack sizes (comma-sep)<input id="edPacks" value="${esc((r.packs||[]).join(', '))}" placeholder="e.g. 380g  or  300g, 500g, 700g"></label>
  </div>
  <h4 style="margin:14px 0 6px">Ingredients <span class="hint">(kg per 100&nbsp;kg of mix)</span></h4>
  <div class="ing-row" style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700"><div>Ingredient</div><div>kg/100kg</div><div></div><div></div></div>
  <div id="edRows"></div>
  <button class="btn ghost sm" id="addRow">+ Add ingredient</button>
  <div id="edTotal" class="hint" style="margin-top:8px"></div>
  <div class="row" style="margin-top:16px">
    <button class="btn" id="saveRec">Save recipe</button>
    <button class="btn ghost" onclick="closeModal()">Cancel</button>
  </div>`);
  const rowsBox=$('#edRows');
  function drawRows(){
    rowsBox.innerHTML=r.ingredients.map((li,i)=>`<div class="ing-row">
      <select data-i="${i}" class="rIng">${ingOpts(li.ingId)}</select>
      <input data-i="${i}" class="rKg num" type="number" step="0.0001" value="${li.kg!=null?li.kg:''}">
      <span class="hint num" data-pct="${i}"></span>
      <button class="btn danger sm" data-del="${i}">✕</button></div>`).join('')||'<p class="hint">No ingredients yet — add one.</p>';
    rowsBox.querySelectorAll('.rIng').forEach(s=>s.onchange=e=>{r.ingredients[+e.target.dataset.i].ingId=e.target.value;updTot();});
    rowsBox.querySelectorAll('.rKg').forEach(s=>s.oninput=e=>{r.ingredients[+e.target.dataset.i].kg=parseFloat(e.target.value)||0;updTot();});
    rowsBox.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{r.ingredients.splice(+e.target.dataset.del,1);drawRows();});
    updTot();
  }
  function updTot(){ const t=r.ingredients.reduce((s,li)=>s+(+li.kg||0),0); $('#edTotal').innerHTML=`Total: <b>${fmt(t,2)} kg</b> per 100kg ${Math.abs(t-100)>0.5?'<span style="color:var(--warn)">(not 100 — will still save)</span>':'✓'}`;
    rowsBox.querySelectorAll('[data-pct]').forEach(el=>{const i=+el.dataset.pct;el.textContent=t?fmt((+r.ingredients[i].kg||0)/t*100,1)+'%':'';}); }
  $('#addRow').onclick=()=>{ r.ingredients.push({ingId:'',kg:0}); drawRows(); };
  drawRows();
  $('#saveRec').onclick=async()=>{
    r.brand=$('#edBrand').value; r.name=$('#edName').value.trim();
    r.packs=$('#edPacks').value.split(',').map(s=>s.trim()).filter(Boolean);
    r.ingredients=r.ingredients.filter(li=>li.ingId);
    if(!r.name){ alert('Give the recipe a name.'); return; }
    sortRecipeIngredients(r.ingredients);
    setSync('Saving…');
    try{
      if(r.id) await api('/api/recipes/'+encodeURIComponent(r.id),'PUT',{brand:r.brand,name:r.name,packs:r.packs,ingredients:r.ingredients});
      else { const d=await api('/api/recipes','POST',{brand:r.brand,name:r.name,packs:r.packs,ingredients:r.ingredients}); r.id=d.id; }
      DB.recipes=await api('/api/recipes'); closeModal(); setSync(''); renderTab(CURRENT);
    }catch(e){ setSync(''); alert('Save failed: '+e.message); }
  };
}
async function deleteRecipe(id){ if(!confirm('Delete this recipe?'))return; await api('/api/recipes/'+encodeURIComponent(id),'DELETE'); DB.recipes=await api('/api/recipes'); closeModal(); renderTab(CURRENT); }
window.editRecipe=editRecipe; window.deleteRecipe=deleteRecipe; window.openRecipe=openRecipe; window.closeModal=closeModal;

/* ============================ 3. PLANNER ============================ */
const DAYS=['Mon','Tue','Wed','Thu','Fri'];
function planKey(){ return 'wpm_plan'; }
function loadPlan(){ try{return JSON.parse(localStorage.getItem(planKey()))||{};}catch(e){return{};} }
function savePlan(p){ localStorage.setItem(planKey(),JSON.stringify(p)); }
function weekStart(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); return x.toISOString().slice(0,10); }
let planWeek=weekStart(todayISO());
function renderPlanner(v){
  const plan=loadPlan(); const wk=plan[planWeek]||{};
  v.innerHTML=`<h1 class="viewtitle">Production Planner</h1>
  <p class="sub">Plan the week, split each recipe across its bag sizes, and print the pick &amp; cook plan. <span class="muted">(The plan is saved on this device.)</span></p>
  <div class="toolbar">
    <button class="btn ghost sm" id="wkPrev">◀</button>
    <b>Week of ${planWeek}</b>
    <button class="btn ghost sm" id="wkNext">▶</button>
    <button class="btn ghost sm" id="wkToday">This week</button>
    <span class="spacer"></span>
    <button class="btn ghost sm" id="wkClear">Clear week</button>
    <button class="btn" id="wkPrint">🖨 Print week plan</button>
  </div>
  <div class="weekgrid" id="weekGrid"></div>`;
  const drawDays=()=>{
    const plan=loadPlan(); const wk=plan[planWeek]||{};
    $('#weekGrid').innerHTML=DAYS.map(day=>{
      const items=wk[day]||[];
      let dayBags=0,dayKg=0;
      const rows=items.map((it,ix)=>{
        const r=recById(it.recipeId); if(!r)return'';
        let kg=0,bags=0; const lines=(r.packs||[]).map(p=>{const n=+(it.bags&&it.bags[p])||0; kg+=n*packKg(p); bags+=n; return `${esc(p)}: <b>${n}</b>`;}).join(' · ');
        dayBags+=bags; dayKg+=kg;
        return `<div class="plan-entry"><div class="pe-top"><span>${esc(r.name)}</span><button class="linkbtn" style="color:var(--out)" onclick="planRemove('${day}',${ix})">remove</button></div>
          <div class="small muted">${lines||'no packs'}</div>
          <div class="small">${fmt(bags)} bags · ${fmt(kg,1)} kg <button class="btn ghost sm" style="float:right" onclick="planEdit('${day}',${ix})">edit qty</button></div></div>`;
      }).join('');
      // cook plan
      const buckets={}; items.forEach(it=>{const r=recById(it.recipeId); if(!r)return; (r.packs||[]).forEach(p=>{const n=+(it.bags&&it.bags[p])||0; if(n){const b=cookBucket(p); buckets[b]=(buckets[b]||0)+n;}});});
      const cook=Object.keys(buckets).map(b=>{const spec=COOK_CATS[b];const cooks=Math.ceil(buckets[b]/spec.bags);return `${b}: ${cooks} cook(s) ≈ ${cooks*spec.time}h`;}).join('<br>');
      return `<div class="daycol"><h4>${day}<button class="btn coral sm" onclick="planAdd('${day}')">+ recipe</button></h4>
        ${rows||'<p class="hint">Nothing planned</p>'}
        <div class="small" style="border-top:1px solid var(--line);padding-top:6px;margin-top:4px"><b>${fmt(dayBags)} bags · ${fmt(dayKg,1)} kg</b>${cook?'<br><span class="muted">Cook: </span>'+cook:''}</div></div>`;
    }).join('');
  };
  window._drawPlannerDays=drawDays;
  $('#wkPrev').onclick=()=>{const d=new Date(planWeek);d.setDate(d.getDate()-7);planWeek=weekStart(d.toISOString());renderTab('planner');};
  $('#wkNext').onclick=()=>{const d=new Date(planWeek);d.setDate(d.getDate()+7);planWeek=weekStart(d.toISOString());renderTab('planner');};
  $('#wkToday').onclick=()=>{planWeek=weekStart(todayISO());renderTab('planner');};
  $('#wkClear').onclick=()=>{ if(!confirm('Clear this week?'))return; const p=loadPlan();delete p[planWeek];savePlan(p);drawDays(); };
  $('#wkPrint').onclick=printWeekPlan;
  drawDays();
}
function planAdd(day){ planEntryModal(day,null); }
function planEdit(day,ix){ planEntryModal(day,ix); }
function planRemove(day,ix){ const p=loadPlan(); (p[planWeek][day]||[]).splice(ix,1); savePlan(p); window._drawPlannerDays(); }
function planEntryModal(day,ix){
  const p=loadPlan(); p[planWeek]=p[planWeek]||{}; p[planWeek][day]=p[planWeek][day]||[];
  const existing=ix!=null?p[planWeek][day][ix]:null;
  const recs=[...DB.recipes].sort((a,b)=>a.brand.localeCompare(b.brand)||a.name.localeCompare(b.name));
  modal(`<h3>${existing?'Edit':'Add'} recipe — ${day}</h3>
   <label class="fld">Recipe<select id="peRec">${recs.map(r=>`<option value="${r.id}"${existing&&existing.recipeId===r.id?' selected':''}>${esc(r.brand)} — ${esc(r.name)}</option>`).join('')}</select></label>
   <div id="peBags" style="margin-top:12px"></div>
   <div class="row" style="margin-top:14px"><button class="btn" id="peSave">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`);
  const drawBags=()=>{ const r=recById($('#peRec').value); const b=(existing&&existing.recipeId===r.id&&existing.bags)||{};
    $('#peBags').innerHTML=`<div class="hint">Bags per size:</div>`+(r.packs||[]).map(pk=>`<label class="fld" style="display:inline-flex;margin:6px 10px 0 0;width:120px">${esc(pk)}<input class="peB" data-p="${esc(pk)}" type="number" min="0" value="${b[pk]||''}"></label>`).join('')||'<p class="hint">This recipe has no pack sizes set.</p>'; };
  $('#peRec').onchange=drawBags; drawBags();
  $('#peSave').onclick=()=>{ const r=recById($('#peRec').value); const bags={}; document.querySelectorAll('.peB').forEach(i=>{const n=+i.value||0; if(n)bags[i.dataset.p]=n;});
    const entry={recipeId:r.id,bags}; const p2=loadPlan(); p2[planWeek]=p2[planWeek]||{}; p2[planWeek][day]=p2[planWeek][day]||[];
    if(ix!=null) p2[planWeek][day][ix]=entry; else p2[planWeek][day].push(entry); savePlan(p2); closeModal(); window._drawPlannerDays(); };
}
window.planAdd=planAdd;window.planEdit=planEdit;window.planRemove=planRemove;

function printWeekPlan(){
  const plan=loadPlan(); const wk=plan[planWeek]||{};
  let html=`<div style="font-family:var(--font-body);color:#000;padding:6px">
   <div style="display:flex;justify-content:space-between;border-bottom:2px solid #143644;padding-bottom:6px;margin-bottom:10px">
   <div style="font-family:var(--font-display);font-size:20px;color:#143644">Weekly Pick &amp; Cook Plan</div><div>Week of ${planWeek}</div></div>`;
  DAYS.forEach(day=>{
    const items=wk[day]||[]; if(!items.length)return;
    const pick={}; let cookB={};
    html+=`<h3 style="margin:10px 0 4px;color:#143644">${day}</h3><table style="width:100%;border-collapse:collapse;margin-bottom:6px"><thead><tr><th style="border:1px solid #333;padding:3px 6px;text-align:left">Recipe</th><th style="border:1px solid #333;padding:3px 6px">Bags</th><th style="border:1px solid #333;padding:3px 6px">kg</th></tr></thead><tbody>`;
    items.forEach(it=>{ const r=recById(it.recipeId); if(!r)return; let bags=0,kg=0;
      (r.packs||[]).forEach(p=>{const n=+(it.bags&&it.bags[p])||0; bags+=n; kg+=n*packKg(p); const bk=cookBucket(p); if(n)cookB[bk]=(cookB[bk]||0)+n;});
      (r.ingredients||[]).forEach(li=>{ pick[li.ingId]=(pick[li.ingId]||0)+kg*(+li.kg||0)/100; });
      const sizes=(r.packs||[]).map(p=>`${esc(p)}×${+(it.bags&&it.bags[p])||0}`).join(', ');
      html+=`<tr><td style="border:1px solid #333;padding:3px 6px">${esc(r.brand)} — ${esc(r.name)} <span style="color:#666">(${sizes})</span></td><td style="border:1px solid #333;padding:3px 6px;text-align:right">${fmt(bags)}</td><td style="border:1px solid #333;padding:3px 6px;text-align:right">${fmt(kg,1)}</td></tr>`;
    });
    html+=`</tbody></table>`;
    const cook=Object.keys(cookB).map(b=>{const s=COOK_CATS[b];const c=Math.ceil(cookB[b]/s.bags);return `${b}: ${c} cook(s) ≈ ${c*s.time}h`;}).join(' &nbsp;|&nbsp; ');
    html+=`<div style="margin-bottom:4px"><b>Cook plan:</b> ${cook||'—'}</div>`;
    const picks=Object.keys(pick).sort((a,b)=>ingGroupOf(a)-ingGroupOf(b)||pick[b]-pick[a]);
    html+=`<div><b>Pick (freezer):</b> ${picks.map(id=>`${esc(ingName(id))} ${fmt(pick[id],1)}kg`).join(' · ')||'—'}</div>`;
  });
  html+=`</div>`;
  printHtml(html);
}

function mixSheetHtml(id,batch){

  return `<div class="mixsheet">
   <div class="hd"><div><div class="t">${esc(r.brand)} — ${esc(r.name)}</div><div class="small">Process base: ${fmt(total,0)}kg · Batch this run: <b>${fmt(batch,0)}kg</b></div></div>
     <div class="small">Date: __________  Operator: __________  Batch #: __________</div></div>
   <table><thead><tr><th>#</th><th>Ingredient</th><th style="text-align:right">kg / 100kg</th><th style="text-align:right">kg for ${fmt(batch,0)}kg</th><th>Lot / weighed ✓</th></tr></thead>
   <tbody>${items.map((li,i)=>`<tr><td>${i+1}</td><td>${esc(ingName(li.ingId))}</td><td style="text-align:right">${fmt(li.kg,3)}</td><td style="text-align:right">${fmt((+li.kg||0)/total*batch,3)}</td><td></td></tr>`).join('')}
   <tr><td></td><th>TOTAL</th><th style="text-align:right">${fmt(total,1)}</th><th style="text-align:right">${fmt(batch,1)}</th><td></td></tr></tbody></table>
   <div style="margin-top:10px"><b>Packed off:</b> ${(r.packs||[]).map(p=>`${esc(p)} = __________ bags`).join(' &nbsp;&nbsp; ')||'__________'}</div>
   </div>`;
}

/* shared print: open print window so A4 landscape fits one page */
function printHtml(inner){
  const w=window.open('','_blank'); if(!w){alert('Allow pop-ups to print.');return;}
  w.document.write(`<!doctype html><html><head><title>Print</title><style>
   @page{size:A4 landscape;margin:8mm}
   body{font-family:Arial,Helvetica,sans-serif;color:#000;margin:0;padding:6mm}
   :root{--font-display:"Trebuchet MS",sans-serif;--font-body:Arial,sans-serif}
   table{border-collapse:collapse;width:100%} th,td{border:1px solid #333;padding:4px 6px;font-size:12px}
   .mixsheet .hd{display:flex;justify-content:space-between;border-bottom:2px solid #143644;padding-bottom:6px;margin-bottom:8px}
   .mixsheet .hd .t{font-size:20px;color:#143644;font-weight:700} .small{font-size:11px}
  </style></head><body>${inner}</body></html>`);
  w.document.close(); setTimeout(()=>{w.focus();w.print();},250);
}

/* ============================ 5. RECORD PRODUCTION ============================ */
let prodLines=[];
function renderProduction(v){
  v.innerHTML=`<h1 class="viewtitle">Record Production</h1>
  <p class="sub">Enter what was made — stock is deducted automatically.</p>
  <div class="card">
    <div class="row"><label class="fld" style="max-width:170px">Date<input id="prDate" type="date" value="${todayISO()}"></label></div>
    <div id="prLines" style="margin-top:10px"></div>
    <button class="btn ghost sm" id="prAdd">+ Add line</button>
    <div class="row" style="margin-top:14px"><button class="btn coral" id="prSave">Save day &amp; deduct stock</button><span class="hint" id="prMsg"></span></div>
  </div>
  <h3>Recent production</h3>
  <div class="card" style="padding:0"><table class="responsive"><thead><tr><th>Date</th><th>Product</th><th>Size</th><th class="num">Bags</th><th class="num">kg</th><th>Batch</th><th>By</th><th></th></tr></thead><tbody id="prHist"><tr><td colspan="8" class="muted">Loading…</td></tr></tbody></table></div>`;

function blankLine(){ return {recipeId:'',pack:'',bags:'',batch:''}; }
function drawProdLines(){
  const recs=[...DB.recipes].sort((a,b)=>a.brand.localeCompare(b.brand)||a.name.localeCompare(b.name));
  $('#prLines').innerHTML=prodLines.map((l,i)=>{
    const r=recById(l.recipeId);
    const packs=r?(r.packs||[]):[];
    return `<div class="row" style="align-items:flex-end;border-bottom:1px dashed var(--line);padding-bottom:8px;margin-bottom:8px">
      <label class="fld" style="flex:2">Recipe<select data-i="${i}" class="plRec"><option value="">— choose —</option>${recs.map(x=>`<option value="${x.id}"${x.id===l.recipeId?' selected':''}>${esc(x.brand)} — ${esc(x.name)}</option>`).join('')}</select></label>
      <label class="fld">Size<select data-i="${i}" class="plPack"><option value="">—</option>${packs.map(p=>`<option${p===l.pack?' selected':''}>${esc(p)}</option>`).join('')}</select></label>
      <label class="fld">Bags<input data-i="${i}" class="plBags num" type="number" min="0" value="${l.bags}"></label>
      <label class="fld">Batch #<input data-i="${i}" class="plBatch" value="${esc(l.batch)}"></label>
      <div class="hint" style="flex:1.4">${r&&l.pack&&l.bags?fmt((+l.bags||0)*packKg(l.pack),1)+' kg mix':''}</div>
      <button class="btn danger sm" data-del="${i}">✕</button></div>`;
  }).join('');
  $('#prLines').querySelectorAll('.plRec').forEach(s=>s.onchange=e=>{prodLines[+e.target.dataset.i].recipeId=e.target.value;prodLines[+e.target.dataset.i].pack='';drawProdLines();});
  $('#prLines').querySelectorAll('.plPack').forEach(s=>s.onchange=e=>{prodLines[+e.target.dataset.i].pack=e.target.value;drawProdLines();});
  $('#prLines').querySelectorAll('.plBags').forEach(s=>s.oninput=e=>{prodLines[+e.target.dataset.i].bags=e.target.value;drawProdLines();});
  $('#prLines').querySelectorAll('.plBatch').forEach(s=>s.oninput=e=>{prodLines[+e.target.dataset.i].batch=e.target.value;});
  $('#prLines').querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{prodLines.splice(+e.target.dataset.del,1); if(!prodLines.length)prodLines=[blankLine()]; drawProdLines();});
}
async function saveProduction(){
  const date=$('#prDate').value||todayISO();
  const lines=prodLines.filter(l=>l.recipeId&&l.pack&&(+l.bags>0)).map(l=>{
    const r=recById(l.recipeId);
    return {recipe_id:r.id,product:r.brand+' — '+r.name,pack:l.pack,qty:+l.bags,kg:+( (+l.bags)*packKg(l.pack) ).toFixed(3),batch:l.batch||'',deductions:deductionsFor(r,+l.bags,l.pack)};
  });
  if(!lines.length){ $('#prMsg').textContent='Add at least one complete line.'; return; }
  $('#prMsg').textContent='Saving…';
  try{ await api('/api/production','POST',{date,lines}); await refreshStock(); prodLines=[blankLine()];
    $('#prMsg').textContent='Saved ✓ stock updated.'; drawProdLines(); loadProdHist();
  }catch(e){ $('#prMsg').textContent='Failed: '+e.message; }
}
async function loadProdHist(){
  try{ LISTS.production=await api('/api/production'); }catch(e){ return; }
  $('#prHist').innerHTML=LISTS.production.slice(0,40).map(p=>`<tr>
    <td data-l="Date">${esc(p.date)}</td><td data-l="Product">${esc(p.product)}</td><td data-l="Size">${esc(p.pack)}</td>
    <td data-l="Bags" class="num">${fmt(p.qty)}</td><td data-l="kg" class="num">${fmt(p.kg,1)}</td><td data-l="Batch">${esc(p.batch||'')}</td><td data-l="By">${esc(p.by||'')}</td>
    <td data-l="" class="num"><button class="btn danger sm" onclick="delProd('${p.id}')">✕</button></td></tr>`).join('')||'<tr><td colspan="8" class="muted">No production recorded yet.</td></tr>';
}
async function delProd(id){ if(!confirm('Delete this production line? Stock used will be restored.'))return; await api('/api/production/'+encodeURIComponent(id),'DELETE'); await refreshStock(); loadProdHist(); }
window.delProd=delProd;

/* ============================ 6. STOCK ============================ */
function renderStock(v){
  const alerts=DB.stock.filter(s=>s.status!=='ok');
  v.innerHTML=`<h1 class="viewtitle">Stock</h1>
  <p class="sub">Live levels. Remaining = opening + deliveries + stocktake − used.</p>
  <div class="kpis">
    <div class="kpi"><div class="n">${DB.stock.length}</div><div class="l">Ingredients</div></div>
    <div class="kpi warnk"><div class="n">${DB.stock.filter(s=>s.status==='low').length}</div><div class="l">Low</div></div>
    <div class="kpi alarm"><div class="n">${DB.stock.filter(s=>s.status==='out').length}</div><div class="l">Out / negative</div></div>
  </div>
  <div class="toolbar"><input id="stSearch" placeholder="Search…" style="min-width:180px">
    <label class="small"><input type="checkbox" id="stAlert"> Only alerts</label>
    <span class="spacer"></span><button class="btn ghost sm" id="stRefresh">↻ Refresh</button></div>
  <div class="card" style="padding:0"><table class="responsive"><thead><tr><th>Ingredient</th><th class="num">Opening</th><th class="num">Deliv.</th><th class="num">Stocktake</th><th class="num">Used</th><th class="num">Remaining</th><th class="num">Re-order</th><th>Status</th><th></th></tr></thead><tbody id="stBody"></tbody></table></div>`;
  const draw=()=>{
    const q=($('#stSearch').value||'').toLowerCase(), only=$('#stAlert').checked;
    let list=DB.stock.filter(s=>(!q||s.name.toLowerCase().includes(q))&&(!only||s.status!=='ok'));
    list.sort((a,b)=>({out:0,low:1,ok:2}[a.status]-{out:0,low:1,ok:2}[b.status])||a.name.localeCompare(b.name));
    $('#stBody').innerHTML=list.map(s=>`<tr>
      <td data-l="Ingredient"><b>${esc(s.name)}</b><br><span class="muted small">${esc(s.category||'')}</span></td>
      <td data-l="Opening" class="num">${fmt(s.opening,1)}</td><td data-l="Deliv." class="num">${fmt(s.deliveries,1)}</td>
      <td data-l="Stocktake" class="num">${fmt(s.adjustments,1)}</td><td data-l="Used" class="num">${fmt(s.used,1)}</td>
      <td data-l="Remaining" class="num"><b>${fmt(s.remaining,1)}</b></td><td data-l="Re-order" class="num">${fmt(s.reorder,1)}</td>
      <td data-l="Status"><span class="pill ${s.status}">${s.status}</span></td>
      <td data-l="" class="num"><button class="btn ghost sm" onclick="stocktake('${s.id}')">Count</button> <button class="btn ghost sm" onclick="stockSet('${s.id}')">Set</button></td></tr>`).join('')||'<tr><td colspan="9" class="muted">None.</td></tr>';
  };
  $('#stSearch').oninput=draw;$('#stAlert').onchange=draw;
  $('#stRefresh').onclick=async()=>{await refreshStock();draw();};
  draw();
}
function stockSet(id){
  const s=DB.stock.find(x=>x.id===id);
  modal(`<h3>Stock settings — ${esc(s.name)}</h3>
   <div class="row"><label class="fld">Opening balance (kg)<input id="soOpen" type="number" value="${s.opening}"></label>
   <label class="fld">Re-order point (kg)<input id="soRe" type="number" value="${s.reorder}"></label>
   <label class="fld">Supplier<input id="soSup" value="${esc(s.supplier||'')}"></label></div>
   <p class="hint" style="margin-top:8px">Opening is the starting balance; day-to-day changes should be deliveries or a stocktake count.</p>
   <div class="row" style="margin-top:12px"><button class="btn" id="soSave">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`);
  $('#soSave').onclick=async()=>{ await api('/api/stock','PUT',{ing_id:id,opening:+$('#soOpen').value||0,reorder:+$('#soRe').value||0,supplier:$('#soSup').value}); await refreshStock(); closeModal(); renderTab('stock'); };
}
function stocktake(id){
  const s=DB.stock.find(x=>x.id===id);
  modal(`<h3>Stocktake — ${esc(s.name)}</h3>
   <p class="hint">System shows <b>${fmt(s.remaining,1)} kg</b>. Enter the actual counted amount; we'll log the difference.</p>
   <div class="row"><label class="fld">Actual counted (kg)<input id="ctActual" type="number" value="${fmt(s.remaining,1)}"></label>
   <label class="fld" style="flex:2">Reason / note<input id="ctReason" placeholder="e.g. monthly stocktake"></label></div>
   <div class="row" style="margin-top:12px"><button class="btn" id="ctSave">Record</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`);
  $('#ctSave').onclick=async()=>{ const actual=+$('#ctActual').value||0; const delta=+(actual-s.remaining).toFixed(3);
    await api('/api/adjustments','POST',{date:todayISO(),ing_id:id,delta,reason:$('#ctReason').value||'stocktake'}); await refreshStock(); closeModal(); renderTab('stock'); };
}
window.stockSet=stockSet;window.stocktake=stocktake;

/* ============================ 7. DELIVERIES ============================ */
function renderDeliveries(v){
  const ings=[...DB.ingredients].sort((a,b)=>a.name.localeCompare(b.name));
  const sups=[...DB.suppliers].sort((a,b)=>a.name.localeCompare(b.name));
  v.innerHTML=`<h1 class="viewtitle">Deliveries (Goods In)</h1>
  <p class="sub">Log a delivery — it adds to stock.</p>
  <div class="card"><div class="row">
    <label class="fld">Date<input id="dvDate" type="date" value="${todayISO()}"></label>
    <label class="fld" style="flex:2">Supplier<input id="dvSup" list="supList" placeholder="Supplier"><datalist id="supList">${sups.map(s=>`<option value="${esc(s.name)}">`).join('')}</datalist></label>
    <label class="fld" style="flex:2">Ingredient<select id="dvIng"><option value="">—</option>${ings.map(i=>`<option value="${i.id}">${esc(i.name)}</option>`).join('')}</select></label>
    <label class="fld">Qty (kg)<input id="dvQty" type="number" min="0"></label>
  </div>
  <div class="row" style="margin-top:8px">
    <label class="fld">Description<input id="dvDescr"></label>
    <label class="fld">Ref / PO<input id="dvRef"></label>
    <label class="fld">Batch / lot<input id="dvBatch"></label>
    <label class="fld">Temp °C<input id="dvTemp"></label>
    <label class="fld">Vehicle clean<input id="dvVeh" placeholder="Y/N"></label>
    <label class="fld">Quality OK<input id="dvQual" placeholder="Y/N"></label>
    <label class="fld">Approved supplier<input id="dvAppr" placeholder="Y/N"></label>
    <label class="fld">Initials<input id="dvInit"></label>
  </div>
  <div class="row" style="margin-top:12px"><button class="btn coral" id="dvSave">Add delivery</button><span class="hint" id="dvMsg"></span></div></div>
  <h3>Recent deliveries</h3>
  <div class="card" style="padding:0"><table class="responsive"><thead><tr><th>Date</th><th>Supplier</th><th>Ingredient</th><th class="num">Qty kg</th><th>Batch</th><th>By</th><th></th></tr></thead><tbody id="dvHist"><tr><td colspan="7" class="muted">Loading…</td></tr></tbody></table></div>`;
  $('#dvSave').onclick=async()=>{
    if(!$('#dvIng').value||!(+$('#dvQty').value>0)){ $('#dvMsg').textContent='Pick an ingredient and quantity.'; return; }
    $('#dvMsg').textContent='Saving…';
    try{ await api('/api/deliveries','POST',{date:$('#dvDate').value,supplier:$('#dvSup').value,ing_id:$('#dvIng').value,descr:$('#dvDescr').value,qty:+$('#dvQty').value,ref:$('#dvRef').value,batch:$('#dvBatch').value,temp:$('#dvTemp').value,veh:$('#dvVeh').value,qual:$('#dvQual').value,approved:$('#dvAppr').value,initials:$('#dvInit').value});
      await refreshStock(); ['dvQty','dvDescr','dvRef','dvBatch','dvTemp','dvInit'].forEach(id=>$('#'+id).value=''); $('#dvMsg').textContent='Saved ✓'; loadDvHist();
    }catch(e){ $('#dvMsg').textContent='Failed: '+e.message; }
  };
  loadDvHist();
}
async function loadDvHist(){
  try{ LISTS.deliveries=await api('/api/deliveries'); }catch(e){return;}
  $('#dvHist').innerHTML=LISTS.deliveries.slice(0,40).map(d=>`<tr>
    <td data-l="Date">${esc(d.date)}</td><td data-l="Supplier">${esc(d.supplier)}</td><td data-l="Ingredient">${esc(ingName(d.ing_id))}</td>
    <td data-l="Qty kg" class="num">${fmt(d.qty,1)}</td><td data-l="Batch">${esc(d.batch||'')}</td><td data-l="By">${esc(d.by||'')}</td>
    <td data-l="" class="num"><button class="btn danger sm" onclick="delDeliv('${d.id}')">✕</button></td></tr>`).join('')||'<tr><td colspan="7" class="muted">None yet.</td></tr>';
}
async function delDeliv(id){ if(!confirm('Delete delivery? Stock will be reduced.'))return; await api('/api/deliveries/'+encodeURIComponent(id),'DELETE'); await refreshStock(); loadDvHist(); }
window.delDeliv=delDeliv;

/* ============================ 8. STOCKTAKE / ADJUSTMENTS ============================ */
function renderAdjustments(v){
  const ings=[...DB.ingredients].sort((a,b)=>a.name.localeCompare(b.name));
  v.innerHTML=`<h1 class="viewtitle">Stocktake &amp; Adjustments</h1>
  <p class="sub">Corrections to stock (waste, recount, write-off). Use the Stock tab's “Count” for a full count.</p>
  <div class="card"><div class="row">
    <label class="fld">Date<input id="ajDate" type="date" value="${todayISO()}"></label>
    <label class="fld" style="flex:2">Ingredient<select id="ajIng"><option value="">—</option>${ings.map(i=>`<option value="${i.id}">${esc(i.name)}</option>`).join('')}</select></label>
    <label class="fld">Change (kg ±)<input id="ajDelta" type="number" placeholder="-5 or 12"></label>
    <label class="fld" style="flex:2">Reason<input id="ajReason"></label>
  </div><div class="row" style="margin-top:12px"><button class="btn coral" id="ajSave">Record</button><span class="hint" id="ajMsg"></span></div></div>
  <h3>Recent adjustments</h3>
  <div class="card" style="padding:0"><table class="responsive"><thead><tr><th>Date</th><th>Ingredient</th><th class="num">Change</th><th>Reason</th><th>By</th><th></th></tr></thead><tbody id="ajHist"><tr><td colspan="6" class="muted">Loading…</td></tr></tbody></table></div>`;
  $('#ajSave').onclick=async()=>{ if(!$('#ajIng').value||!$('#ajDelta').value){ $('#ajMsg').textContent='Pick ingredient and a change.'; return; }
    try{ await api('/api/adjustments','POST',{date:$('#ajDate').value,ing_id:$('#ajIng').value,delta:+$('#ajDelta').value,reason:$('#ajReason').value}); await refreshStock(); $('#ajDelta').value='';$('#ajReason').value=''; $('#ajMsg').textContent='Saved ✓'; loadAjHist();
    }catch(e){ $('#ajMsg').textContent='Failed: '+e.message; } };
  loadAjHist();
}
async function loadAjHist(){
  try{ LISTS.adjustments=await api('/api/adjustments'); }catch(e){return;}
  $('#ajHist').innerHTML=LISTS.adjustments.slice(0,40).map(a=>`<tr>
    <td data-l="Date">${esc(a.date)}</td><td data-l="Ingredient">${esc(ingName(a.ing_id))}</td>
    <td data-l="Change" class="num" style="color:${a.delta<0?'var(--out)':'var(--ok)'}">${a.delta>0?'+':''}${fmt(a.delta,1)}</td>
    <td data-l="Reason">${esc(a.reason||'')}</td><td data-l="By">${esc(a.by||'')}</td>
    <td data-l="" class="num"><button class="btn danger sm" onclick="delAdj('${a.id}')">✕</button></td></tr>`).join('')||'<tr><td colspan="6" class="muted">None yet.</td></tr>';
}
async function delAdj(id){ if(!confirm('Delete adjustment?'))return; await api('/api/adjustments/'+encodeURIComponent(id),'DELETE'); await refreshStock(); loadAjHist(); }
window.delAdj=delAdj;

/* ============================ 9. PACKAGING ============================ */
function renderPackaging(v){
  v.innerHTML=`<h1 class="viewtitle">Packaging &amp; Finished Goods</h1>
  <p class="sub">${DB.packaging.length} items.</p>
  <div class="toolbar"><input id="pkSearch" placeholder="Search…" style="min-width:180px"><span class="spacer"></span><button class="btn coral" id="pkAdd">+ Add item</button></div>
  <div class="card" style="padding:0"><table class="responsive"><thead><tr><th>Item</th><th>Type</th><th class="num">Qty</th><th class="num">Re-order</th><th>Status</th><th></th></tr></thead><tbody id="pkBody"></tbody></table></div>`;
  const draw=()=>{ const q=($('#pkSearch').value||'').toLowerCase();
    const list=DB.packaging.filter(p=>!q||(p.name+' '+(p.type||'')).toLowerCase().includes(q)).sort((a,b)=>a.name.localeCompare(b.name));
    $('#pkBody').innerHTML=list.map(p=>{ const st=p.reorder>0?(p.qty<=0?'out':(p.qty<=p.reorder?'low':'ok')):(p.qty<0?'out':'ok');
      return `<tr><td data-l="Item"><b>${esc(p.name)}</b></td><td data-l="Type">${esc(p.type||'')}</td><td data-l="Qty" class="num">${fmt(p.qty)}</td><td data-l="Re-order" class="num">${fmt(p.reorder)}</td><td data-l="Status"><span class="pill ${st}">${st}</span></td><td data-l="" class="num"><button class="btn ghost sm" onclick="editPkg('${p.id}')">Edit</button></td></tr>`;}).join('')||'<tr><td colspan="6" class="muted">None.</td></tr>';
  };
  $('#pkSearch').oninput=draw; $('#pkAdd').onclick=()=>editPkg(null); draw();
}
const PKG_TYPES=['Packaging (bag)','Packaging (pouch)','Packaging (label)','Packaging (box)','Treats','Finished goods','Other'];
function editPkg(id){
  const p=id?DB.packaging.find(x=>x.id===id):{id:null,name:'',type:'Packaging (bag)',qty:0,reorder:0};
  modal(`<h3>${id?'Edit':'New'} packaging item</h3>
   <div class="row"><label class="fld" style="flex:2">Name<input id="pkName" value="${esc(p.name)}"></label>
   <label class="fld">Type<select id="pkType">${PKG_TYPES.map(t=>`<option${t===p.type?' selected':''}>${esc(t)}</option>`).join('')}</select></label></div>
   <div class="row" style="margin-top:8px"><label class="fld">Quantity<input id="pkQty" type="number" value="${p.qty}"></label>
   <label class="fld">Re-order point<input id="pkRe" type="number" value="${p.reorder}"></label></div>
   <div class="row" style="margin-top:12px"><button class="btn" id="pkSave">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button><span class="spacer"></span>${id?`<button class="btn danger" id="pkDel">Delete</button>`:''}</div>`);
  $('#pkSave').onclick=async()=>{ const body={name:$('#pkName').value.trim(),type:$('#pkType').value,qty:+$('#pkQty').value||0,reorder:+$('#pkRe').value||0};
    if(!body.name){alert('Name required');return;}
    if(id) await api('/api/packaging/'+encodeURIComponent(id),'PUT',body); else await api('/api/packaging','POST',body);
    DB.packaging=await api('/api/packaging'); closeModal(); renderTab('packaging'); };
  const del=$('#pkDel'); if(del) del.onclick=async()=>{ if(!confirm('Delete item?'))return; await api('/api/packaging/'+encodeURIComponent(id),'DELETE'); DB.packaging=await api('/api/packaging'); closeModal(); renderTab('packaging'); };
}
window.editPkg=editPkg;

/* ============================ 10. SUPPLIERS ============================ */
function renderSuppliers(v){
  v.innerHTML=`<h1 class="viewtitle">Suppliers</h1>
  <p class="sub">${DB.suppliers.length} approved suppliers.</p>
  <div class="toolbar"><input id="suSearch" placeholder="Search…" style="min-width:200px"><span class="spacer"></span><button class="btn coral" id="suAdd">+ Add supplier</button></div>
  <div class="card" style="padding:0"><table class="responsive"><thead><tr><th>Trading name</th><th>Approval</th><th>Product</th><th>Activity</th><th>Post code</th><th></th></tr></thead><tbody id="suBody"></tbody></table></div>`;
  const draw=()=>{ const q=($('#suSearch').value||'').toLowerCase();
    const list=DB.suppliers.filter(s=>!q||(s.name+' '+(s.product||'')+' '+(s.approval||'')).toLowerCase().includes(q)).sort((a,b)=>a.name.localeCompare(b.name));
    $('#suBody').innerHTML=list.map(s=>`<tr><td data-l="Name"><b>${esc(s.name)}</b><br><span class="muted small">${esc(s.address||'')}</span></td><td data-l="Approval">${esc(s.approval||'')}</td><td data-l="Product">${esc(s.product||'')}</td><td data-l="Activity">${esc(s.activity||'')}</td><td data-l="Post code">${esc(s.postcode||'')}</td><td data-l="" class="num"><button class="btn ghost sm" onclick="editSup('${s.id}')">Edit</button></td></tr>`).join('')||'<tr><td colspan="6" class="muted">None.</td></tr>';
  };
  $('#suSearch').oninput=draw; $('#suAdd').onclick=()=>editSup(null); draw();
}
function editSup(id){
  const s=id?DB.suppliers.find(x=>x.id===id):{id:null,name:'',approval:'',product:'',activity:'',address:'',postcode:''};
  modal(`<h3>${id?'Edit':'New'} supplier</h3>
   <div class="row"><label class="fld" style="flex:2">Trading name<input id="suName" value="${esc(s.name)}"></label><label class="fld">Approval no.<input id="suAppr" value="${esc(s.approval||'')}"></label></div>
   <div class="row" style="margin-top:8px"><label class="fld" style="flex:2">Product<input id="suProd" value="${esc(s.product||'')}"></label><label class="fld">Activity<input id="suAct" value="${esc(s.activity||'')}"></label></div>
   <div class="row" style="margin-top:8px"><label class="fld" style="flex:2">Address<input id="suAddr" value="${esc(s.address||'')}"></label><label class="fld">Post code<input id="suPc" value="${esc(s.postcode||'')}"></label></div>
   <div class="row" style="margin-top:12px"><button class="btn" id="suSave">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button><span class="spacer"></span>${id?`<button class="btn danger" id="suDel">Delete</button>`:''}</div>`);
  $('#suSave').onclick=async()=>{ const body={name:$('#suName').value.trim(),approval:$('#suAppr').value,product:$('#suProd').value,activity:$('#suAct').value,address:$('#suAddr').value,postcode:$('#suPc').value};
    if(!body.name){alert('Name required');return;}
    if(id) await api('/api/suppliers/'+encodeURIComponent(id),'PUT',body); else await api('/api/suppliers','POST',body);
    DB.suppliers=await api('/api/suppliers'); closeModal(); renderTab('suppliers'); };
  const del=$('#suDel'); if(del) del.onclick=async()=>{ if(!confirm('Delete supplier?'))return; await api('/api/suppliers/'+encodeURIComponent(id),'DELETE'); DB.suppliers=await api('/api/suppliers'); closeModal(); renderTab('suppliers'); };
}
window.editSup=editSup;

/* ============================ 11. USERS (admin) ============================ */
async function renderUsers(v){
  v.innerHTML=`<h1 class="viewtitle">Users</h1><p class="sub">Manage who can sign in.</p>
   <div class="toolbar"><span class="spacer"></span><button class="btn coral" id="usAdd">+ Add user</button></div>
   <div class="card" style="padding:0"><table class="responsive"><thead><tr><th>Username</th><th>Role</th><th>Created</th></tr></thead><tbody id="usBody"><tr><td colspan="3" class="muted">Loading…</td></tr></tbody></table></div>`;
  $('#usAdd').onclick=()=>{
    modal(`<h3>Add user</h3><div class="row"><label class="fld">Username<input id="nuUser" autocapitalize="none"></label>
     <label class="fld">Password<input id="nuPass" type="text"></label>
     <label class="fld">Role<select id="nuRole"><option value="staff">staff</option><option value="admin">admin</option></select></label></div>
     <div class="row" style="margin-top:12px"><button class="btn" id="nuSave">Create</button><button class="btn ghost" onclick="closeModal()">Cancel</button><span class="hint" id="nuMsg"></span></div>`);
    $('#nuSave').onclick=async()=>{ try{ await api('/api/users','POST',{username:$('#nuUser').value,password:$('#nuPass').value,role:$('#nuRole').value}); closeModal(); renderTab('users'); }catch(e){ $('#nuMsg').textContent=e.message; } };
  };
  try{ LISTS.users=await api('/api/users');
    $('#usBody').innerHTML=LISTS.users.map(u=>`<tr><td data-l="Username"><b>${esc(u.username)}</b></td><td data-l="Role">${esc(u.role)}</td><td data-l="Created">${esc((u.created||'').slice(0,10))}</td></tr>`).join('');
  }catch(e){ $('#usBody').innerHTML=`<tr><td colspan="3" class="muted">${esc(e.message)}</td></tr>`; }
}
</script>
</body>
</html>
