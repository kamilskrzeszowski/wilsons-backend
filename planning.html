<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Wilsons HQ — Planning</title>
<style>
@font-face{font-family:'Bobby Jones';src:url('/assets/BobbyJones-Regular.otf') format('opentype');font-weight:400;font-display:swap;}
@font-face{font-family:'Effra';src:url('/assets/Effra_Rg.ttf') format('truetype');font-weight:400;font-display:swap;}
@font-face{font-family:'Effra';src:url('/assets/Effra_Md.ttf') format('truetype');font-weight:600;font-display:swap;}
@font-face{font-family:'Effra';src:url('/assets/Effra_Bd.ttf') format('truetype');font-weight:700;font-display:swap;}
:root{
  --navy:#143644;--slate:#4b5f6d;--cream:#e0ddcb;--coral:#f37d89;--coral-deep:#e2606c;
  --bg:#f7f4ec;--card:#fff;--ink:#143644;--muted:#6f7b82;--line:#e2ddcd;--chip:#eef0ea;
  --p-high:#c0563b;--p-med:#e0a13f;--p-low:#4b5f6d;--p-none:#b3bcc0;
  --fd:'Bobby Jones','Poppins','Trebuchet MS',sans-serif;
  --fb:'Effra',-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--fb);-webkit-font-smoothing:antialiased;}
.wrap{max-width:760px;margin:0 auto;padding-bottom:90px;transition:max-width .2s ease;}
.wrap.sched-wide{max-width:min(96vw,1180px);}
.topbar{background:var(--navy);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:5;}
.topbar img{height:28px;width:auto;}
.topbar .brand{font-family:var(--fd);font-size:18px;letter-spacing:.3px;}
.topbar .home{color:#fff;opacity:.85;text-decoration:none;font-size:13px;border:1px solid rgba(255,255,255,.3);padding:5px 11px;border-radius:8px;}
.topbar .sp{flex:1;}
.topbar .who{display:flex;align-items:center;gap:8px;font-size:13px;opacity:.92;}
.topbar .who .av{width:27px;height:27px;border-radius:50%;background:var(--coral-deep);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;}
.head{padding:20px 20px 6px;}
.head h1{font-family:var(--fd);font-size:30px;margin:0;color:var(--navy);letter-spacing:.2px;}
.head p{margin:4px 0 0;color:var(--muted);font-size:14px;}
.tabs{display:flex;gap:6px;padding:12px 16px 4px;overflow-x:auto;}
.tabs .t{white-space:nowrap;padding:8px 15px;border-radius:20px;font-size:14px;font-weight:600;color:var(--slate);background:transparent;cursor:pointer;}
.tabs .t.on{background:var(--navy);color:#fff;}
.section{padding:8px 16px 20px;}
.filterbar{display:flex;gap:8px;padding:2px 16px 10px;flex-wrap:wrap;}
.filterbar input{flex:2;min-width:140px;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-family:var(--fb);font-size:14px;background:#fff;outline:none;}
.filterbar select{flex:1;min-width:112px;border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-family:var(--fb);font-size:13.5px;background:#fff;outline:none;color:var(--slate);}
.grp{margin-top:14px;}
.grp .lbl{font-size:11.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:6px 4px;}
.grp .lbl.danger{color:var(--p-high);}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;}
.task{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px;box-shadow:0 3px 10px -8px rgba(20,54,68,.25);}
.check{width:22px;height:22px;border-radius:50%;border:2px solid var(--p-none);flex:none;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:.15s;}
.task.done .check{background:#2f7d57;border-color:#2f7d57;}
.task.done .check:before{content:'\2713';}
.task .body{flex:1;min-width:0;}
.task .title{font-size:15px;font-weight:600;color:var(--ink);line-height:1.3;}
.task.done .title{text-decoration:line-through;color:#9aa6ab;}
.task .meta{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap;}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:8px;}
.pill.proj{color:#fff;}
.pill.due{background:var(--chip);color:var(--slate);cursor:pointer;}
.pill.due.over{background:#f8e3de;color:var(--p-high);}
.pill.due.nodate{opacity:.55;}
.pill.cl{background:var(--chip);color:var(--slate);}
.pdot{width:9px;height:9px;border-radius:50%;flex:none;}
.assignee{display:inline-flex;align-items:center;gap:6px;background:var(--chip);border-radius:20px;padding:3px 10px 3px 3px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--slate);}
.assignee .av{width:22px;height:22px;border-radius:50%;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.assignee.mine{background:#e7efe9;color:#2f6b4d;}
.person{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:11px;box-shadow:0 3px 10px -8px rgba(20,54,68,.25);}
.person .ph{display:flex;align-items:center;gap:12px;}
.person .av{width:40px;height:40px;border-radius:50%;color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex:none;}
.person .pn{font-family:var(--fd);font-size:17px;color:var(--navy);}
.person .pr{font-size:12.5px;color:var(--muted);margin-top:1px;}
.person .cnt{margin-left:auto;text-align:right;}
.person .cnt b{font-size:20px;color:var(--navy);}
.person .cnt span{display:block;font-size:11px;color:var(--muted);}
.person .plist{margin-top:12px;border-top:1px solid var(--line);padding-top:6px;}
.person .pt{display:flex;align-items:center;gap:10px;padding:8px 2px;font-size:14px;}
.person .pt .ptt{flex:1;min-width:0;}
.person .pt .ptd{font-size:12px;color:var(--muted);}
.person .pt.done .ptt{text-decoration:line-through;color:#9aa6ab;}
.person .smallcheck{width:18px;height:18px;border-radius:50%;border:2px solid var(--p-none);flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;}
.person .pt.done .smallcheck{background:#2f7d57;border-color:#2f7d57;}
.person .pt.done .smallcheck:before{content:'\2713';}
.project{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:11px;box-shadow:0 3px 10px -8px rgba(20,54,68,.25);}
.project .prh{display:flex;align-items:center;gap:11px;}
.project .swatch{width:12px;height:34px;border-radius:5px;flex:none;}
.project .prn{font-family:var(--fd);font-size:17px;color:var(--navy);}
.project .prm{font-size:12.5px;color:var(--muted);margin-top:1px;}
.project .bar{height:7px;border-radius:6px;background:#ece7d8;margin-top:12px;overflow:hidden;}
.project .bar i{display:block;height:100%;border-radius:6px;}
.project .prt{display:flex;align-items:center;gap:9px;padding:6px 2px;font-size:13.5px;margin-top:2px;}
.project .prt.done .x{text-decoration:line-through;color:#9aa6ab;}
.project .prt .x{flex:1;}
.mini-av{width:20px;height:20px;border-radius:50%;color:#fff;font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;}
.newproj{margin-top:6px;color:var(--coral-deep);font-weight:700;font-size:14px;cursor:pointer;padding:8px 4px;display:inline-block;}
.project .practs{display:flex;gap:16px;margin-top:10px;padding-top:9px;border-top:1px solid var(--line);}
.project .pract{font-size:12.5px;font-weight:700;color:var(--slate);cursor:pointer;}
.project .pract.danger{color:var(--p-high);}
.swrow{display:flex;gap:9px;flex-wrap:wrap;margin-top:2px;}
.sw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.sw.on{border-color:var(--navy);box-shadow:0 0 0 2px #fff inset;}
/* Routines (recurring tasks) */
.routine{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px;box-shadow:0 3px 10px -8px rgba(20,54,68,.25);}
.routine.paused{opacity:.55;}
.routine .rh{display:flex;align-items:center;gap:10px;}
.routine .rico{width:30px;height:30px;border-radius:50%;background:var(--chip);color:var(--slate);flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;}
.routine .rt{flex:1;min-width:0;}
.routine .rtt{font-size:15px;font-weight:600;color:var(--ink);}
.routine .rtd{font-size:12.5px;color:var(--muted);margin-top:2px;}
.routine .racts{display:flex;gap:6px;flex:none;}
.routine .ract{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 9px;font-size:12px;font-weight:600;color:var(--slate);cursor:pointer;}
.routine .ract.danger{color:var(--p-high);border-color:#f0d3cc;}
.repeat-ico{display:inline-flex;width:16px;height:16px;border-radius:50%;background:var(--chip);color:var(--slate);align-items:center;justify-content:center;font-size:10px;flex:none;margin-right:2px;}
.newroutine{color:var(--coral-deep);font-weight:700;font-size:14px;cursor:pointer;padding:8px 4px;display:inline-block;}
.sheet .dowrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
.sheet .dowbtn{border:1px solid var(--line);background:#fbfaf6;border-radius:10px;padding:8px 4px;font-size:12.5px;font-weight:700;color:var(--slate);text-align:center;cursor:pointer;flex:1;min-width:38px;}
.sheet .dowbtn.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.sheet .subrow{display:none;}
.sheet .subrow.on{display:block;}
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;background:var(--coral-deep);color:#fff;border:none;border-radius:26px;height:50px;padding:0 24px;font-family:var(--fb);font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;cursor:pointer;box-shadow:0 12px 26px -8px rgba(226,96,108,.6);z-index:10;}
.fab b{font-size:20px;font-weight:400;}
.scrim{position:fixed;inset:0;background:rgba(20,54,68,.4);z-index:20;display:none;}
.scrim.on{display:block;}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;background:#fff;border-radius:22px 22px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));z-index:21;transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);}
.sheet.on{transform:translateY(0);}
.sheet h3{font-family:var(--fd);font-size:20px;margin:0 0 8px;color:var(--navy);}
.sheet label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:12px 0 6px;}
.sheet input,.sheet select,.sheet textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px;font-family:var(--fb);font-size:16px;color:var(--ink);background:#fbfaf6;outline:none;}
.sheet textarea{resize:vertical;}
.sheet .row{display:flex;gap:10px;}
.sheet .row>div{flex:1;}
.sheet .go{margin-top:18px;width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;height:48px;font-family:var(--fb);font-size:15px;font-weight:700;cursor:pointer;}
.sheet .cancel{position:absolute;top:20px;right:20px;color:var(--muted);cursor:pointer;font-size:14px;}
/* Task detail (v29): a taller, internally-scrolling sheet — fields + activity trail together. */
.sheet.tall{max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.td-topline{display:flex;align-items:center;gap:10px;margin-bottom:2px;padding-right:64px;}
.td-topline h3{margin:0;}
.td-status{font-size:12.5px;font-weight:700;padding:6px 13px;border-radius:20px;background:var(--chip);color:var(--slate);cursor:pointer;white-space:nowrap;flex:none;}
.td-status.done{background:#e7efe9;color:#2f6b4d;}
.td-divider{height:1px;background:var(--line);margin:22px 0 14px;}
.td-acthead{font-size:11.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.act{display:flex;gap:10px;margin-bottom:14px;}
.act-av{width:26px;height:26px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;}
.act-body{flex:1;min-width:0;}
.act-line{font-size:13.5px;color:var(--ink);line-height:1.5;}
.act-line b{font-weight:700;}
.act-time{color:var(--muted);font-size:11.5px;margin-left:6px;white-space:nowrap;}
.act-head{display:flex;align-items:baseline;gap:6px;font-size:13.5px;margin-bottom:4px;}
.act-bubble{background:var(--chip);border-radius:10px;padding:9px 12px;font-size:13.5px;color:var(--ink);line-height:1.4;white-space:pre-wrap;}
.td-commentrow{display:flex;gap:8px;margin-top:4px;padding:10px 0 4px;}
.td-commentrow input{flex:1;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-family:var(--fb);font-size:15px;background:#fbfaf6;outline:none;}
.td-commentgo{background:var(--navy);color:#fff;border-radius:11px;padding:0 16px;display:flex;align-items:center;font-weight:700;font-size:13.5px;cursor:pointer;flex:none;}
.task .cl{margin-top:8px;padding-left:30px;display:flex;flex-direction:column;gap:5px;}
.task .cl .cl-item{padding:3px 2px;}
.cl-item{display:flex;align-items:center;gap:10px;padding:7px 2px;}
.cl-check{width:19px;height:19px;border-radius:50%;border:2px solid var(--p-none);flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;}
.cl-item.done .cl-check{background:#2f7d57;border-color:#2f7d57;}
.cl-item.done .cl-check:before{content:'\2713';}
.cl-text{flex:1;font-size:14px;color:var(--ink);}
.cl-item.done .cl-text{text-decoration:line-through;color:#9aa6ab;}
.cl-rm{color:var(--muted);cursor:pointer;font-size:17px;line-height:1;padding:0 4px;}
.cl-empty{color:var(--muted);font-size:13px;padding:2px 0 4px;}
.cl-addrow{display:flex;gap:8px;margin-top:6px;}
.cl-addrow input{flex:1;border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-family:var(--fb);font-size:14px;background:#fbfaf6;outline:none;}
.cl-addgo{background:var(--chip);color:var(--slate);border-radius:11px;padding:0 14px;display:flex;align-items:center;font-weight:700;font-size:13px;cursor:pointer;flex:none;}
.menu{position:fixed;background:#fff;border-radius:14px;padding:6px;box-shadow:0 14px 40px -10px rgba(20,54,68,.4),0 0 0 1px var(--line);z-index:30;min-width:200px;}
.menu .cap{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:6px 11px 4px;}
.menu .mi{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;cursor:pointer;font-size:14px;}
.menu .mi:hover{background:var(--bg);}
.menu .mi .tick{margin-left:auto;color:#2f7d57;}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;background:var(--navy);color:#fff;padding:11px 17px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:40;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);}
/* Daily digest settings (v33) */
.topbar .digest{color:#fff;opacity:.85;cursor:pointer;font-size:13px;border:1px solid rgba(255,255,255,.3);padding:5px 11px;border-radius:8px;}
.dg-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;}
.dg-switch{width:44px;height:26px;border-radius:14px;background:var(--p-none);position:relative;cursor:pointer;flex:none;transition:.15s;}
.dg-switch.on{background:#2f7d57;}
.dg-switch i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s;}
.dg-switch.on i{left:21px;}
/* Schedule (month view, v32) */
.sched-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sched-nav{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--slate);flex:none;}
.sched-title{font-family:var(--fd);font-size:17px;color:var(--navy);flex:1;text-align:center;}
.sched-today{font-size:12px;font-weight:700;color:var(--coral-deep);cursor:pointer;flex:none;}
.sched-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.sched-dow span{text-align:center;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;}
.sched-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.sched-cell{min-height:90px;border-radius:10px;background:var(--card);border:1px solid var(--line);display:flex;flex-direction:column;gap:2px;padding:4px;cursor:pointer;overflow:hidden;}
.sched-cell.out{opacity:.35;}
.sched-cell.today{border-color:var(--navy);border-width:2px;}
.sched-cell .dn{font-size:11px;font-weight:700;color:var(--ink);padding:1px 2px 2px;}
.sched-chip{font-size:9.5px;line-height:1.35;font-weight:700;padding:2px 4px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sched-chip.high{background:#f8e3de;color:#8a3a24;}
.sched-chip.med{background:#fbeed7;color:#7a561f;}
.sched-chip.low{background:var(--chip);color:#414f4a;}
.sched-chip.routine{background:none;border:1px dashed #b9c0af;color:#5c6b64;}
.sched-more{font-size:9px;font-weight:700;color:var(--muted);padding:0 4px;}
.sched-legend{margin-top:12px;font-size:12px;color:var(--muted);}
.day-item{display:flex;align-items:center;gap:10px;padding:8px 2px;}
.day-item .dtxt{flex:1;font-size:14px;color:var(--slate);}
</style>
</head>
<body>
<div class="topbar">
  <a class="home" href="/">&#9166; HQ</a>
  <img src="/assets/logo-grapefruit.svg" alt="" onerror="this.style.display='none'">
  <span class="brand">Planning</span>
  <span class="sp"></span>
  <span class="digest" data-act="opendigest">✉️ Digest</span>
  <span class="who" id="who"></span>
</div>
<div class="wrap">
  <div class="head"><h1>Planning</h1><p id="sub">Loading…</p></div>
  <div class="tabs" id="tabs"></div>
  <div class="filterbar" id="filterbar">
    <input id="search-box" placeholder="Search tasks…">
    <select id="filter-project"></select>
    <select id="filter-assignee"></select>
  </div>
  <div class="section" id="section"></div>
</div>
<button class="fab" data-act="add"><b>+</b>Add task</button>

<div class="scrim" id="scrim" data-act="closeadd"></div>
<div class="sheet" id="sheet">
  <span class="cancel" data-act="closeadd">Cancel</span>
  <h3>Add a task</h3>
  <label>Task</label>
  <input id="f-title" placeholder="e.g. Confirm pallet counts for the racking install">
  <div class="row">
    <div><label>Assign to</label><select id="f-assignee"></select></div>
    <div><label>Priority</label><select id="f-prio"><option value="high">High</option><option value="med" selected>Medium</option><option value="low">Low</option></select></div>
  </div>
  <div class="row">
    <div><label>Project</label><select id="f-project"></select></div>
    <div><label>Due</label><input id="f-due" type="date"></div>
  </div>
  <button class="go" data-act="save">Add task</button>
</div>

<div class="scrim" id="rt-scrim" data-act="closeroutine"></div>
<div class="sheet" id="rt-sheet">
  <span class="cancel" data-act="closeroutine">Cancel</span>
  <h3 id="rt-heading">New routine</h3>
  <label>Task</label>
  <input id="rt-title" placeholder="e.g. Weekly line clean — Blairgowrie">
  <div class="row">
    <div><label>Assign to</label><select id="rt-assignee"></select></div>
    <div><label>Priority</label><select id="rt-prio"><option value="high">High</option><option value="med" selected>Medium</option><option value="low">Low</option></select></div>
  </div>
  <label>Project</label>
  <select id="rt-project"></select>
  <label>Repeats</label>
  <select id="rt-type">
    <option value="daily">Every day</option>
    <option value="weekly" selected>Every week</option>
    <option value="monthly">Every month</option>
  </select>
  <div class="subrow on" id="rt-weekly-row">
    <label>On which day(s)</label>
    <div class="dowrow" id="rt-dow"></div>
  </div>
  <div class="subrow" id="rt-monthly-row">
    <label>On which day of the month</label>
    <select id="rt-mday"></select>
  </div>
  <label>Starts on</label>
  <input id="rt-start" type="date">
  <button class="go" data-act="saveroutine">Save routine</button>
</div>

<div class="scrim" id="td-scrim" data-act="closetask"></div>
<div class="sheet tall" id="td-sheet">
  <span class="cancel" data-act="closetask">Close</span>
  <div class="td-topline"><h3>Task detail</h3><span class="td-status" id="td-statusbtn"></span></div>

  </div>
  <label>Send at</label>
  <input id="dg-time" type="time">

<script>
const PAL=['#143644','#e2606c','#007985','#7a3b8f','#3f7d3f','#c0563b','#e0a13f','#4b5f6d'];
const PRIO={high:{l:'High',c:'#c0563b'},med:{l:'Medium',c:'#e0a13f'},low:{l:'Low',c:'#4b5f6d'}};
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MON_FULL=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const SITES=[['','No site'],['blairgowrie','Blairgowrie'],['drongan','Drongan']];
const TOKEN=(new URLSearchParams(location.search).get('token'))||localStorage.getItem('wpm_token')||'';
if(TOKEN)localStorage.setItem('wpm_token',TOKEN);

const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function pad(n){return n<10?'0'+n:''+n;}
function today(){const t=new Date();return new Date(t.getFullYear(),t.getMonth(),t.getDate());}
function parseD(s){if(!s)return null;const p=String(s).split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function isOver(s){const d=parseD(s);return d&&d<today();}
function isToday(s){const d=parseD(s);return d&&d.getTime()===today().getTime();}
function dueLabel(s){if(!s)return '';const d=parseD(s);if(!d)return '';const diff=Math.round((d-today())/86400000);if(diff===0)return 'Today';if(diff===1)return 'Tomorrow';if(diff===-1)return 'Yesterday';if(diff>1&&diff<7)return DOW[d.getDay()]+' '+d.getDate()+' '+MON[d.getMonth()];return d.getDate()+' '+MON[d.getMonth()];}
function titlecase(u){return String(u||'').replace(/[._-]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
function initials(u){const p=String(u||'?').replace(/[._-]/g,' ').trim().split(/\s+/);return ((p[0]||'?')[0]+((p[1]||'')[0]||(p[0]||'')[1]||'')).toUpperCase();}

const state={tab:'mine',me:null,team:{},torder:[],projects:{},porder:[],tasks:[],templates:[],menu:null,editingRoutine:null,openTask:null,editingProject:null,search:'',filterProject:'',filterAssignee:'',schedYear:null,schedMonth:null,schedData:null,schedLoadedKey:null,schedLoading:false};

async function api(path,method,body){
  const r=await fetch(path,{method:method||'GET',headers:Object.assign({'Content-Type':'application/json'},TOKEN?{'Authorization':'Bearer '+TOKEN}:{}),body:body?JSON.stringify(body):undefined});
  if(r.status===401){location.href='/';throw new Error('signin');}
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.error||('HTTP '+r.status));
  return d;
}
async function load(){
  try{
    const me=await api('/api/me');state.me=me.user;
    const[tm,pj,tk,rt]=await Promise.all([api('/api/team'),api('/api/projects'),api('/api/tasks'),api('/api/task-templates').catch(()=>({templates:[]}))]);
    state.team={};state.torder=[];
    (tm.team||[]).forEach((u,i)=>{u.name=(u.id===state.me.id?titlecase(u.username)+' (you)':titlecase(u.username));u.short=titlecase(u.username);u.color=PAL[i%PAL.length];u.av=initials(u.username);state.team[u.id]=u;state.torder.push(u.id);});
    state.projects={};state.porder=[];
    (pj.projects||[]).forEach(p=>{state.projects[p.id]=p;state.porder.push(p.id);});
    state.tasks=tk.tasks||[];
    state.templates=rt.templates||[];
    $('#who').innerHTML='<span class="av" style="background:'+(state.team[state.me.id]?state.team[state.me.id].color:'#e2606c')+'">'+esc(initials(state.me.username))+'</span>'+esc(titlecase(state.me.username));
    populateFilterBar();
    render();
  }catch(e){if(e.message!=='signin')$('#section').innerHTML='<div class="empty">Couldn’t load — '+esc(e.message)+'.<br><a href="/">Sign in to Wilsons HQ</a></div>';}
}

/* ---------------- daily digest settings (v33) ---------------- */
let dgOptIn=false; // toggled locally while the sheet is open; only persisted on Save
function openDigestSheet(){
  dgOptIn=!!state.me.digest_opt_in;
  $('#dg-switch').classList.toggle('on',dgOptIn);
  $('#dg-time').value=state.me.digest_time||'07:30';
  $('#dg-scrim').classList.add('on');$('#dg-sheet').classList.add('on');
}
function closeDigestSheet(){$('#dg-scrim').classList.remove('on');$('#dg-sheet').classList.remove('on');}
function toggleDigestSwitch(){dgOptIn=!dgOptIn;$('#dg-switch').classList.toggle('on',dgOptIn);}
async function saveDigestSettings(){
  const time=$('#dg-time').value||'07:30';
  try{
    await api('/api/me/digest','PUT',{opt_in:dgOptIn,time:time});
    state.me.digest_opt_in=dgOptIn?1:0;state.me.digest_time=time;
    closeDigestSheet();
    toast(dgOptIn?('You’ll get a daily digest at '+time+'.'):'Daily digest turned off.');
  }catch(e){toast(e.message);}
}
// Populated from load() only (not render()) so a tab switch or optimistic toggle never resets
// what the user already typed/picked — these controls hold state independent of the redraw cycle.
function populateFilterBar(){
  $('#filter-project').innerHTML='<option value="">All projects</option>'+state.porder.map(k=>'<option value="'+k+'">'+esc(state.projects[k].name)+(state.projects[k].status==='archived'?' (archived)':'')+'</option>').join('');
  $('#filter-assignee').innerHTML='<option value="">Everyone</option>'+state.torder.map(k=>'<option value="'+k+'">'+esc(person(k).short)+'</option>').join('');
  $('#filter-project').value=state.filterProject;
  $('#filter-assignee').value=state.filterAssignee;
  $('#search-box').value=state.search;
}

function person(id){return state.team[id]||{name:'Unassigned',short:'Unassigned',color:'#b3bcc0',av:'?'};}
function avA(id,cls){const p=person(id);return '<span class="'+(cls||'av')+'" style="background:'+p.color+'">'+esc(p.av)+'</span>';}
function prioDot(p){return '<span class="pdot" style="background:'+(PRIO[p]?PRIO[p].c:'#b3bcc0')+'"></span>';}
function projPill(pid){const pr=state.projects[pid];if(!pr)return '';return '<span class="pill proj" style="background:'+(pr.color||'#6f7b82')+'">'+esc(pr.name)+'</span>';}
// Archived projects stay in state.projects (so old tasks can still resolve a name/colour) but are
// left out of pickers for NEW assignments — except a task/routine's own currently-set project, which
// stays selectable even if it was archived since, so editing one doesn't silently lose the value.
function activeProjectIds(){return state.porder.filter(k=>(state.projects[k].status||'active')!=='archived');}
function projectOptionsFor(currentId){
  const ids=activeProjectIds();
  if(currentId&&!ids.includes(currentId)&&state.projects[currentId])ids.push(currentId);
  return ids.map(k=>'<option value="'+k+'"'+(currentId===k?' selected':'')+'>'+esc(state.projects[k].name)+(state.projects[k].status==='archived'?' (archived)':'')+'</option>').join('');
}
function dueHtml(s,id){
  if(!s)return '<span class="pill due nodate" data-act="snooze" data-id="'+id+'">+ Due</span>';
  return '<span class="pill due'+(isOver(s)?' over':'')+'" data-act="snooze" data-id="'+id+'">'+esc(dueLabel(s))+'</span>';
}
const isDone=t=>t.status==='done';
function parseChecklist(t){try{const a=JSON.parse((t&&t.checklist)||'[]');return Array.isArray(a)?a:[];}catch(e){return [];}}
function checklistPill(t){
  const list=parseChecklist(t);if(!list.length)return '';
  return '<span class="pill cl">'+list.filter(i=>i.done).length+'/'+list.length+'</span>';
}
// Steps show and tick right in every list — no need to open the task first. Removing a step is
// still a detail-view-only action, to keep the list-row tap target simple (tick, nothing else).
function checklistInlineHtml(t){
  const list=parseChecklist(t);if(!list.length)return '';
  return '<div class="cl">'+list.map((it,i)=>
    '<div class="cl-item'+(it.done?' done':'')+'"><span class="cl-check" data-act="togglelistcl" data-id="'+t.id+'" data-x="'+i+'"></span><span class="cl-text">'+esc(it.text)+'</span></div>'
  ).join('')+'</div>';
}
// Phase 1.3: search box + project/assignee filter chips, shared across every task-list tab.
function visibleTasks(){
  const q=state.search.trim().toLowerCase();
  return state.tasks.filter(t=>
    (!q||t.title.toLowerCase().includes(q))
    &&(!state.filterProject||t.project_id===state.filterProject)
    &&(!state.filterAssignee||t.assignee===Number(state.filterAssignee))
  );
}
function sortByDue(arr){return arr.slice().sort((a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return a.due<b.due?-1:a.due>b.due?1:0;});}

function taskRow(t){
  const mine=t.assignee===state.me.id;
  const fromRoutine=t.template_id?'<span class="repeat-ico" title="Generated automatically from a routine">&#8635;</span>':'';
  return '<div class="task'+(isDone(t)?' done':'')+'" data-act="opentask" data-id="'+t.id+'">'
    +'<div class="check" data-act="toggle" data-id="'+t.id+'"></div>'
    +'<div class="body"><div class="title">'+fromRoutine+esc(t.title)+'</div>'
    +'<div class="meta">'+prioDot(t.prio)+projPill(t.project_id)+dueHtml(t.due,t.id)+checklistPill(t)
    +'<span class="assignee'+(mine?' mine':'')+'" data-act="assign" data-id="'+t.id+'">'+avA(t.assignee)+esc(person(t.assignee).short)+'</span>'
    +'</div>'+checklistInlineHtml(t)+'</div></div>';
}
/* ---------------- routines (recurring tasks) ---------------- */
function ordinal(n){n=+n;const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function ruleLabel(rule){
  rule=String(rule||'');
  if(rule==='daily')return 'Every day';
  if(rule.startsWith('weekly:')){
    const map={sun:'Sun',mon:'Mon',tue:'Tue',wed:'Wed',thu:'Thu',fri:'Fri',sat:'Sat'};
    const days=rule.slice(7).split(',').map(d=>map[d]||d);
    return 'Every '+days.join(' & ');
  }
  if(rule.startsWith('monthly:')){
    const spec=rule.slice(8);
    return spec==='last'?'Monthly, on the last day':'Monthly, on the '+ordinal(spec);
  }
  return rule;
}
function routineCard(rt){
  const paused=!rt.active;
  const next=rt.next_due?('Next: '+dueLabel(rt.next_due)):'';
  return '<div class="routine'+(paused?' paused':'')+'">'
    +'<div class="rh"><span class="rico">&#8635;</span>'
    +'<div class="rt"><div class="rtt">'+esc(rt.title)+'</div>'
    +'<div class="rtd">'+esc(ruleLabel(rt.rule))+(next?' · '+esc(next):'')+(paused?' · <b>Paused</b>':'')+' · '+esc(person(rt.assignee).short)+projPill(rt.project_id)+'</div></div>'
    +'<div class="racts">'
    +'<span class="ract" data-act="editroutine" data-id="'+rt.id+'">Edit</span>'
    +'<span class="ract" data-act="toggleroutine" data-id="'+rt.id+'">'+(paused?'Resume':'Pause')+'</span>'
    +'<span class="ract danger" data-act="delroutine" data-id="'+rt.id+'">Delete</span>'
    +'</div></div></div>';
}
function grp(title,rows,danger){if(!rows.length)return '';return '<div class="grp"><div class="lbl'+(danger?' danger':'')+'">'+title+'</div>'+rows.join('')+'</div>';}

function render(){
  const defs=[['mine','My work'],['team','Team'],['waiting','Waiting on'],['projects','Projects'],['schedule','Schedule'],['routines','Routines']];
  $('#tabs').innerHTML=defs.map(d=>'<div class="t'+(state.tab===d[0]?' on':'')+'" data-act="tab" data-x="'+d[0]+'">'+d[1]+'</div>').join('');
  $('#filterbar').style.display=(state.tab==='routines'||state.tab==='schedule')?'none':'flex';
  // The month grid is the one screen that actually benefits from more horizontal room (7 columns
  // of chip text) — every other tab is a single column of cards that doesn't need it, so only this
  // tab widens, rather than stretching the whole app and leaving headings/tab-pills floating in space.
  $('.wrap').classList.toggle('sched-wide',state.tab==='schedule');
  let h='',sub='';
  const vis=visibleTasks();
  const filtered=!!(state.search||state.filterProject||state.filterAssignee);
  if(state.tab==='mine'){
    sub='Everything on your plate, across every project.';
    const mine=vis.filter(t=>t.assignee===state.me.id);
    const over=sortByDue(mine.filter(t=>!isDone(t)&&t.due&&isOver(t.due))).map(taskRow);
    const tod=mine.filter(t=>!isDone(t)&&isToday(t.due)).map(taskRow);
    const soon=sortByDue(mine.filter(t=>!isDone(t)&&t.due&&!isOver(t.due)&&!isToday(t.due))).map(taskRow);
    const nod=mine.filter(t=>!isDone(t)&&!t.due).map(taskRow);
    const done=mine.filter(isDone).map(taskRow);
    h=grp('Overdue',over,true)+grp('Today',tod)+grp('Coming up',soon)+grp('No date',nod)+grp('Done',done);
    if(!h)h='<div class="empty">'+(filtered?'No tasks match.':'Nothing on your plate yet.<br>Tap <b>+ Add task</b> to start.')+'</div>';
  }else if(state.tab==='team'){
    sub='Who’s working on what — your whole team at a glance.';
    h=state.torder.map(k=>{
      const ts=vis.filter(t=>t.assignee===k);const open=ts.filter(t=>!isDone(t));const p=person(k);
      return '<div class="person"><div class="ph">'+avA(k)+'<div><div class="pn">'+esc(p.name)+'</div><div class="pr">'+esc(p.role||'Team')+'</div></div><div class="cnt"><b>'+open.length+'</b><span>open</span></div></div>'
        +'<div class="plist">'+(ts.length?ts.map(t=>'<div class="pt'+(isDone(t)?' done':'')+'" data-act="opentask" data-id="'+t.id+'"><span class="smallcheck" data-act="toggle" data-id="'+t.id+'"></span>'+prioDot(t.prio)+'<span class="ptt">'+esc(t.title)+'</span>'+(t.due?'<span class="ptd">'+esc(dueLabel(t.due))+'</span>':'')+'</div>').join(''):'<div class="pt"><span class="ptd">'+(filtered?'No matching tasks.':'No tasks assigned.')+'</span></div>')+'</div></div>';
    }).join('');
    if(!state.torder.length)h='<div class="empty">No team members yet — invite people from the Users screen in Wilsons HQ.</div>';
  }else if(state.tab==='waiting'){
    sub='Tasks you’ve delegated — what you’re waiting on, and from whom.';
    const del=sortByDue(vis.filter(t=>t.created_by===state.me.id&&t.assignee!==state.me.id&&!isDone(t)));
    h=del.length?'<div class="grp">'+del.map(taskRow).join('')+'</div>':'<div class="empty">'+(filtered?'No tasks match.':'You haven’t delegated anything open.<br>Assign a task to a colleague and it’ll appear here.')+'</div>';
  }else if(state.tab==='projects'){
    sub='Every project, with progress and who owns each piece.';
    const pids=state.filterProject?activeProjectIds().filter(k=>k===state.filterProject):activeProjectIds();
    h=pids.map(k=>{
      const pr=state.projects[k];const ts=vis.filter(t=>t.project_id===k);const done=ts.filter(isDone).length;const pct=ts.length?Math.round(done/ts.length*100):0;
      return '<div class="project"><div class="prh"><span class="swatch" style="background:'+(pr.color||'#6f7b82')+'"></span><div><div class="prn">'+esc(pr.name)+'</div><div class="prm">'+esc(pr.meta||'')+'</div></div><div class="cnt" style="margin-left:auto;text-align:right"><b style="font-size:16px;color:var(--navy)">'+done+'/'+ts.length+'</b></div></div>'
        +'<div class="bar"><i style="width:'+pct+'%;background:'+(pr.color||'#6f7b82')+'"></i></div>'
        +(ts.length?'<div style="margin-top:8px">'+ts.map(t=>'<div class="prt'+(isDone(t)?' done':'')+'" data-act="opentask" data-id="'+t.id+'">'+prioDot(t.prio)+'<span class="x">'+esc(t.title)+'</span>'+avA(t.assignee,'mini-av')+'</div>').join('')+'</div>':'')
        +'<div class="practs"><span class="pract" data-act="editproj" data-id="'+k+'">Edit</span><span class="pract danger" data-act="archiveproj" data-id="'+k+'">Delete</span></div></div>';
    }).join('')+'<div class="newproj" data-act="newproj">+ New project</div>';
  }else if(state.tab==='schedule'){
    sub='A month at a glance — tap a day to see what’s due.';
    h=renderScheduleTab();
  }else{
    sub='Jobs that repeat on their own — daily, weekly or monthly. Generated tasks show a '+String.fromCharCode(0x21bb)+' mark.';
    h=state.templates.length?state.templates.map(routineCard).join(''):'<div class="empty">No routines yet.<br>Tap <b>+ New routine</b> to set up something that repeats — a weekly line clean, a monthly stock count.</div>';
    h+='<div class="newroutine" data-act="newroutine">+ New routine</div>';
  }
  $('#sub').textContent=sub;$('#section').innerHTML=h;
}

function toast(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2200);}
function openAdd(){
  $('#f-assignee').innerHTML=state.torder.map(k=>'<option value="'+k+'"'+(k===state.me.id?' selected':'')+'>'+esc(person(k).short)+'</option>').join('');
  $('#f-project').innerHTML='<option value="">No project</option>'+projectOptionsFor('');
  $('#f-title').value='';$('#f-due').value='';$('#scrim').classList.add('on');$('#sheet').classList.add('on');setTimeout(()=>$('#f-title').focus(),120);
}
function closeAdd(){$('#scrim').classList.remove('on');$('#sheet').classList.remove('on');}
async function save(){
  const title=$('#f-title').value.trim();if(!title){$('#f-title').focus();return;}
  const a=Number($('#f-assignee').value);
  try{
    await api('/api/tasks','POST',{title:title,assignee:a,project_id:$('#f-project').value,prio:$('#f-prio').value,due:$('#f-due').value||''});
    closeAdd();await load();
    state.tab=(a!==state.me.id)?'waiting':'mine';render();
    toast(a!==state.me.id?('Assigned to '+person(a).short):'Task added');
  }catch(e){toast(e.message);}
}
async function toggle(id){
  const t=state.tasks.find(t=>t.id===id);if(!t)return;
  const ns=isDone(t)?'open':'done';t.status=ns;render();
  if(state.openTask===id)renderStatusPill(t);
  try{
    await api('/api/tasks/'+encodeURIComponent(id),'PUT',{status:ns});
    if(state.openTask===id)await refreshActivity(id);
  }catch(e){toast(e.message);load();}
}
function openAssign(id,x,y){
  const t=state.tasks.find(t=>t.id===id);if(!t)return;closeMenu();
  const mn=document.createElement('div');mn.className='menu';
  mn.innerHTML='<div class="cap">Assign to</div>'+state.torder.map(k=>'<div class="mi" data-act="setassignee" data-id="'+id+'" data-x="'+k+'">'+avA(k)+esc(person(k).short)+(t.assignee===k?'<span class="tick">&#10003;</span>':'')+'</div>').join('');
  document.body.appendChild(mn);state.menu=mn;
  const mw=210,mh=mn.offsetHeight;let L=Math.min(x,window.innerWidth-mw-10),T=y+8;if(T+mh>window.innerHeight-10)T=Math.max(10,y-mh-8);
  mn.style.left=Math.max(10,L)+'px';mn.style.top=T+'px';
}
function closeMenu(){if(state.menu){state.menu.remove();state.menu=null;}}
async function setAssignee(id,k){
  const t=state.tasks.find(t=>t.id===id);if(!t)return;closeMenu();
  t.assignee=Number(k);render();
  try{await api('/api/tasks/'+encodeURIComponent(id),'PUT',{assignee:Number(k)});toast(Number(k)===state.me.id?'Now yours':('Assigned to '+person(Number(k)).short));}catch(e){toast(e.message);load();}
}
/* ---------------- snooze (v31) — a quick way to push/set a due date without opening the full
 * detail sheet, exactly like the assignee popup is a quick way to reassign. "Pick a date" opens
 * the detail sheet instead of reinventing a date picker — it already has a proper one. ---------------- */
function openSnooze(id,x,y){
  const t=state.tasks.find(t=>t.id===id);if(!t)return;closeMenu();
  const mn=document.createElement('div');mn.className='menu';
  let rows='<div class="cap">Due date</div>'
    +'<div class="mi" data-act="snoozepick" data-id="'+id+'" data-x="tomorrow">Tomorrow</div>'
    +'<div class="mi" data-act="snoozepick" data-id="'+id+'" data-x="nextweek">Next week</div>'
    +'<div class="mi" data-act="snoozepick" data-id="'+id+'" data-x="pick">Pick a date…</div>';
  if(t.due)rows+='<div class="mi" data-act="snoozepick" data-id="'+id+'" data-x="clear">Clear due date</div>';
  mn.innerHTML=rows;
  document.body.appendChild(mn);state.menu=mn;
  const mw=210,mh=mn.offsetHeight;let L=Math.min(x,window.innerWidth-mw-10),T=y+8;if(T+mh>window.innerHeight-10)T=Math.max(10,y-mh-8);
  mn.style.left=Math.max(10,L)+'px';mn.style.top=T+'px';
}
async function snoozePick(id,kind){
  closeMenu();
  if(kind==='pick'){openTaskDetail(id);setTimeout(()=>{const f=$('#td-due');if(f)f.focus();},150);return;}
  const t=state.tasks.find(t=>t.id===id);if(!t)return;
  let due='';
  if(kind==='tomorrow'){const d=new Date();d.setDate(d.getDate()+1);due=isoDateClient(d);}
  else if(kind==='nextweek'){const d=new Date();d.setDate(d.getDate()+7);due=isoDateClient(d);}
  else if(kind!=='clear')return;
  t.due=due;render();
  try{
    await api('/api/tasks/'+encodeURIComponent(id),'PUT',{due:due});
    if(state.openTask===id)await refreshActivity(id);
  }catch(e){toast(e.message);load();}
}

/* ---------------- schedule (month view, v32) ----------------
 * Read-only — a plotted view of due dates, not a drag-and-drop calendar. Routine occurrences are
 * computed server-side (GET /api/schedule) by walking the same rule engine the scheduler itself
 * uses, over whatever range the visible month grid needs — so there's no second copy of the date
 * logic to keep in sync with planning.js. */
function schedInit(){
  if(state.schedYear==null){const t=new Date();state.schedYear=t.getFullYear();state.schedMonth=t.getMonth();}
}
function monthGridDates(year,month0){
  const first=new Date(year,month0,1);
  const gridStart=new Date(year,month0,1-first.getDay());
  const days=[];
  for(let i=0;i<42;i++){const d=new Date(gridStart);d.setDate(gridStart.getDate()+i);days.push(d);}
  return days;
}
async function loadSchedule(){
  const days=monthGridDates(state.schedYear,state.schedMonth);
  const key=state.schedYear+'-'+state.schedMonth;
  try{
    const r=await api('/api/schedule?from='+isoDateClient(days[0])+'&to='+isoDateClient(days[41]));
    state.schedData={tasks:r.tasks||[],occurrences:r.occurrences||[]};
  }catch(e){state.schedData={tasks:[],occurrences:[]};}
  state.schedLoadedKey=key;state.schedLoading=false;
  if(state.tab==='schedule')render();
}
function schedItemsFor(dateIso){
  const d=state.schedData||{tasks:[],occurrences:[]};
  return {tasks:d.tasks.filter(t=>t.due===dateIso),occ:d.occurrences.filter(o=>o.date===dateIso)};
}
// Real tasks and not-yet-generated routine occurrences both carry a title + prio, so they render
// as the same kind of chip — only the routine ones get the dashed "not generated yet" treatment.
// Capped at 3 per cell (matches the cell height); anything past that just adds to the "+N more".
function schedChipHtml(tasks,occ){
  const items=tasks.map(t=>({title:t.title,prio:t.prio})).concat(occ.map(o=>({title:o.title,prio:o.prio,routine:true})));
  const shown=items.slice(0,3).map(it=>'<span class="sched-chip '+(it.routine?'routine':(it.prio||'med'))+'">'+esc(it.title)+'</span>').join('');
  const more=items.length>3?'<span class="sched-more">+'+(items.length-3)+' more</span>':'';
  return shown+more;
}
function renderScheduleTab(){
  schedInit();
  const key=state.schedYear+'-'+state.schedMonth;
  if(state.schedLoadedKey!==key){
    if(!state.schedLoading){state.schedLoading=true;loadSchedule();}
    return '<div class="empty" style="padding:40px 0">Loading…</div>';
  }
  const days=monthGridDates(state.schedYear,state.schedMonth);
  const todayIso=todayISOClient();
  const head='<div class="sched-head"><span class="sched-nav" data-act="schedprev">&#8249;</span>'
    +'<span class="sched-title">'+MON_FULL[state.schedMonth]+' '+state.schedYear+'</span>'
    +'<span class="sched-today" data-act="schedtoday">Today</span>'
    +'<span class="sched-nav" data-act="schednext">&#8250;</span></div>';
  const dow='<div class="sched-dow">'+DOW.map(d=>'<span>'+d+'</span>').join('')+'</div>';
  const cells=days.map(d=>{
    const iso=isoDateClient(d);
    const inMonth=d.getMonth()===state.schedMonth;
    const {tasks,occ}=schedItemsFor(iso);
    return '<div class="sched-cell'+(inMonth?'':' out')+(iso===todayIso?' today':'')+'" data-act="openday" data-x="'+iso+'">'
      +'<span class="dn">'+d.getDate()+'</span>'+schedChipHtml(tasks,occ)+'</div>';
  }).join('');
  return head+dow+'<div class="sched-grid">'+cells+'</div>'
    +'<div class="sched-legend">Tap a day to see what’s due — the '+String.fromCharCode(0x21bb)+' mark is a routine that hasn’t generated its task yet.</div>';
}
function schedNav(dir){
  if(dir==='today'){const t=new Date();state.schedYear=t.getFullYear();state.schedMonth=t.getMonth();}
  else{state.schedMonth+=dir;if(state.schedMonth<0){state.schedMonth=11;state.schedYear--;}else if(state.schedMonth>11){state.schedMonth=0;state.schedYear++;}}
  render();
}
function openDaySheet(dateIso){
  const {tasks,occ}=schedItemsFor(dateIso);
  const d=parseD(dateIso);
  $('#day-heading').textContent=d?(d.getDate()+' '+MON_FULL[d.getMonth()]+' '+d.getFullYear()):dateIso;
  const taskRows=tasks.map(taskRow).join('');
  const occRows=occ.map(o=>'<div class="day-item" data-act="editroutine" data-id="'+o.template_id+'"><span class="repeat-ico" title="Routine — not generated yet">&#8635;</span><span class="dtxt">'+esc(o.title)+'</span>'+avA(o.assignee,'mini-av')+'</div>').join('');
  $('#day-list').innerHTML=(taskRows+occRows)||'<div class="empty" style="padding:20px 0">Nothing due this day.</div>';
  $('#day-scrim').classList.add('on');$('#day-sheet').classList.add('on');
}
function closeDaySheet(){$('#day-scrim').classList.remove('on');$('#day-sheet').classList.remove('on');}

/* ---------------- routine sheet (create / edit a recurring task) ---------------- */
const DOW_UI=[['sun','Sun'],['mon','Mon'],['tue','Tue'],['wed','Wed'],['thu','Thu'],['fri','Fri'],['sat','Sat']];
let rtDow=new Set(['mon']); // which weekly days are ticked while the sheet is open
function isoDateClient(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function todayISOClient(){return isoDateClient(new Date());}
function fillRoutineMonthDays(){
  $('#rt-mday').innerHTML=Array.from({length:31},(_,i)=>i+1).map(n=>'<option value="'+n+'">'+ordinal(n)+'</option>').join('')+'<option value="last">Last day of the month</option>';
}
function renderDowRow(){
  $('#rt-dow').innerHTML=DOW_UI.map(([code,lbl])=>'<div class="dowbtn'+(rtDow.has(code)?' on':'')+'" data-act="toggledow" data-x="'+code+'">'+lbl+'</div>').join('');
}
function toggleDow(code){if(rtDow.has(code))rtDow.delete(code);else rtDow.add(code);renderDowRow();}
function updateRepeatSubrows(){
  const t=$('#rt-type').value;
  $('#rt-weekly-row').classList.toggle('on',t==='weekly');
  $('#rt-monthly-row').classList.toggle('on',t==='monthly');
}
function openRoutineSheet(id){
  closeDaySheet(); // can be triggered from a schedule day's list of routine occurrences
  state.editingRoutine=id||null;
  const rt=id?state.templates.find(x=>x.id===id):null;
  $('#rt-heading').textContent=rt?'Edit routine':'New routine';
  $('#rt-assignee').innerHTML=state.torder.map(k=>'<option value="'+k+'"'+((rt?rt.assignee:state.me.id)===k?' selected':'')+'>'+esc(person(k).short)+'</option>').join('');
  $('#rt-project').innerHTML='<option value="">No project</option>'+projectOptionsFor(rt?rt.project_id:'');
  fillRoutineMonthDays();
  $('#rt-title').value=rt?rt.title:'';
  $('#rt-prio').value=rt?(rt.prio||'med'):'med';
  let type='weekly',mday=String(new Date().getDate());
  rtDow=new Set(['mon']);
  if(rt){
    const rule=rt.rule||'';
    if(rule==='daily')type='daily';
    else if(rule.startsWith('weekly:')){type='weekly';rtDow=new Set(rule.slice(7).split(',').filter(Boolean));}
    else if(rule.startsWith('monthly:')){type='monthly';mday=rule.slice(8);}
  }
  $('#rt-type').value=type;
  renderDowRow();
  updateRepeatSubrows();
  $('#rt-mday').value=mday;
  $('#rt-start').value=rt?(rt.next_due||todayISOClient()):todayISOClient();
  $('#rt-scrim').classList.add('on');$('#rt-sheet').classList.add('on');
  setTimeout(()=>$('#rt-title').focus(),120);
}
function closeRoutineSheet(){$('#rt-scrim').classList.remove('on');$('#rt-sheet').classList.remove('on');}
function buildRule(){
  const type=$('#rt-type').value;
  if(type==='daily')return 'daily';
  if(type==='weekly'){const days=[...rtDow];return days.length?('weekly:'+days.join(',')):null;}
  return 'monthly:'+$('#rt-mday').value;
}
async function saveRoutine(){
  const title=$('#rt-title').value.trim();if(!title){$('#rt-title').focus();return;}
  const rule=buildRule();
  if(!rule){toast('Pick at least one day.');return;}
  const body={title:title,assignee:Number($('#rt-assignee').value),project_id:$('#rt-project').value,prio:$('#rt-prio').value,rule:rule,start:$('#rt-start').value||todayISOClient()};
  try{
    if(state.editingRoutine)await api('/api/task-templates/'+encodeURIComponent(state.editingRoutine),'PUT',body);
    else await api('/api/task-templates','POST',body);
    closeRoutineSheet();await load();state.tab='routines';render();
    toast(state.editingRoutine?'Routine updated':'Routine added');
  }catch(e){toast(e.message);}
}
async function toggleRoutine(id){
  const rt=state.templates.find(x=>x.id===id);if(!rt)return;
  const active=!rt.active;
  try{await api('/api/task-templates/'+encodeURIComponent(id),'PUT',{active:active});await load();state.tab='routines';render();toast(active?'Resumed':'Paused');}catch(e){toast(e.message);}
}
async function deleteRoutine(id){
  if(!confirm('Delete this routine? Tasks it already created will stay in your list — only the repeating rule is removed.'))return;
  try{await api('/api/task-templates/'+encodeURIComponent(id),'DELETE');await load();state.tab='routines';render();toast('Routine deleted');}catch(e){toast(e.message);}
}

/* ---------------- task detail: fields + activity trail (v29) ---------------- */
function activityTimeLabel(iso){
  const d=new Date(iso);if(isNaN(d))return '';
  const dOnly=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.round((dOnly-today())/86400000);
  const hm=pad(d.getHours())+':'+pad(d.getMinutes());
  if(diff===0)return 'Today, '+hm;
  if(diff===-1)return 'Yesterday, '+hm;
  return d.getDate()+' '+MON[d.getMonth()]+', '+hm;
}
function activityRow(a){
  const who=person(a.user_id);
  const when=activityTimeLabel(a.ts);
  if(a.kind==='comment'){
    return '<div class="act">'+avA(a.user_id,'act-av')+'<div class="act-body"><div class="act-head"><b>'+esc(who.short)+'</b><span class="act-time">'+when+'</span></div><div class="act-bubble">'+esc(a.text)+'</div></div></div>';
  }
  return '<div class="act">'+avA(a.user_id,'act-av')+'<div class="act-body"><div class="act-line"><b>'+esc(who.short)+'</b> '+esc(a.text)+'<span class="act-time">'+when+'</span></div></div></div>';
}
function renderStatusPill(t){
  const el=$('#td-statusbtn');el.dataset.act='toggle';el.dataset.id=t.id;
  el.className='td-status'+(isDone(t)?' done':'');
  el.innerHTML=isDone(t)?'&#10003; Done':'Mark done';
}
function openTaskDetail(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  closeDaySheet(); // can be triggered from a schedule day's list — don't leave two sheets stacked
  state.openTask=id;
  $('#td-title').value=t.title;
  $('#td-notes').value=t.notes||'';
  $('#td-assignee').innerHTML=state.torder.map(k=>'<option value="'+k+'"'+(t.assignee===k?' selected':'')+'>'+esc(person(k).short)+'</option>').join('');
  $('#td-prio').value=t.prio||'med';
  $('#td-project').innerHTML='<option value="">No project</option>'+projectOptionsFor(t.project_id);
  $('#td-due').value=t.due||'';
  $('#td-site').innerHTML=SITES.map(([v,l])=>'<option value="'+v+'"'+(t.site===v?' selected':'')+'>'+esc(l)+'</option>').join('');
  renderStatusPill(t);
  renderChecklist(t);
  $('#td-cl-new').value='';
  $('#td-activity').innerHTML='<div class="empty" style="padding:20px 0">Loading…</div>';
  $('#td-comment').value='';
  $('#td-scrim').classList.add('on');$('#td-sheet').classList.add('on');
  $('#td-sheet').scrollTop=0;
  refreshActivity(id);
}
function closeTaskDetail(){state.openTask=null;$('#td-scrim').classList.remove('on');$('#td-sheet').classList.remove('on');}
/* ---------------- checklist / subtasks (v31) — each action is instant, not batched with Save,
 * so ticking items behaves like the main done-checkbox (persists immediately, no lost progress
 * if the sheet is closed without hitting "Save changes"). ---------------- */
function renderChecklist(t){
  const list=parseChecklist(t);
  $('#td-checklist').innerHTML=list.length?list.map((it,i)=>
    '<div class="cl-item'+(it.done?' done':'')+'"><span class="cl-check" data-act="toggleclitem" data-x="'+i+'"></span><span class="cl-text">'+esc(it.text)+'</span><span class="cl-rm" data-act="rmclitem" data-x="'+i+'">&times;</span></div>'
  ).join(''):'<div class="cl-empty">No steps yet.</div>';
}
async function saveChecklist(id,list){
  try{
    await api('/api/tasks/'+encodeURIComponent(id),'PUT',{checklist:list});
    const t=state.tasks.find(x=>x.id===id);
    if(t){t.checklist=JSON.stringify(list);if(state.openTask===id)renderChecklist(t);}
    if(state.openTask===id)await refreshActivity(id);
    render();
  }catch(e){toast(e.message);}
}
function toggleChecklistItem(idx){
  const id=state.openTask;const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const list=parseChecklist(t);if(!list[idx])return;
  list[idx]=Object.assign({},list[idx],{done:!list[idx].done});
  saveChecklist(id,list);
}
// Same as toggleChecklistItem above, but for a step ticked straight from a list row (My work/Team/
// Waiting on/Projects) rather than from the open task-detail sheet, so it takes an explicit id.
function toggleListChecklistItem(id,idx){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const list=parseChecklist(t);if(!list[idx])return;
  list[idx]=Object.assign({},list[idx],{done:!list[idx].done});
  saveChecklist(id,list);
}
function addChecklistItem(){
  const id=state.openTask;const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const text=$('#td-cl-new').value.trim();if(!text)return;
  const list=parseChecklist(t);list.push({text:text,done:false});
  $('#td-cl-new').value='';
  saveChecklist(id,list);
}
function removeChecklistItem(idx){
  const id=state.openTask;const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const list=parseChecklist(t);if(!list[idx])return;
  list.splice(idx,1);
  saveChecklist(id,list);
}
async function refreshActivity(id){
  try{
    const r=await api('/api/tasks/'+encodeURIComponent(id)+'/activity');
    if(state.openTask!==id)return; // sheet was closed or switched to another task while this was in flight
    $('#td-activity').innerHTML=r.activity&&r.activity.length?r.activity.map(activityRow).join(''):'<div class="empty" style="padding:10px 0 4px;font-size:13.5px">No activity yet.</div>';
  }catch(e){$('#td-activity').innerHTML='<div class="empty" style="padding:10px 0 4px;font-size:13.5px">Couldn’t load activity.</div>';}
}
async function saveTaskDetail(){
  const id=state.openTask;const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const title=$('#td-title').value.trim();if(!title){$('#td-title').focus();return;}
  const body={};
  if(title!==t.title)body.title=title;
  const notes=$('#td-notes').value;if(notes!==(t.notes||''))body.notes=notes;
  const assignee=Number($('#td-assignee').value);if(assignee!==t.assignee)body.assignee=assignee;
  const prio=$('#td-prio').value;if(prio!==(t.prio||'med'))body.prio=prio;
  const project_id=$('#td-project').value;if(project_id!==(t.project_id||''))body.project_id=project_id;
  const due=$('#td-due').value||'';if(due!==(t.due||''))body.due=due;
  const site=$('#td-site').value;if(site!==(t.site||''))body.site=site;
  if(!Object.keys(body).length){toast('No changes to save');return;}
  try{
    await api('/api/tasks/'+encodeURIComponent(id),'PUT',body);
    await load();
    openTaskDetail(id);
    toast('Saved');
  }catch(e){toast(e.message);}
}
async function postComment(){
  const id=state.openTask;if(!id)return;
  const text=$('#td-comment').value.trim();if(!text)return;
  try{
    await api('/api/tasks/'+encodeURIComponent(id)+'/comment','POST',{text:text});
    $('#td-comment').value='';
    await refreshActivity(id);
  }catch(e){toast(e.message);}
}

document.addEventListener('click',function(e){
  const el=e.target.closest('[data-act]');
  if(state.menu&&!e.target.closest('.menu')&&!(el&&(el.dataset.act==='assign'||el.dataset.act==='snooze')))closeMenu();
  if(!el)return;
  const a=el.dataset.act,id=el.dataset.id,x=el.dataset.x;
  if(a==='tab'){state.tab=x;render();}
  else if(a==='toggle'){toggle(id);}
  else if(a==='add'){openAdd();}
  else if(a==='closeadd'){closeAdd();}
  else if(a==='save'){save();}
  else if(a==='assign'){e.stopPropagation();const r=el.getBoundingClientRect();openAssign(id,r.left,r.bottom);}
  else if(a==='setassignee'){setAssignee(id,x);}
  else if(a==='snooze'){e.stopPropagation();const r=el.getBoundingClientRect();openSnooze(id,r.left,r.bottom);}
  else if(a==='snoozepick'){snoozePick(id,x);}
  else if(a==='newproj'){openProjectSheet();}
  else if(a==='editproj'){openProjectSheet(id);}
  else if(a==='archiveproj'){archiveProject(id);}
  else if(a==='closeproj'){closeProjectSheet();}
  else if(a==='saveproj'){saveProject();}
  else if(a==='pickswatch'){pickSwatch(x);}
  else if(a==='newroutine'){openRoutineSheet();}
  else if(a==='editroutine'){openRoutineSheet(id);}
  else if(a==='toggleroutine'){toggleRoutine(id);}
  else if(a==='delroutine'){deleteRoutine(id);}
  else if(a==='closeroutine'){closeRoutineSheet();}
  else if(a==='saveroutine'){saveRoutine();}
  else if(a==='toggledow'){toggleDow(x);}
  else if(a==='opentask'){openTaskDetail(id);}
  else if(a==='closetask'){closeTaskDetail();}
  else if(a==='savetask'){saveTaskDetail();}
  else if(a==='postcomment'){postComment();}
  else if(a==='addchecklist'){addChecklistItem();}
  else if(a==='toggleclitem'){toggleChecklistItem(Number(x));}
  else if(a==='togglelistcl'){toggleListChecklistItem(id,Number(x));}
  else if(a==='rmclitem'){removeChecklistItem(Number(x));}
  else if(a==='schedprev'){schedNav(-1);}
  else if(a==='schednext'){schedNav(1);}
  else if(a==='schedtoday'){schedNav('today');}
  else if(a==='openday'){openDaySheet(x);}
  else if(a==='closeday'){closeDaySheet();}
  else if(a==='opendigest'){openDigestSheet();}
  else if(a==='closedigest'){closeDigestSheet();}
  else if(a==='toggledigest'){toggleDigestSwitch();}
  else if(a==='savedigest'){saveDigestSettings();}
});
$('#rt-type').addEventListener('change',updateRepeatSubrows);
$('#td-comment').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();postComment();}});
$('#td-cl-new').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addChecklistItem();}});
$('#search-box').addEventListener('input',function(){state.search=this.value;render();});
$('#filter-project').addEventListener('change',function(){state.filterProject=this.value;render();});
$('#filter-assignee').addEventListener('change',function(){state.filterAssignee=this.value;render();});
load();
</script>
