:root{--nav:#143644;--chan:#4b5f6d;--capp:#e0ddcb;--cream:#f7f4ec;--gf:#f37d89;--ink:#143644;--line:#e7e1d1}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{font-family:'Effra',system-ui,sans-serif;color:var(--ink);background:var(--cream);
 -webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,textarea{font-family:inherit;color:var(--ink)}
.app{display:grid;grid-template-columns:262px 1fr;height:100vh;min-height:600px}

/* ---------------- sidebar ---------------- */
.side{background:var(--nav);color:#fff;display:flex;flex-direction:column;padding:18px 14px 12px;overflow:hidden}
.brand{font-family:'Bobby';font-size:19px;letter-spacing:.02em;line-height:1;margin:2px 4px 4px}
.brand small{display:block;font-family:'Effra';font-weight:500;font-size:10px;letter-spacing:.16em;
 text-transform:uppercase;color:#8ea0aa;margin-top:5px}
.side .add{background:var(--gf);color:var(--nav);font-weight:700;font-size:13px;border-radius:12px;
 padding:9px 0;text-align:center;margin:14px 4px 12px}
.plist{flex:1;overflow:auto;margin:0 -4px;padding:0 4px}
.pitem{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;font-size:13.5px;
 font-weight:500;color:#c4d0d7;margin-bottom:3px}
.pitem:hover{background:rgba(255,255,255,.06);color:#fff}
.pitem.on{background:rgba(243,125,137,.16);color:#fff;font-weight:700}
.pitem .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
.pitem .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pitem .ls{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#8ea0aa}
.rangehd{display:flex;align-items:center;gap:8px;color:#fff;font-family:'Bobby';font-size:13px;letter-spacing:.03em;
 padding:10px 6px 5px;cursor:pointer;text-transform:uppercase;user-select:none}
.rangehd .chev{font-size:9px;color:#8ea0aa;transition:transform .15s;width:10px;display:inline-block}
.rangehd.col .chev{transform:rotate(-90deg)}
.rangehd .ct{margin-left:auto;font-family:'Effra';font-weight:600;font-size:10px;color:#7f929c}
.brandhd{display:flex;align-items:center;gap:7px;padding:7px 6px 3px 12px;color:#9fb0b9;font-size:10px;
 font-weight:700;letter-spacing:.09em;text-transform:uppercase;cursor:pointer;user-select:none}
.brandhd:hover{color:#c4d0d7}
.brandhd .chev2{font-size:8px;color:#7f929c;transition:transform .15s;width:9px;display:inline-block}
.brandhd.col .chev2{transform:rotate(-90deg)}
.brandhd .bct{font-family:'Effra';font-weight:600;font-size:9px;color:#67797f;margin-left:5px}
.brandhd .plus{margin-left:auto;width:20px;height:20px;border-radius:6px;border:1px solid rgba(255,255,255,.18);
 color:#c4d0d7;font-size:14px;line-height:15px;text-align:center}
.brandhd .plus:hover{background:var(--gf);color:var(--nav);border-color:var(--gf)}
.pitem{margin-left:6px}
.emptysub{font-size:10px;color:#63757b;padding:2px 8px 5px 20px;font-style:italic}
.sfoot{border-top:1px solid rgba(255,255,255,.1);margin:8px 4px 0;padding-top:10px;display:flex;
 flex-wrap:wrap;gap:6px}
.sfoot button{font-size:11px;font-weight:600;color:#c4d0d7;border:1px solid rgba(255,255,255,.16);
 border-radius:8px;padding:6px 9px}
.sfoot button:hover{background:rgba(255,255,255,.08);color:#fff}
.saved{font-size:10px;color:#7f929c;margin:8px 4px 0;line-height:1.4}

/* ---------------- main ---------------- */
.main{overflow:auto;display:flex;flex-direction:column}
.bar{position:sticky;top:0;z-index:5;background:var(--cream);border-bottom:1px solid var(--line);
 padding:14px 26px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bar h1{font-family:'Bobby';font-size:21px;margin:0;letter-spacing:.02em}
.seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:11px;padding:3px}
.seg button{font-size:12.5px;font-weight:600;color:var(--chan);padding:6px 15px;border-radius:8px}
.seg button.on{background:var(--nav);color:#fff}
.bar .sp{flex:1}
.bar .act{font-size:12.5px;font-weight:600;color:var(--nav);border:1px solid var(--line);background:#fff;
 border-radius:10px;padding:8px 13px}
.bar .act:hover{border-color:var(--nav)}
.bar .act.warn:hover{border-color:#d53b48;color:#d53b48}
.bar .act.pri{background:var(--gf);border-color:var(--gf);color:var(--nav);font-weight:700}
.stage{padding:22px 26px 60px}

/* ---------------- editor ---------------- */
.ed{max-width:820px}
.hd{background:var(--nav);border-radius:14px;padding:16px 18px;color:#fff;margin-bottom:16px}
.hd .row{display:grid;grid-template-columns:130px 1fr;gap:9px;align-items:center;margin-bottom:9px}
.hd .row:last-child{margin-bottom:0}
.hd label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#9fb0b9}
.hd input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:8px;
 padding:8px 10px;color:#fff;font-size:13px;width:100%}
.hd input[type=color]{padding:2px;height:34px;width:52px}
.hd select{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:8px;
 padding:8px 10px;color:#fff;font-size:13px;flex:1}
.hd select option{color:#143644}
.hd .act2{font-size:12px;font-weight:600;color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 11px}
.hd .act2:hover{background:rgba(255,255,255,.1)}
.metarows{display:flex;flex-direction:column;gap:7px}
.metarow{display:grid;grid-template-columns:130px 1fr 30px;gap:9px}
.metarow input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:8px;
 padding:7px 9px;color:#fff;font-size:12.5px}
.mini{font-size:16px;line-height:1;color:#9fb0b9;border:1px solid rgba(255,255,255,.2);border-radius:7px}
.mini:hover{color:#fff;background:rgba(255,255,255,.1)}
.addmeta{align-self:flex-start;font-size:11.5px;font-weight:600;color:#9fb0b9;border:1px dashed rgba(255,255,255,.28);
 border-radius:8px;padding:6px 10px;margin-top:8px}
.addmeta:hover{color:#fff}

.sec{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:13px}
.sec.off{opacity:.5}
.sechd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sechd input.title{font-family:'Bobby';font-size:15px;letter-spacing:.01em;border:0;border-bottom:1.5px solid transparent;
 padding:2px 0;flex:1;background:none}
.sechd input.title:focus{outline:none;border-bottom-color:var(--gf)}
.tick{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--chan);
 text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.tick input{width:16px;height:16px;accent-color:var(--gf)}
.mvs{display:flex;gap:3px}
.mvs button,.delsec{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);color:var(--chan);font-size:14px}
.mvs button:hover{border-color:var(--nav);color:var(--nav)}
.delsec{color:#c98;font-size:15px}
.delsec:hover{border-color:#d53b48;color:#d53b48}
.sec textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:12.5px;
 line-height:1.5;resize:vertical;min-height:70px}
.kvedit{display:flex;flex-direction:column;gap:6px}
.kvrow{display:grid;grid-template-columns:200px 1fr 30px;gap:8px}
.kvrow input,.listrow input{border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:12.5px;width:100%}
.listrow{display:grid;grid-template-columns:1fr 30px;gap:8px;margin-bottom:6px}
.addrow{font-size:11.5px;font-weight:600;color:var(--chan);border:1px dashed var(--line);border-radius:8px;
 padding:6px 11px;margin-top:8px}
.addrow:hover{border-color:var(--nav);color:var(--nav)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.two label,.subl{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
 color:var(--chan);margin:0 0 5px}
.ftedit{overflow:auto}
.ftedit table{border-collapse:collapse;font-size:12px}
.ftedit th{font-size:10px;color:var(--chan);font-weight:600;padding:3px 4px;text-align:center}
.ftedit td{padding:2px}
.ftedit input{width:56px;border:1px solid var(--line);border-radius:6px;padding:5px 4px;font-size:11.5px;text-align:center}
.ftedit input.w{width:52px;font-weight:700}
.addsec{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.addsec button{font-size:12px;font-weight:600;color:var(--nav);border:1.5px dashed var(--chan);
 border-radius:10px;padding:9px 14px}
.addsec button:hover{background:#fff;border-style:solid}

/* ---------------- spec preview (Option B) ---------------- */
.wrap{display:flex;justify-content:center}
.spec{width:210mm;min-height:297mm;background:var(--cream);padding:11mm;font-size:8.6pt;line-height:1.34;
 box-shadow:0 12px 44px rgba(20,54,68,.22);position:relative}
.spec .strip{position:absolute;left:0;top:0;height:7px;width:100%}
.spec .hero{background:var(--nav);border-radius:18px;padding:8mm 8mm 7mm;color:#fff;display:flex;
 justify-content:space-between;gap:16px;position:relative;overflow:hidden;margin-top:3px}
.spec .glow{position:absolute;right:-40px;bottom:-70px;width:210px;height:210px;border-radius:50%}
.spec .hero h2{font-family:'Bobby';font-size:42pt;line-height:.88;margin:0 0 6px}
.spec .hero .sub{font-size:10pt;font-weight:500;color:var(--capp);max-width:100mm}
.spec .hero .dsc{font-weight:700;font-size:8pt;text-transform:uppercase;letter-spacing:.05em;margin-top:6px}
.spec .hero .meta{text-align:right;font-size:7.6pt;line-height:1.75;position:relative;z-index:1;white-space:nowrap}
.spec .hero .meta b{opacity:.7;font-weight:500}
.spec .logo{border:1.5px dashed rgba(255,255,255,.5);border-radius:10px;padding:11px 16px;margin-bottom:9px;
 font-size:7.4pt;letter-spacing:.12em;text-transform:uppercase;text-align:center;color:var(--capp)}
.spec .wlogo{width:34mm;display:block;margin:0 0 9px auto}
.spec .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;position:relative;z-index:1}
.spec .chip{border-radius:16px;padding:4px 11px;font-size:7.5pt;font-weight:700}
.spec .grid{display:grid;grid-template-columns:1fr 1fr;gap:5mm;margin-top:5mm}
.spec .card{background:#fff;border-radius:16px;padding:5mm 5.5mm;box-shadow:0 2px 10px rgba(20,54,68,.07)}
.spec .card.wide{grid-column:1 / -1}
.spec h3{font-family:'Bobby';font-size:11pt;margin:0 0 6px;letter-spacing:.02em;display:flex;align-items:center;gap:8px}
.spec h3:before{content:"";width:9px;height:9px;border-radius:50%;background:var(--ac)}
.spec .body{text-align:justify;hyphens:auto}
.spec table.kv{width:100%;border-collapse:collapse;font-size:8pt}
.spec table.kv th{text-align:left;font-weight:500;color:var(--chan);padding:2.6px 0;width:40%;vertical-align:top}
.spec table.kv td{padding:2.6px 0;font-weight:700;border-bottom:1px solid #eef0f0}
.spec table.kv tr:last-child td,.spec table.kv tr:last-child th{border:0}
.spec .an{font-size:8.4pt;line-height:1.75}
.spec .an b{color:var(--ink)}
.spec .energy{margin-top:6px;font-weight:700;font-size:11pt}
.spec .add{font-size:7.9pt;line-height:1.55}
.spec .add .subl2{display:block;font-weight:700;font-size:7.4pt;text-transform:uppercase;letter-spacing:.06em;
 color:var(--ink);margin-top:5px}
.spec .fchart{background:var(--nav);border-radius:16px;padding:5mm 5.5mm 4mm;color:#fff}
.spec .fchart.wide{}
.spec .fhead{display:grid;text-align:center;padding-bottom:6px}
.spec .fhead b{display:block;font-family:'Bobby';font-size:9pt;color:#fff}
.spec .fhead i{font-style:normal;font-size:6.4pt;color:#aebcc4}
.spec .fpill{color:#fff;font-weight:700;text-align:center;border-radius:14px;padding:3px 0;font-size:8pt;
 letter-spacing:.04em;margin-bottom:3px}
.spec table.fc{width:100%;border-collapse:collapse;font-size:8pt}
.spec table.fc td{padding:2.6px 3px;text-align:center;color:#eaf0f2}
.spec table.fc td.fw{text-align:left;font-weight:700;color:#fff}
.spec table.fc th{font-size:6.8pt;color:#aebcc4;font-weight:600;padding:0 3px 4px;text-align:center}
.spec table.fc th.fw{text-align:left}
.spec table.fc tr:nth-child(odd) td{background:rgba(255,255,255,.05)}
.spec .note{font-size:7.4pt;color:var(--chan);margin-top:3mm;line-height:1.5}
.spec .claims{display:grid;grid-template-columns:1fr 1fr;gap:2px 14px;list-style:none;padding:0;margin:0}
.spec .claims li{font-size:7.8pt;padding-left:15px;position:relative;line-height:1.5}
.spec .claims li:before{content:"";position:absolute;left:0;top:5px;width:7px;height:7px;border-radius:50%;background:var(--ac)}
.spec .disc{font-size:6.9pt;line-height:1.5;color:var(--chan)}
.spec .sign{display:flex;gap:9mm;margin-top:4mm;font-size:7.4pt}
.spec .sign div{flex:1;border-top:1.5px solid var(--ink);padding-top:3px;color:var(--chan)}
.emptyhint{color:var(--chan);font-size:13px;padding:40px;text-align:center}

@media print{
 @page{size:A4;margin:0}
 body{background:#fff}
 .side,.bar{display:none!important}
 .main{overflow:visible}
 .stage{padding:0}
 .wrap{display:block}
 .spec{box-shadow:none;width:210mm;min-height:auto}
 /* keep the navy hero, coloured strips, chips and pills — browsers drop backgrounds when printing unless told to keep them */
 .spec,.spec *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
 /* never split a card, feeding chart, table or the header across a page break */
 .spec .hero,.spec .card,.spec .fchart{break-inside:avoid;page-break-inside:avoid}
 .spec table,.spec table.fc,.spec table.kv,.spec tr,.spec .chips,.spec .claims,.spec .sign{break-inside:avoid;page-break-inside:avoid}
 .spec h3{break-after:avoid;page-break-after:avoid}
 .spec .strip{position:absolute}
}
/* also honour colours when the browser renders a print PREVIEW / saves to PDF */
.spec,.spec *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
/* keep blocks whole when generating a PDF from the on-screen preview too */
.spec .hero,.spec .card,.spec .fchart,.spec table,.spec tr{break-inside:avoid}
@media(max-width:900px){.app{grid-template-columns:1fr}.side{display:none}}
</style>
</head>
<body>

  <aside class="side">
    <div class="brand">Bowlprint<small>Product spec builder</small></div>
    <button class="add" data-act="addProduct">+ Add product</button>
    <div class="plist" id="plist"></div>
    <div class="sfoot">
      <button data-act="export">Export</button>
      <button data-act="import">Import</button>
      <button data-act="reset">Reset</button>
    </div>
    <div class="saved" id="saved">Saved in this browser. Use Export to back up or move your data.</div>
    <input type="file" id="importfile" accept="application/json" style="display:none">
    <input type="file" id="logofile" accept="image/*" style="display:none">
  </aside>
  <main class="main">
    <div class="bar" id="bar"></div>
    <div class="stage" id="stage"></div>
  </main>
</div>

if(SP_QS.has('embed'))document.documentElement.classList.add('embed');
let SP_CANEDIT=true;
function setSavedNote(t){const el=document.getElementById('saved');if(el)el.textContent=t;}

/* ======================= storage ======================= */
const KEY='fresh_spec_builder_v1';
const Store={mem:{},
 async get(k){try{if(window.storage){const r=await window.storage.get(k);return r?r.value:null;}}catch(e){}
  try{const v=localStorage.getItem(k);if(v!==null)return v;}catch(e){} return this.mem[k]||null;},
 async set(k,v){try{if(window.storage){await window.storage.set(k,v);}}catch(e){}
  try{localStorage.setItem(k,v);}catch(e){} this.mem[k]=v;}};

if(SP_SHARED){
 let _spT=null;
 Store.get=async k=>{
  const r=await fetch('/api/specs',{headers:{Authorization:'Bearer '+SP_TOKEN},cache:'no-store'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d=await r.json(); SP_CANEDIT=!d.caps||d.caps.edit!==false;
  return JSON.stringify(d.data||{products:[]});
 };
 Store.set=(k,v)=>{
  clearTimeout(_spT); setSavedNote('Saving…');
  _spT=setTimeout(async()=>{
   try{
    const d=JSON.parse(v);
    const r=await fetch('/api/specs',{method:'PUT',headers:{'Content-Type':'application/json',Authorization:'Bearer '+SP_TOKEN},body:JSON.stringify({data:{products:d.products||[]}})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    setSavedNote('● Shared — saved');
   }catch(e){ setSavedNote('Save failed — check connection'); }
  },500);
 };
 document.addEventListener('DOMContentLoaded',()=>{const el=document.getElementById('saved');if(el)el.textContent='● Shared — everyone with specs access sees the same sheets. Saved automatically.';});
}

/* ======================= state ======================= */
let state={products:[],sel:null,mode:'preview',collapsed:new Set()};
let saveT=null;
function save(){clearTimeout(saveT);saveT=setTimeout(()=>{Store.set(KEY,JSON.stringify({products:state.products,collapsed:[...state.collapsed]}));},350);}
function uid(){return 'p'+Math.random().toString(36).slice(2,8);}
function cur(){return state.products.find(p=>p.id===state.sel);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function contrast(hex){const h=hex.replace('#','');const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
 return (0.299*r+0.587*g+0.114*b)>150?'#143644':'#ffffff';}
function getP(o,path){return path.split('.').reduce((a,k)=>a==null?a:a[k],o);}
function setP(o,path,val){const ks=path.split('.');const last=ks.pop();let t=o;for(const k of ks)t=t[k];t[last]=val;}

/* ======================= render ======================= */
function render(){renderSide();renderBar();renderStage();}

function pitemHTML(p){
 const lf=(p.sections.find(s=>s.kind==='kv')?.data?.[1]?.v||'').toLowerCase();
 const life=lf.includes('cat')?'CAT':lf.includes('puppy')?'PUP':'ADT';
 return `<div class="pitem ${p.id===state.sel?'on':''}" data-act="select" data-id="${p.id}">
   <span class="dot" style="background:${esc(p.accent)}"></span>
   <span class="nm">${esc(p.name)}</span><span class="ls">${life}</span></div>`;
}
function renderSide(){
 const el=document.getElementById('plist');
 el.innerHTML=RANGES.map(rg=>{
  const inRange=state.products.filter(p=>(p.range||'Fresh')===rg);
  const col=state.collapsed.has(rg);
  let html=`<div class="rangehd ${col?'col':''}" data-act="toggleRange" data-r="${esc(rg)}">
    <span class="chev">\u25bc</span>${esc(rg)}<span class="ct">${inRange.length}</span></div>`;
  if(col)return html;
  const brandsHere=[...new Set([...BRANDS, ...inRange.map(p=>p.brand||'White Label')])];   // show any brand present, not just the two defaults
  html+=brandsHere.map(br=>{
   const items=inRange.filter(p=>(p.brand||'White Label')===br);
   if(!items.length && !BRANDS.includes(br)) return '';   // hide empty extra brands
   const bcol=state.collapsed.has(rg+'||'+br);
   let sub=`<div class="brandhd ${bcol?'col':''}" data-act="toggleBrand" data-r="${esc(rg)}" data-b="${esc(br)}">
     <span class="chev2">\u25be</span>${esc(br)}<span class="bct">${items.length}</span>
     <button class="plus" data-act="addProduct" data-r="${esc(rg)}" data-b="${esc(br)}" title="Add product here">+</button></div>`;
   if(!bcol) sub+= items.length ? items.map(pitemHTML).join('') : `<div class="emptysub">No products yet</div>`;
   return sub;
  }).join('');
  return html;
 }).join('');
}

function renderBar(){
 const p=cur();const bar=document.getElementById('bar');
 if(!p){bar.innerHTML='';return;}
 bar.innerHTML=`<h1>${esc(p.name)}</h1>
  <div class="seg">
   <button data-act="mode" data-m="edit" class="${state.mode==='edit'?'on':''}">Edit</button>
   <button data-act="mode" data-m="preview" class="${state.mode==='preview'?'on':''}">Preview</button>
  </div>
  <span class="sp"></span>
  <button class="act pri" data-act="print">Print / Save PDF</button>
  <button class="act" data-act="duplicate">Duplicate</button>
  <button class="act warn" data-act="delete">Delete</button>`;
}

function renderStage(){
 const p=cur();const st=document.getElementById('stage');
 if(!p){st.innerHTML='<div class="emptyhint">No product selected. Add one from the left, or pick a recipe.</div>';return;}
 st.innerHTML = state.mode==='edit' ? editor(p) : `<div class="wrap">${spec(p)}</div>`;
}

/* ---------- preview (Option B) ---------- */
function spec(p){
 const ac=esc(p.accent);const ct=contrast(p.accent);
 const logoSrc=p.logo?p.logo:(p.brand==='Wilsons'?WLOGO:'');
 let hero='', chips='', cards='';
 p.sections.forEach((s,i)=>{
  if(!s.show)return;
  if(s.kind==='chips'){chips=`<div class="chips">${s.data.map(c=>`<span class="chip" style="background:${ac};color:${ct}">${esc(c)}</span>`).join('')}</div>`;return;}
  cards+=cardHTML(s,ac,ct);
 });
 const meta=p.meta.map(m=>`<b>${esc(m.l)}</b> ${esc(m.v)}`).join('<br>');
 return `<div class="spec" id="specsheet" style="--ac:${ac}">
  <div class="strip" style="background:${ac}"></div>
  <div class="hero"><div class="glow" style="background:${ac}22"></div>
   <div>
    <h2>${esc(p.name)}</h2>
    <div class="sub">${esc(p.subtitle)}</div>
    <div class="dsc" style="color:${ac}">${esc(p.descriptor)}</div>
    ${chips}
   </div>
   <div class="meta">${logoSrc?`<img class="wlogo" src="${logoSrc}" alt="logo">`:`<div class="logo">Customer<br>logo</div>`}${meta}</div>
  </div>
  <div class="grid">${cards}</div></div>`;
}
function cardHTML(s,ac,ct){
 const w=s.wide?' wide':'';
 if(s.kind==='text'||s.kind==='customText')
  return `<div class="card${w}"><h3>${esc(s.title)}</h3><div class="body">${esc(s.data)}</div></div>`;
 if(s.kind==='kv'||s.kind==='customKV')
  return `<div class="card${w}"><h3>${esc(s.title)}</h3><table class="kv">${s.data.map(r=>`<tr><th>${esc(r.l)}</th><td>${esc(r.v)}</td></tr>`).join('')}</table></div>`;
 if(s.kind==='analytical')
  return `<div class="card${w}"><h3>${esc(s.title)}</h3><div class="an">${s.data.rows.map(r=>`${esc(r.l)} <b>${esc(r.v)}</b>`).join(' \u00b7 ')}</div><div class="energy">Energy&nbsp; ${esc(s.data.energy)}</div></div>`;
 if(s.kind==='additives')
  return `<div class="card${w}"><h3>${esc(s.title)}</h3><div class="add"><span class="subl2">Vitamins</span>${esc(s.data.vitamins)}<span class="subl2">Trace elements</span>${esc(s.data.trace)}</div></div>`;
 if(s.kind==='claims')
  return `<div class="card${w}"><h3>${esc(s.title)}</h3><ul class="claims">${s.data.map(c=>`<li>${esc(c)}</li>`).join('')}</ul></div>`;
 if(s.kind==='disclaimer')
  return `<div class="card${w}"><h3>${esc(s.title)}</h3><div class="disc">${esc(s.data)}</div><div class="sign"><div>Prepared by</div><div>Approved by</div><div>Date</div><div>Revision&nbsp;&nbsp;1.0</div></div></div>`;
 if(s.kind==='feedAdult'){
  const rows=s.data.table.map(r=>`<tr><td class="fw">${esc(r[0])} kg</td><td>${esc(r[1])}</td><td>${esc(r[2])}</td><td>${esc(r[3])}</td></tr>`).join('');
  return `<div class="fchart${w}"><h3 style="color:#fff">${esc(s.title)}</h3>
   <div class="fhead" style="grid-template-columns:1.1fr 1fr 1fr 1fr"><span></span>
    <div><b>Low</b><i>&lt;1 hr/day</i></div><div><b>Medium</b><i>1–2 hr/day</i></div><div><b>High</b><i>2+ hr/day</i></div></div>
   <div class="fpill" style="background:${ac};color:${ct}">Grams per day</div>
   <table class="fc"><tbody>${rows}</tbody></table>
   <div class="note" style="color:#aebcc4">${esc(s.data.note)}</div></div>`;
 }
 if(s.kind==='feedPuppy'){
  const head=`<tr><th class="fw">Adult wt</th>${s.data.ages.map(a=>`<th>${esc(a)}</th>`).join('')}</tr>`;
  const rows=s.data.rows.map(r=>`<tr><td class="fw">${esc(r[0])} kg</td>${r.slice(1).map(v=>`<td>${esc(v)}</td>`).join('')}</tr>`).join('');
  return `<div class="fchart${w}"><h3 style="color:#fff">${esc(s.title)}</h3>
   <div class="fpill" style="background:${ac};color:${ct}">Grams per day \u00b7 by age</div>
   <table class="fc"><thead>${head}</thead><tbody>${rows}</tbody></table>
   <div class="note" style="color:#aebcc4">${esc(s.data.note)}</div></div>`;
 }
 return '';
}

/* ---------- editor ---------- */
function editor(p){
 const meta=p.meta.map((m,i)=>`<div class="metarow">
   <input data-path="meta.${i}.l" value="${esc(m.l)}">
   <input data-path="meta.${i}.v" value="${esc(m.v)}">
   <button class="mini" data-act="delMeta" data-i="${i}">\u00d7</button></div>`).join('');
 const secs=p.sections.map((s,i)=>secEditor(s,i)).join('');
 return `<div class="ed">
  <div class="hd">
   <div class="row"><label>Product name</label><input data-path="name" value="${esc(p.name)}"></div>
   <div class="row"><label>Group</label><div style="display:flex;gap:8px">
     <select data-path="range">${RANGES.map(r=>`<option ${p.range===r?'selected':''}>${esc(r)}</option>`).join('')}</select>
     <select data-path="brand">${[...new Set([...BRANDS, p.brand].filter(Boolean))].map(b=>`<option ${p.brand===b?'selected':''}>${esc(b)}</option>`).join('')}</select>
   </div></div>
   <div class="row"><label>Subtitle</label><input data-path="subtitle" value="${esc(p.subtitle)}"></div>
   <div class="row"><label>Strapline</label><input data-path="descriptor" value="${esc(p.descriptor)}"></div>
   <div class="row"><label>Accent colour</label><input type="color" data-path="accent" value="${esc(p.accent)}"></div>
   <div class="row"><label>Logo</label><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
     ${p.logo?`<img src="${p.logo}" style="height:30px;max-width:130px;background:#fff;border-radius:5px;padding:3px 6px;object-fit:contain">`:`<span style="color:#9fb0b9;font-size:12px">${p.brand==='Wilsons'?'Using Wilsons logo (upload to override)':'No logo \u2014 placeholder shown'}</span>`}
     <button class="act2" data-act="uploadLogo">Upload logo</button>
     ${p.logo?`<button class="act2" data-act="removeLogo">Remove</button>`:''}
   </div></div>
   <div class="row" style="align-items:start"><label>Header details</label>
     <div><div class="metarows">${meta}</div><button class="addmeta" data-act="addMeta">+ add detail</button></div></div>
  </div>
  ${secs}
  <div class="addsec">
   <button data-act="addSec" data-k="customText">+ Text block</button>
   <button data-act="addSec" data-k="customKV">+ Key-value list</button>
   <button data-act="addSec" data-k="claims">+ Bullet list</button>
  </div></div>`;
}
function secHead(s,i){
 return `<div class="sechd">
   <label class="tick"><input type="checkbox" data-path="sections.${i}.show" ${s.show?'checked':''} data-showtoggle="${i}">On spec</label>
   <input class="title" data-path="sections.${i}.title" value="${esc(s.title)}">
   <label class="tick" title="Full width"><input type="checkbox" data-path="sections.${i}.wide" ${s.wide?'checked':''}>Wide</label>
   <div class="mvs"><button data-act="moveSec" data-i="${i}" data-d="-1">\u2191</button>
   <button data-act="moveSec" data-i="${i}" data-d="1">\u2193</button></div>
   <button class="delsec" data-act="delSec" data-i="${i}">\u00d7</button></div>`;
}
function secEditor(s,i){
 let inner='';
 if(s.kind==='text'||s.kind==='customText'||s.kind==='disclaimer'){
  const isComp=SP_SHARED&&/composition/i.test(s.title); const linked=isComp&&cur()&&cur().recipeRef;
  const head=!isComp?'':(linked
    ? `<div style="font-size:11.5px;color:var(--nav);background:#eef6f2;border:1px solid #cfe6da;border-radius:8px;padding:6px 9px;margin-bottom:7px">🔗 Linked to <b>${esc(cur().recipeRef)}</b> in Recipe Costing — this composition updates automatically. <button class="addrow" style="margin-left:4px" data-act="fromRecipe" data-i="${i}">change recipe</button></div>`
    : `<button class="addrow" data-act="fromRecipe" data-i="${i}" title="Fill this composition from a recipe in Recipe Costing / the Recipe Library">⇣ Fill from recipe</button>`);
  inner=`${head}<textarea data-path="sections.${i}.data">${esc(s.data)}</textarea>`;
 }
 else if(s.kind==='kv'||s.kind==='customKV'){
  inner=`<div class="kvedit">${s.data.map((r,j)=>`<div class="kvrow">
    <input data-path="sections.${i}.data.${j}.l" value="${esc(r.l)}">
    <input data-path="sections.${i}.data.${j}.v" value="${esc(r.v)}">
    <button class="mini" data-act="delKV" data-i="${i}" data-j="${j}">\u00d7</button></div>`).join('')}</div>
    <button class="addrow" data-act="addKV" data-i="${i}">+ add field</button>`;
 }else if(s.kind==='chips'||s.kind==='claims'){
  inner=`<div>${s.data.map((c,j)=>`<div class="listrow">
    <input data-path="sections.${i}.data.${j}" value="${esc(c)}">
    <button class="mini" data-act="delItem" data-i="${i}" data-j="${j}">\u00d7</button></div>`).join('')}</div>
    <button class="addrow" data-act="addItem" data-i="${i}">+ add ${s.kind==='chips'?'fact':'point'}</button>`;
 }else if(s.kind==='analytical'){
  inner=`<div class="kvedit">${s.data.rows.map((r,j)=>`<div class="kvrow">
    <input data-path="sections.${i}.data.rows.${j}.l" value="${esc(r.l)}">
    <input data-path="sections.${i}.data.rows.${j}.v" value="${esc(r.v)}">
    <button class="mini" data-act="delAn" data-i="${i}" data-j="${j}">\u00d7</button></div>`).join('')}</div>
    <button class="addrow" data-act="addAn" data-i="${i}">+ add constituent</button>
    <div style="margin-top:10px"><span class="subl">Energy</span>
    <input class="w" style="width:200px;border:1px solid var(--line);border-radius:8px;padding:7px 9px" data-path="sections.${i}.data.energy" value="${esc(s.data.energy)}"></div>`;
 }else if(s.kind==='additives'){
  inner=`<div class="two">
    <div><label>Vitamins</label><textarea data-path="sections.${i}.data.vitamins">${esc(s.data.vitamins)}</textarea></div>
    <div><label>Trace elements</label><textarea data-path="sections.${i}.data.trace">${esc(s.data.trace)}</textarea></div></div>`;
 }else if(s.kind==='feedAdult'){
  const rows=s.data.table.map((r,ri)=>`<tr>
    <td><input class="w" data-path="sections.${i}.data.table.${ri}.0" value="${esc(r[0])}"></td>
    <td><input data-path="sections.${i}.data.table.${ri}.1" value="${esc(r[1])}"></td>
    <td><input data-path="sections.${i}.data.table.${ri}.2" value="${esc(r[2])}"></td>
    <td><input data-path="sections.${i}.data.table.${ri}.3" value="${esc(r[3])}"></td></tr>`).join('');
  inner=`<div class="ftedit"><table><thead><tr><th>kg</th><th>Low</th><th>Med</th><th>High</th></tr></thead><tbody>${rows}</tbody></table></div>
   <div style="margin-top:8px"><span class="subl">Note</span><textarea data-path="sections.${i}.data.note">${esc(s.data.note)}</textarea></div>`;
 }else if(s.kind==='feedPuppy'){
  const head=`<tr><th>kg</th>${s.data.ages.map((a,k)=>`<th><input style="width:44px" data-path="sections.${i}.data.ages.${k}" value="${esc(a)}"></th>`).join('')}</tr>`;
  const rows=s.data.rows.map((r,ri)=>`<tr><td><input class="w" data-path="sections.${i}.data.rows.${ri}.0" value="${esc(r[0])}"></td>${r.slice(1).map((v,k)=>`<td><input style="width:46px" data-path="sections.${i}.data.rows.${ri}.${k+1}" value="${esc(v)}"></td>`).join('')}</tr>`).join('');
  inner=`<div class="ftedit"><table><thead>${head}</thead><tbody>${rows}</tbody></table></div>
   <div style="margin-top:8px"><span class="subl">Note</span><textarea data-path="sections.${i}.data.note">${esc(s.data.note)}</textarea></div>`;
 }
 return `<div class="sec ${s.show?'':'off'}" data-sec="${i}">${secHead(s,i)}${inner}</div>`;
}

/* When a spec is linked to a recipe (recipeRef), pull the latest Composition from Recipe Costing so
   any change to the recipe flows straight through to the spec (and its printed / PDF copy). */
async function syncLinkedComposition(p){
 if(!p||!p.recipeRef||!SP_SHARED) return false;
 const sec=(p.sections||[]).find(s=>/composition/i.test(s.title)); if(!sec) return false;
 try{
  const c=await fetch('/api/recipe-composition?name='+encodeURIComponent(p.recipeRef),{headers:{Authorization:'Bearer '+SP_TOKEN}});
  const d=await c.json();
  if(d&&d.composition&&d.composition!==sec.data){ sec.data=d.composition; save(); return true; }
 }catch(e){}
 return false;
}
/* ======================= actions ======================= */
document.addEventListener('click',e=>{
 const t=e.target.closest('[data-act]');if(!t)return;
 const a=t.dataset.act, p=cur();
 if(a==='select'){state.sel=t.dataset.id;render();syncLinkedComposition(cur()).then(ch=>{if(ch)render();});}
 else if(a==='mode'){state.mode=t.dataset.m;render();}
 else if(a==='toggleRange'){const r=t.dataset.r;state.collapsed.has(r)?state.collapsed.delete(r):state.collapsed.add(r);save();renderSide();}
 else if(a==='toggleBrand'){const k=t.dataset.r+'||'+t.dataset.b;state.collapsed.has(k)?state.collapsed.delete(k):state.collapsed.add(k);save();renderSide();}
 else if(a==='print'){state.mode='preview';render();(async()=>{await syncLinkedComposition(cur());render();setTimeout(()=>window.print(),80);})();}
 else if(a==='addProduct'){const np=blank(t.dataset.r||'Fresh',t.dataset.b||'White Label');state.products.push(np);state.sel=np.id;state.mode='edit';save();render();}
 else if(a==='duplicate'&&p){const c=JSON.parse(JSON.stringify(p));c.id=uid();c.name=p.name+' (copy)';state.products.push(c);state.sel=c.id;save();render();}
 else if(a==='delete'&&p){if(confirm('Delete '+p.name+'?')){state.products=state.products.filter(x=>x.id!==p.id);state.sel=state.products[0]?.id||null;save();render();}}
 else if(a==='uploadLogo'){document.getElementById('logofile').click();}
 else if(a==='removeLogo'&&p){p.logo=null;save();render();}
 else if(a==='addMeta'&&p){p.meta.push({l:'New detail',v:''});save();render();}
 else if(a==='delMeta'&&p){p.meta.splice(+t.dataset.i,1);save();render();}
 else if(a==='addKV'&&p){p.sections[+t.dataset.i].data.push({l:'New field',v:''});save();render();}
 else if(a==='delKV'&&p){p.sections[+t.dataset.i].data.splice(+t.dataset.j,1);save();render();}
 else if(a==='addItem'&&p){p.sections[+t.dataset.i].data.push('New');save();render();}
 else if(a==='delItem'&&p){p.sections[+t.dataset.i].data.splice(+t.dataset.j,1);save();render();}
 else if(a==='addAn'&&p){p.sections[+t.dataset.i].data.rows.push({l:'New',v:''});save();render();}
 else if(a==='delAn'&&p){p.sections[+t.dataset.i].data.rows.splice(+t.dataset.j,1);save();render();}
 else if(a==='moveSec'&&p){const i=+t.dataset.i,d=+t.dataset.d,j=i+d;if(j>=0&&j<p.sections.length){const s=p.sections.splice(i,1)[0];p.sections.splice(j,0,s);save();render();}}
 else if(a==='delSec'&&p){if(confirm('Remove this section?')){p.sections.splice(+t.dataset.i,1);save();render();}}
 else if(a==='addSec'&&p){const k=t.dataset.k;let s;
   if(k==='customText')s={kind:'customText',title:'New section',show:true,wide:true,data:'Type here…'};
   else if(k==='customKV')s={kind:'customKV',title:'New section',show:true,wide:true,data:[{l:'Field',v:''}]};
   else s={kind:'claims',title:'New list',show:true,wide:true,data:['New point']};
   p.sections.push(s);save();render();}
 else if(a==='fromRecipe'){
   (async()=>{
    try{
     const r=await fetch('/api/recipes',{headers:{Authorization:'Bearer '+SP_TOKEN}});
     const recs=await r.json();
     const names=recs.map(x=>(x.brand?x.brand+' — ':'')+x.name);
     const pick=prompt('Type the number of the recipe to use:\n'+names.map((n,ix)=>(ix+1)+'. '+n).join('\n'));
     const ix=parseInt(pick,10)-1;
     if(Number.isNaN(ix)||!recs[ix]) return;
     const q=recs[ix].brand?recs[ix].brand+' '+recs[ix].name:recs[ix].name; /* brand included — several brands share names like "Chicken" */
     const c=await fetch('/api/recipe-composition?name='+encodeURIComponent(q),{headers:{Authorization:'Bearer '+SP_TOKEN}});
     const d=await c.json();
     if(d.composition){ const p=cur(); const sec=p.sections[+t.dataset.i]; sec.data=d.composition; p.recipeRef=q; save(); render(); }
     else alert(d.error||'No composition found for that recipe.');
    }catch(e){ alert('Could not load recipes: '+e.message); }
   })();
 }
 else if(a==='export'){const blob=new Blob([JSON.stringify({products:state.products},null,2)],{type:'application/json'});
   const u=URL.createObjectURL(blob);const link=document.createElement('a');link.href=u;link.download='fresh-specs.json';link.click();URL.revokeObjectURL(u);}
 else if(a==='import'){document.getElementById('importfile').click();}
 else if(a==='reset'){if(confirm('Reset to the 8 default recipes? This replaces everything currently loaded.')){state.products=SEED();state.sel=state.products[0].id;save();render();}}
});
document.getElementById('importfile').addEventListener('change',e=>{
 const f=e.target.files[0];if(!f)return;const r=new FileReader();
 r.onload=()=>{try{const d=JSON.parse(r.result);if(d.products){state.products=d.products;state.products.forEach(p=>{if(!p.range)p.range='Fresh';if(!p.brand)p.brand='White Label';});state.sel=d.products[0]?.id||null;save();render();}}catch(err){alert('Could not read that file.');}};
 r.readAsText(f);e.target.value='';
});
document.getElementById('logofile').addEventListener('change',e=>{const f=e.target.files[0];if(f)handleLogo(f);e.target.value='';});
function handleLogo(file){const p=cur();if(!p)return;const rd=new FileReader();
 rd.onload=()=>{const img=new Image();img.onload=()=>{const max=400;let w=img.width,h=img.height;const sc=Math.min(1,max/Math.max(w,h));w=Math.round(w*sc)||1;h=Math.round(h*sc)||1;const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);try{p.logo=cv.toDataURL('image/png');}catch(err){p.logo=rd.result;}save();render();};img.onerror=()=>{p.logo=rd.result;save();render();};img.src=rd.result;};
 rd.readAsDataURL(file);}
/* live edits without re-render (keeps focus) */
document.addEventListener('input',e=>{
 const t=e.target;if(!t.dataset.path)return;const p=cur();if(!p)return;
 setP(p,t.dataset.path,t.type==='checkbox'?t.checked:t.value);
 if(t.dataset.showtoggle!==undefined){const card=t.closest('.sec');if(card)card.classList.toggle('off',!t.checked);}
 save();
});
document.addEventListener('change',e=>{
 const t=e.target;const p=cur();if(!p||!t.dataset.path)return;
 if(t.type==='color'||t.tagName==='SELECT'){setP(p,t.dataset.path,t.value);save();render();}
});

/* ======================= init ======================= */
(async function(){
 const raw=await Store.get(KEY);
 if(raw){try{const d=JSON.parse(raw);state.products=d.products||SEED();if(d.collapsed)state.collapsed=new Set(d.collapsed);}catch(e){state.products=SEED();}}
 else state.products=SEED();
 state.products.forEach(p=>{if(!p.range)p.range='Fresh';if(!p.brand)p.brand='White Label';});
 if(!state.products.some(p=>p.range==='Fresh'&&p.brand==='Wilsons')){WL_SEED().map(wilsonify).forEach(w=>{if(!state.products.some(p=>p.id===w.id))state.products.push(w);});save();}
 if(!state.products.some(p=>p.range==='Cold Press')){COLD_SEED().forEach(w=>{if(!state.products.some(p=>p.id===w.id))state.products.push(w);});save();}
 (function(){const T={'cp-chicken':CPFA_CHICKEN,'cp-beef':CPFA_BEEF,'cp-fish':CPFA_FISH};let ch=false;state.products.forEach(p=>{const tb=T[p.id];if(!tb)return;const i=p.sections.findIndex(s=>s.title==='Feeding guide');if(i>=0&&p.sections[i].kind!=='feedAdult'){p.sections[i]={kind:'feedAdult',title:'Feeding guide',show:true,wide:true,data:{note:CP_FEEDNOTE,table:JSON.parse(JSON.stringify(tb))}};ch=true;}});if(ch)save();})();
 if(!SP_SHARED&&!window.storage&&!localAvailable())document.getElementById('saved').textContent='Heads up: this preview can\u2019t save on its own — Export your data before closing, or download this file and open it in your browser to save automatically.';
 state.sel=state.products[0]?.id||null;
 render();
})();
function localAvailable(){try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return true;}catch(e){return false;}}
function blank(range,brand){return {id:uid(),name:'New product',range:range||'Fresh',brand:brand||'White Label',logo:null,
 subtitle:'Complete fresh food for adult dogs',
 descriptor:'Gently steamed \u00b7 cupboard stable \u00b7 ready to eat',accent:'#f37d89',meta:DEFMETA(),
 sections:[
  {kind:'chips',title:'Key facts',show:true,data:['Complete','Adult','380 g']},
  {kind:'text',title:'Composition',show:true,wide:true,data:''},
  {kind:'analytical',title:'Analytical constituents',show:true,data:{rows:AN_LABELS.map(l=>({l,v:''})),energy:''}},
  {kind:'additives',title:'Additives / kg',show:true,data:{vitamins:'',trace:''}},
  {kind:'kv',title:'General characteristics',show:true,wide:true,data:general('New product — complete food','Adult \u00b7 all breeds')},
  {kind:'feedAdult',title:'Feeding guide',show:true,wide:true,data:{note:ADULT_NOTE,table:JSON.parse(JSON.stringify(FA))}},
  {kind:'claims',title:'Claims & statements',show:true,wide:true,data:['Complete pet food for adult dogs']},
  {kind:'disclaimer',title:'Notes & sign-off',show:true,wide:true,data:DISC}
 ]};}
