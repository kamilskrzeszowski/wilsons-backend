<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wilsons Pet Food — Costing App</title>
<script>if(new URLSearchParams(location.search).has('embed'))document.documentElement.classList.add('embed');</script>
<style>
/* Wilsons brand fonts (served by the app itself; falls back to system fonts offline) */
@font-face{font-family:'Bobby Jones';src:url('/assets/BobbyJones-Regular.otf') format('opentype');font-weight:400;font-display:swap}
@font-face{font-family:'Effra';src:url('/assets/Effra_Rg.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'Effra';src:url('/assets/Effra_Md.ttf') format('truetype');font-weight:500;font-display:swap}
@font-face{font-family:'Effra';src:url('/assets/Effra_Bd.ttf') format('truetype');font-weight:700;font-display:swap}
:root{
  --sea:#143644; --channel:#4b5f6d; --capp:#e0ddcb; --grape:#f37d89;
  --bg:#f7f4ec; --card:#ffffff; --line:#d9d5c7; --ok:#2e8b6f; --warn:#c0554f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Effra',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--sea);font-size:14px}
h1,h2,h3,.display{font-family:'Bobby Jones','Effra',sans-serif;letter-spacing:.02em;font-weight:400}
/* Embedded inside the Production Manager: hide the standalone header branding, keep the section nav */
html.embed body{background:transparent}
html.embed header{background:transparent;position:static;padding:2px 0 10px}
html.embed header .logo,html.embed header h1,html.embed header .sub{display:none}
html.embed nav{margin-left:0}
html.embed nav button{border-color:#c9d0cd;color:var(--sea)}
html.embed nav button.active{background:var(--grape);border-color:var(--grape);color:var(--sea)}
html.embed nav button:hover{border-color:var(--grape)}
html.embed main{padding:6px 2px 24px;max-width:none}
header{background:var(--sea);color:#fff;padding:14px 26px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:50}
header .logo{height:52px;display:flex;align-items:center}
header .logo svg{height:52px;width:auto}
header h1{font-size:24px;font-weight:400;text-transform:uppercase;letter-spacing:.06em}
header .sub{color:var(--capp);font-size:12px;margin-top:-4px}
nav{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
nav button{background:transparent;border:2px solid var(--channel);color:#fff;padding:8px 18px;border-radius:22px;cursor:pointer;font-family:'Bobby Jones','Effra',sans-serif;font-weight:400;font-size:14px;text-transform:uppercase;letter-spacing:.04em}
nav button.active{background:var(--grape);border-color:var(--grape);color:var(--sea)}
nav button:hover{border-color:var(--grape)}
main{max-width:1280px;margin:0 auto;padding:24px}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar input[type=text],.toolbar select{padding:9px 14px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff;min-width:220px;color:var(--sea)}
.btn{background:var(--sea);color:#fff;border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-weight:500;font-size:13px}
.btn:hover{background:var(--channel)}
.btn.accent{background:var(--grape);color:var(--sea);font-weight:700}
.btn.ghost{background:transparent;color:var(--sea);border:1px solid var(--channel)}
.btn.small{padding:5px 10px;font-size:12px}
.btn.danger{background:var(--warn)}
.count{color:var(--channel);font-size:13px;margin-left:auto}
.card{background:var(--card);border-radius:16px;box-shadow:0 1px 4px rgba(20,54,68,.08);overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;scrollbar-color:#b7b099 #eee9db}
/* wide tables: keep the scrollbar visible so it's obvious there's more to the right */
.card::-webkit-scrollbar{height:11px}
.card::-webkit-scrollbar-thumb{background:#b7b099;border-radius:6px;border:2px solid #eee9db}
.card::-webkit-scrollbar-track{background:#eee9db;border-radius:6px}
.syncstate{align-self:center;font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:20px;white-space:nowrap;font-family:'Effra',sans-serif}
.syncstate.saved{background:#e7f2ec;color:#2e8b6f}
.syncstate.saving{background:#fdf3df;color:#a97b13}
.syncstate.offline{background:#f7dcd9;color:#b4231f}
table{width:100%;border-collapse:collapse}
th{background:var(--sea);color:#fff;text-align:left;padding:9px 10px;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;white-space:nowrap;user-select:none}
th.num,td.num{text-align:right}
th .arr{opacity:.6;font-size:10px}
td{padding:7px 10px;border-bottom:1px solid #eee9dd;white-space:nowrap}
tr:hover td{background:#faf8f1}
tr.group-start td{border-top:2px solid var(--capp)}
td.pname{font-weight:500}
td input{width:90px;padding:4px 6px;border:1px solid var(--line);border-radius:6px;text-align:right;font-size:13px;color:var(--sea)}
.pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:500;background:var(--capp);color:var(--sea)}
.pill.grape{background:var(--grape);color:#fff}
.pill.sea{background:var(--sea);color:#fff}
.pill.chan{background:var(--channel);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.tile{background:var(--card);border-radius:16px;padding:0;cursor:pointer;box-shadow:0 1px 4px rgba(20,54,68,.08);overflow:hidden;transition:transform .12s, box-shadow .12s;border:none;text-align:left}
.tile:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(20,54,68,.16)}
.tile .band{height:64px;display:flex;align-items:center;padding:0 18px;color:#fff}
.tile .band h3{font-size:18px;font-weight:400;text-transform:uppercase;letter-spacing:.04em}
.tile .body{padding:14px 18px 16px}
.tile .kv{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;color:var(--channel)}
.tile .kv b{color:var(--sea);font-size:14px}
.tile .big{font-family:'Bobby Jones','Effra',sans-serif;font-size:24px;font-weight:400;color:var(--sea)}
.tile .big span{font-size:13px;font-weight:600;color:var(--channel)}
/* recipe folders (Wilsons / White Label drill-down) */
.tile.folder .band h3{font-size:20px}
.tile .foldergo{margin-top:12px;font-size:13px;color:var(--capp);font-weight:700;letter-spacing:.02em}
.tile .folderkv{color:var(--channel);font-size:12.5px;line-height:1.4}
.libbar{display:flex;align-items:center;gap:8px;margin:2px 0 16px;flex-wrap:wrap}
.libcrumb{font-size:14px;color:var(--sea);font-weight:600}
.libcrumb.linky{background:none;border:none;cursor:pointer;color:var(--capp);padding:0;font:inherit;font-weight:700;text-decoration:none}
.libcrumb.linky:hover{text-decoration:underline}
.libsep{color:var(--channel)}
.stat-row{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.stat{background:#fff;color:var(--sea);border-radius:16px;padding:15px 22px;min-width:170px;box-shadow:0 1px 4px rgba(20,54,68,.08)}
.stat .v{font-family:'Bobby Jones','Effra',sans-serif;font-size:28px;font-weight:400;color:var(--sea);line-height:1.1}
.stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#7a8a94;font-weight:500}
.detail-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.detail-head h2{font-size:30px;text-transform:uppercase;font-weight:400}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:18px;align-items:start}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.summary-box{background:var(--sea);color:#fff;border-radius:14px;padding:20px}
.summary-box h3{color:var(--grape);text-transform:uppercase;font-size:15px;margin-bottom:12px}
.summary-box .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.12);font-size:13px}
.summary-box .row b{font-size:14px}
.summary-box .row.total{border-bottom:none;padding-top:10px}
.summary-box .row.total b{font-family:'Bobby Jones','Effra',sans-serif;font-size:22px;font-weight:400;color:var(--grape)}
.summary-box input{width:80px;padding:4px 8px;border-radius:6px;border:none;text-align:right;font-size:13px}
.builder-table td{padding:5px 8px}
.builder-table input.wide{width:100%;min-width:220px;text-align:left}
.builder-table select{padding:5px 8px;border:1px solid var(--line);border-radius:6px;max-width:260px}
.builder-table tfoot .totrow td{border-top:2px solid var(--ink,#143644);padding-top:8px}
table .totrow td{border-top:2px solid var(--line);font-weight:700;background:rgba(20,54,68,.03)}
td.pctcell,th.num{white-space:nowrap}
.catlabel{display:inline-block;font-size:11px;font-weight:600;color:var(--capp);background:rgba(20,54,68,.06);border-radius:20px;padding:2px 10px;margin-bottom:8px}
.muted{color:var(--channel);font-size:12px}
.footer-note{margin:26px 0 8px;color:var(--channel);font-size:12px;text-align:center}
dialog{border:none;border-radius:16px;padding:26px;max-width:420px;box-shadow:0 10px 40px rgba(0,0,0,.3)}
dialog::backdrop{background:rgba(20,54,68,.55)}
dialog h3{margin-bottom:12px}
dialog .btn{margin-top:8px;margin-right:8px}
.tag-custom{background:var(--grape);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;vertical-align:middle;margin-left:8px}
.searchwrap{position:relative}
@media print{
  header nav,.toolbar,.no-print{display:none !important}
  header{position:static}
  body{background:#fff}
  th{position:static;background:#143644 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .card{box-shadow:none;border:1px solid #ccc}
}
</style>
</head>

/* ---------- persistence ----------
   When opened from inside the Wilsons app (with a session token), every costing figure is stored
   on the server — shared by all users, saved key-by-key as people work, refreshed automatically.
   Opened as a plain file (no token), it falls back to this-computer-only storage as before. */
const QS = new URLSearchParams(location.search);
const API_TOKEN = QS.get('token') || '';
const SHARED = !!API_TOKEN;
let KV = {};            // in-memory copy of the shared data
let _dirty = {};        // keys changed here, waiting to be saved
let _saveT = null;
function kvGet(k){ if(SHARED) return (k in KV)?KV[k]:null; try{return localStorage.getItem(k)}catch(e){return null} }
function kvSet(k,v){ if(SHARED){ KV[k]=String(v); _dirty[k]=1; scheduleSave(); } else { try{localStorage.setItem(k,v)}catch(e){} } }
function kvRemove(k){ if(SHARED){ delete KV[k]; _dirty[k]=1; scheduleSave(); } else { try{localStorage.removeItem(k)}catch(e){} } }
async function kvApi(method,body){
  const r = await fetch('/api/costing',{method,headers:{'Content-Type':'application/json',Authorization:'Bearer '+API_TOKEN},body:body?JSON.stringify(body):undefined});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
function setSyncState(s,msg){ const el=document.getElementById('costSync'); if(!el) return; el.style.display=SHARED?'':'none'; el.className='syncstate '+s; el.textContent=msg; }
function scheduleSave(){ setSyncState('saving','Saving…'); clearTimeout(_saveT); _saveT=setTimeout(saveDirty,600); }
async function saveDirty(){
  const keys=Object.keys(_dirty); if(!keys.length) return;
  const data={}; keys.forEach(k=>{ data[k]=(k in KV)?KV[k]:null; });
  try{ await kvApi('PUT',{data}); keys.forEach(k=>delete _dirty[k]); setSyncState('saved','● Shared'); }
  catch(e){ setSyncState('offline','Save failed — retrying'); clearTimeout(_saveT); _saveT=setTimeout(saveDirty,4000); }
}
window.addEventListener('beforeunload',()=>{ if(SHARED&&Object.keys(_dirty).length){ try{ navigator.sendBeacon&&saveDirty(); }catch(e){} } });
/* warn before refresh / closing the tab while a recipe is being edited */
window.addEventListener('beforeunload',e=>{ if(typeof view!=='undefined' && view==='builder' && typeof builderDirty!=='undefined' && builderDirty){ e.preventDefault(); e.returnValue=''; } });
/* pick up other people's changes every 15s (skipped while you're mid-edit) */
function startPolling(){
  if(!SHARED) return;
  setInterval(async()=>{
    if(Object.keys(_dirty).length) return;
    try{
      const r=await kvApi('GET'); const nd=r.data||{};
      let changed=false; new Set([...Object.keys(nd),...Object.keys(KV)]).forEach(k=>{ if(nd[k]!==KV[k]) changed=true; });
      if(changed){ KV=nd; const ae=document.activeElement; const typing=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT'); if(!typing) refresh(); }
    }catch(e){}
  },15000);
}

/* Supplier database: seeded from the spreadsheet's chosen-supplier and DJL prices, then grows with purchases */
function seedSupplierDB(){
  const db=[]; let n=0;
  DATA.ingredients.forEach(i=>{
    const base = i.selPerTonne!=null ? i.selPerTonne/1000 : (i.selPerKg!=null ? i.selPerKg-(i.selTransPerKg||0) : null);
    if(base!=null && i.supplier) db.push({id:'seed'+(n++), supplier:i.supplier, ing:i.name, perKg:+base.toFixed(4), del:i.selTransPerKg||0});
    if(i.djlPerTonne!=null && i.supplier!=='DJL') db.push({id:'seed'+(n++), supplier:'DJL', ing:i.name, perKg:+(i.djlPerTonne/1000).toFixed(4), del:i.djlTransPerKg||0});
  });
  kvSet('wpf_supdb', JSON.stringify(db));
  return db;
}
/* Ingredients are keyed by their ORIGINAL name; renames are display-only so recipes & purchases stay linked */
function allIngs(){ return [...DATA.ingredients, ...store.customIngs]; }
function dispName(key){ const r=store.renames; return r[key]||key; }
function keyOf(name){ const r=store.renames; for(const k in r){ if(r[k]===name) return k; } return name; }
function supOf(i){ const o=store.supplierOverrides; return o[i.name]!=null?o[i.name]:(i.supplier||''); }
function ingRec(name){ const k=keyOf(name); return allIngs().find(x=>x.name===k); }
/* Target (standard) £/kg EX delivery — spreadsheet chosen-supplier base price, editable */
function ingBase(name){
  const o = store.priceOverrides;
  if(o[name]!=null) return o[name];
  const i = ingRec(name); if(!i) return null;
  if(i.selPerTonne!=null) return i.selPerTonne/1000;
  if(i.selPerKg!=null) return i.selPerKg-(i.selTransPerKg||0);
  if(i.djlPerTonne!=null) return i.djlPerTonne/1000;
  return i.djlPerKg;
}
/* Delivery / shipping £/kg — editable */
function ingShip(name){
  const o = store.shipOverrides;
  if(o[name]!=null) return o[name];
  const i = ingRec(name); if(!i) return 0;
  return (i.selTransPerKg!=null?i.selTransPerKg:(i.djlTransPerKg!=null?i.djlTransPerKg:0));
}
/* Target (standard) cost per kg INCLUDING delivery */
function targetPrice(name){ const b = ingBase(name); return b==null?null:b+ingShip(name); }
/* Actual cost: weighted average delivered £/kg of logged purchases */
function ingPurchases(name){ const k=keyOf(name); return store.purchases.filter(p=>p.ing===k); }
function actualPrice(name){
  const ps = ingPurchases(name);
  const kg = ps.reduce((a,p)=>a+p.kg,0);
  if(kg<=0) return null;
  return ps.reduce((a,p)=>a+p.kg*(p.perKg+(p.delPerKg||0)),0)/kg;
}
/* Price used by the recipe builder: actual if we have purchases, otherwise target (both delivered) */
function ingPrice(name){
  const a = actualPrice(name);
  return a!=null ? a : targetPrice(name);
}
/* Recipe pricing: std = target incl delivery, act = purchase average incl delivery; falls back to sheet price */
function linePrice(name, fallback, mode){
  if(mode==='act'){
    const a = actualPrice(name);
    if(a!=null) return {p:a, src:'actual'};
  }
  const t = targetPrice(name);
  if(t!=null) return {p:t, src:'std'};
  return {p:fallback, src:'sheet'};
}
function recipeCost(r, mode){
  /* materials only, EX waste — waste is applied at pack costing level */
  const sub = r.ingredients.reduce((a,i)=>{
    const fb = r.custom ? i.perKg : (i.howPerKg ?? i.djlPerKg ?? 0);
    return a + i.kg*(linePrice(i.name, fb, mode).p||0);
  },0);
  return sub/(r.batchSize||1000);
}
/* full cost build-up for one pack of a recipe.
   Items with std:true apply automatically; others only if selected on the pack.
   basis: 'pct' = % of materials, 'kg' = £ × pack kg, 'pack' = £ per pack. */
function packTotals(perKg, p){
  const items = store.costItems;
  const mat = perKg*p.kg;
  const val = it => it.basis==='pct' ? mat*it.cost/100 : (it.basis==='kg' ? it.cost*p.kg : it.cost);
  const applied = items.filter(it=>it.std || (p.items||[]).includes(it.id))
                       .map(it=>({id:it.id, name:it.name, basis:it.basis, cost:it.cost, std:!!it.std, ch:it.ch||'all', v:val(it)}));
  const sum = list=>list.reduce((a,x)=>a+x.v,0);
  const shared = applied.filter(x=>x.ch==='all');          // costs common to both channels
  const d2cOnly = applied.filter(x=>x.ch==='d2c');         // e.g. D2C shipping box, courier
  const tradeOnly = applied.filter(x=>x.ch==='trade');     // e.g. trade outer box, pallet, haulage
  const baseTot = mat+sum(shared);
  const mgn = (sell,tot)=> sell>0 ? (sell-tot)/sell : null;
  const d2c   = { items:d2cOnly,   extras:sum(d2cOnly),   tot:baseTot+sum(d2cOnly),   sell:(+p.sell>0?+p.sell:null),      };
  const trade = { items:tradeOnly, extras:sum(tradeOnly), tot:baseTot+sum(tradeOnly), sell:(+p.sellTrade>0?+p.sellTrade:null) };
  d2c.margin = mgn(d2c.sell, d2c.tot); trade.margin = mgn(trade.sell, trade.tot);
  const g = id => { const x=applied.find(a=>a.id===id); return x?x.v:0; };
  const extras = sum(shared)+sum(d2cOnly);
  /* top-level fields = the D2C view, so screens that show a single figure keep working */
  return {mat, applied, extras, tot:d2c.tot, margin:d2c.margin, d2c, trade,
    waste:g('waste'), lab:g('labour'), ovh:g('ovh'), ele:g('elec'),
    other: extras-g('waste')-g('labour')-g('ovh')-g('elec')};
}

/* ---------- minimal .xlsx writer (no external libraries; zip with stored entries) ---------- */
function crc32(u8){
  if(!crc32.T){ crc32.T=new Int32Array(256); for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c=c&1?(0xEDB88320^(c>>>1)):(c>>>1); crc32.T[n]=c; } }
  let c=-1; for(let i=0;i<u8.length;i++) c=crc32.T[(c^u8[i])&0xFF]^(c>>>8);
  return (c^-1)>>>0;
}
function makeZip(files){ /* files: [name, Uint8Array] — stored, no compression */
  const enc=new TextEncoder(); const parts=[]; const central=[]; let offset=0;
  files.forEach(([name,data])=>{
    const n=enc.encode(name), crc=crc32(data);
    const lh=new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true); lh.setUint16(4,20,true); lh.setUint16(6,0,true); lh.setUint16(8,0,true);
    lh.setUint16(10,0,true); lh.setUint16(12,0,true); lh.setUint32(14,crc,true);
    lh.setUint32(18,data.length,true); lh.setUint32(22,data.length,true);
    lh.setUint16(26,n.length,true); lh.setUint16(28,0,true);
    parts.push(new Uint8Array(lh.buffer), n, data);
    const ch=new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true); ch.setUint16(4,20,true); ch.setUint16(6,20,true);
    ch.setUint32(16,crc,true); ch.setUint32(20,data.length,true); ch.setUint32(24,data.length,true);
    ch.setUint16(28,n.length,true); ch.setUint32(42,offset,true);
    central.push(new Uint8Array(ch.buffer), n);
    offset += 30+n.length+data.length;
  });
  const cdLen = central.reduce((a,x)=>a+x.length,0);
  const eo=new DataView(new ArrayBuffer(22));
  eo.setUint32(0,0x06054b50,true); eo.setUint16(8,files.length,true); eo.setUint16(10,files.length,true);
  eo.setUint32(12,cdLen,true); eo.setUint32(16,offset,true);
  const all=[...parts,...central,new Uint8Array(eo.buffer)];
  const out=new Uint8Array(all.reduce((a,x)=>a+x.length,0));
  let pos=0; all.forEach(x=>{out.set(x,pos);pos+=x.length});
  return out;
}
function downloadXlsx(filename, sheetName, rows){
  const xesc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const cell = v => (typeof v==='number' && isFinite(v)) ? `<c t="n"><v>${v}</v></c>` : `<c t="inlineStr"><is><t xml:space="preserve">${xesc(v==null?'':v)}</t></is></c>`;
  const sheet = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>${rows.map(r=>`<row>${r.map(cell).join('')}</row>`).join('')}</sheetData></worksheet>`;
  const enc=new TextEncoder();
  const files=[
    ['[Content_Types].xml', enc.encode(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>`)],
    ['_rels/.rels', enc.encode(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`)],
    ['xl/workbook.xml', enc.encode(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="${xesc(sheetName)}" sheetId="1" r:id="rId1"/></sheets></workbook>`)],
    ['xl/_rels/workbook.xml.rels', enc.encode(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>`)],
    ['xl/worksheets/sheet1.xml', enc.encode(sheet)]
  ];
  const zip = makeZip(files);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([zip],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
  a.download=filename; a.click();
}

function ingEditName(x,val){
  const i = ING_VIEW[x]; val = val.trim();
  if(!val){ refresh(); return; }
  if(allIngs().some(o=>o.name!==i.key && (dispName(o.name)===val))){ alert('That name is already in use.'); refresh(); return; }
  if(i.custom){
    const list = store.customIngs;
    const rec = list.find(o=>o.name===i.key); if(!rec){refresh();return;}
    rec.name = val; store.customIngs = list;
    /* cascade custom-ingredient rename to purchases, custom recipes and overrides */
    const ps = store.purchases; ps.forEach(p=>{ if(p.ing===i.key) p.ing=val; }); store.purchases=ps;
    const cr = store.customRecipes; cr.forEach(r=>r.ingredients.forEach(g=>{ if(g.name===i.key) g.name=val; })); store.customRecipes=cr;
    ['priceOverrides','shipOverrides','supplierOverrides'].forEach(k=>{ const o=store[k]; if(o[i.key]!=null){o[val]=o[i.key];delete o[i.key];store[k]=o;} });
  } else {
    const r = store.renames;
    if(val===i.key) delete r[i.key]; else r[i.key]=val;

  }

}
function ingEditSup(x,val){

    const rec = list.find(o=>o.name===i.key); if(rec){rec.supplier=val; store.customIngs=list;}
  } else {
    const o = store.supplierOverrides;

function setPrice(name,val){
  const o = store.priceOverrides;
  const key = keyOf(name);

  const v = parseFloat(val);
  if(isNaN(v) || (def!=null && Math.abs(v-def)<1e-9)) delete o[key]; else o[key]=v;
  store.priceOverrides = o; refresh();
}
function setShip(name,val){
  const o = store.shipOverrides;
  const key = keyOf(name);

}

let recFilter='';
function deletedSet(){ return new Set(store.deletedRecipes.map(d=>String(d.name).toLowerCase())); }
function allRecipes(){
  const del = deletedSet();
  const edits = store.recipeEdits;
  const base = DATA.recipes.map(r=> edits[r.name] ? {...edits[r.name], name:r.name, edited:true} : r);
  const own = [...base, ...store.customRecipes].filter(r=>!del.has(String(r.name).toLowerCase()));
  const ownNames = new Set(own.map(r=>r.name.toLowerCase()));
  const app = (window.APP_RECIPES||[]).filter(r=>!ownNames.has(r.name.toLowerCase()) && !del.has(r.name.toLowerCase()));

/* ===== recipes are shared with the whole app =====
   PUSH: every costing recipe (incl. pack sizes) is synced to the app's recipe store, so the
   Recipe Library, Edit Recipes, Mixing Sheets and Planner all see them. Costing is the source
   of truth for these — recipes created here appear everywhere.
   PULL: recipes made in the app (the fresh/cooked Ayr brands) appear here too, so they can be costed. */
function costingBrandOf(name){
  if(/^working dog/i.test(name)) return 'Working Dog Cold Pressed';
  if(/^wilsons/i.test(name)) return 'Premium Cold Pressed';
  const m=/^(Naked|Run|WILD)\b/i.exec(name);
  if(m) return m[1]+' (Cold Pressed)';
  return 'Cold Pressed';
}
/* ===== recipe folders: tidy the library into Wilsons (Cold Press / Fresh) and White Label
   (by customer). The folder for a recipe is worked out from its brand — nothing is invented. ===== */
let libPath=[];
function libBrandOf(r){
  if(r && r.brand) return r.brand;
  const m=/^(.+?)\s+—\s+/.exec((r&&r.name)||''); if(m) return m[1];   // app recipes are "Brand — Name"
  return costingBrandOf((r&&r.name)||'');
}
const LIB_GROUPS=[
  {id:'wilsons',name:'Wilsons',color:'#143644',subs:[
    {id:'coldpress',name:'Cold Press',color:'#143644',match:b=>/premium cold pressed|working dog cold pressed/i.test(b)},
    {id:'fresh',name:'Fresh',color:'#007985',match:b=>/^wilsons$/i.test(b)},
  ]},
  {id:'whitelabel',name:'White Label',color:'#7a3b8f',subs:[
    {id:'wild',name:'Wild',color:'#007985',match:b=>/wild/i.test(b)},
    {id:'nutriment',name:'Nutriment',color:'#7a3b8f',match:b=>/nutriment/i.test(b)},
    {id:'tuggs',name:'Tuggs',color:'#e2606c',match:b=>/tuggs/i.test(b)},
    {id:'greenpantry',name:'Green Pantry',color:'#3f7d3f',match:b=>/green pantry/i.test(b)},
    {id:'naked',name:'Naked',color:'#b7772a',match:b=>/naked/i.test(b)},
    {id:'run',name:'Run',color:'#5a6b74',match:b=>/\brun\b/i.test(b)},
    {id:'pah',name:'PAH',color:'#0072ce',match:b=>/pah|pets at home/i.test(b)},
  ]},
];
function libLocate(r){
  const b=libBrandOf(r);
  for(const g of LIB_GROUPS){ const s=g.subs.find(s=>s.match(b)); if(s) return {top:g.id,sub:s.id}; }
  return {top:'other',sub:'other'};
}
function libCount(topId,subId){ return allRecipes().filter(r=>{ const l=libLocate(r); return l.top===topId && (subId==null||l.sub===subId); }).length; }
function libGo(){ libPath=[].slice.call(arguments); recFilter=''; refresh(); }
function libUp(n){ libPath=libPath.slice(0,n); recFilter=''; refresh(); }
let _rsT=null;
function scheduleRecipeSync(){ if(!SHARED) return; clearTimeout(_rsT); _rsT=setTimeout(()=>syncRecipesToApp(false),1500); }
async function syncRecipesToApp(adopt){
  if(!SHARED) return;
  try{
    const del=deletedSet();
    const own=[...DATA.recipes.map(r=>findRecipe(r.name)||r), ...store.customRecipes].filter(r=>!del.has(String(r.name).toLowerCase()));
    const recipes=own.map(r=>({
      /* migrated app recipes carry their real app name + brand (e.g. appName "Chicken", brand "TUGGS")
         so they update the SAME recipe rows the app already had — plans and history stay linked */
      name:r.appName||r.name, brand:r.brand||costingBrandOf(r.name), batchSize:r.batchSize||1000,
      color:recipeColor(r),
      packs:(rcState(r.name).packs||[]).map(p=>+p.kg).filter(Boolean),
      ingredients:(r.ingredients||[]).map(i=>({name:dispName(i.name), kg:+i.kg||0})).filter(i=>i.name&&i.kg>0)
    }));
    const r=await fetch('/api/costing-recipe-sync',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+API_TOKEN},body:JSON.stringify(adopt?{recipes,adopt:true}:{recipes})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    /* tell the main app to refresh its Recipe Library / Mixing Sheets straight away (no browser reload) */
    try{ parent.postMessage({recipesSynced:true},'*'); }catch(err){}
  }catch(e){ console.warn('recipe sync to app failed:', e.message); }
}
/* ===== one-time migration: Recipe Costing becomes the ONLY place recipes are made =====
   Every recipe that was created by hand in the app (the fresh/cooked Ayr brands) is copied in here
   as an editable costing recipe named "Brand — Name" (brands share names like "Chicken", so the
   brand is part of the costing name). The app rows are then ADOPTED in place — same recipe, same
   history — and from then on this screen is their single home. No prices are invented: migrated
   ingredients arrive unpriced until someone enters real figures. */
async function migrateAppRecipes(){
  if(!SHARED || kvGet('wpf_appmigrated')) return;
  try{
    const [recipes,ings]=await Promise.all([
      fetch('/api/recipes',{headers:{Authorization:'Bearer '+API_TOKEN}}).then(r=>r.json()),
      fetch('/api/ingredients',{headers:{Authorization:'Bearer '+API_TOKEN}}).then(r=>r.json())
    ]);
    const iname={}; ings.forEach(i=>iname[i.id]=i.name);
    const incoming=recipes.filter(r=>r.source!=='costing');
    if(incoming.length){
      const customs=store.customRecipes, myIngs=store.customIngs, rc=store.recipeCosting;
      const haveIng=new Set(allIngs().map(o=>o.name.toLowerCase()));
      const haveDisp={}; allIngs().forEach(o=>{ haveDisp[dispName(o.name).toLowerCase()]=o.name; haveDisp[o.name.toLowerCase()]=o.name; });
      const haveRec=new Set(allRecipes().map(r=>r.name.toLowerCase()));
      incoming.forEach(r=>{
        const cname=((r.brand?r.brand+' — ':'')+r.name).trim();
        if(haveRec.has(cname.toLowerCase())) return;
        const lines=(r.ingredients||[]).map(g=>{
          const n=(iname[g.ingId]||String(g.ingId)).trim(); if(!n||!(+g.kg>0)) return null;
          const key=haveDisp[n.toLowerCase()];
          if(!key && !haveIng.has(n.toLowerCase())){
            /* unknown here — add it to the ingredient list UNPRICED so real prices can be entered */
            myIngs.push({name:n, supplier:'', custom:true, selPerTonne:null, selTransPerKg:null, djlPerTonne:null, djlPerKg:null, djlTransPerKg:null, monthlyUsageKg:null, spendMonth:null});
            haveIng.add(n.toLowerCase()); haveDisp[n.toLowerCase()]=n;
          }
          return {name:key||n, kg:+g.kg, perKg:0};
        }).filter(Boolean);
        if(!lines.length) return;
        const batch=lines.reduce((a,i)=>a+i.kg,0);
        customs.push({name:cname, appName:r.name, brand:r.brand||'', custom:{perKg:0}, batchSize:batch, wastePct:0.05, ingredients:lines});
        /* keep the pack sizes the app already had (e.g. "2kg", "380g") */
        let packs=[]; try{ packs=JSON.parse(JSON.stringify(r.packs||[])); }catch(e){}
        if(typeof packs==='string'){ try{ packs=JSON.parse(packs); }catch(e){ packs=[]; } }
        const pk=(Array.isArray(packs)?packs:[]).map((s,ix)=>{
          const m=/^([\d.]+)\s*(kg|g)$/i.exec(String(s).trim()); if(!m) return null;
          return {id:'mig'+ix+'_'+cname.replace(/\W+/g,'').slice(0,12), kg:m[2].toLowerCase()==='g'?+m[1]/1000:+m[1], items:[], sell:null};
        }).filter(Boolean);
        if(pk.length) rc[cname]={wastePct:0.05, packs:pk};
        haveRec.add(cname.toLowerCase());
      });
      store.customRecipes=customs; store.customIngs=myIngs; store.recipeCosting=rc;
    }
    kvSet('wpf_appmigrated','1');
    await syncRecipesToApp(true);   // take ownership of the app rows (in place — ids unchanged)
  }catch(e){ console.warn('recipe migration failed (will retry next open):', e.message); }
}
async function pullAppRecipes(){

      fetch('/api/ingredients',{headers:{Authorization:'Bearer '+API_TOKEN}}).then(r=>r.json())
    ]);
    const iname={}; ings.forEach(i=>iname[i.id]=i.name);

const LIB_RANGE_ORDER=['Initial recipes'];   // these ranges sort first; the rest follow alphabetically
function recipesView(){
  const searching = recFilter.trim()!=='';
  const cats=catList();
  const matchR = allRecipes().filter(r=>r.name.toLowerCase().includes(recFilter.toLowerCase()))
    .filter(r=>!recCatFilter || catOf(r.name)===recCatFilter);
  const top=libPath[0]||null, sub=libPath[1]||null, rng=libPath[2]||null;
  const g=LIB_GROUPS.find(x=>x.id===top); const s=g&&g.subs.find(x=>x.id===sub);
  // recipes within the current top (+sub) — used to spot ranges and to list a leaf
  const inGroup = !top ? [] : matchR.filter(r=>{ const l=libLocate(r); return l.top===top && (sub==null||l.sub===sub); });
  const ranges = (top && sub) ? [...new Set(inGroup.map(r=>r.range).filter(Boolean))]
    .sort((a,b)=>{ const ia=LIB_RANGE_ORDER.indexOf(a),ib=LIB_RANGE_ORDER.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib) || a.localeCompare(b); }) : [];
  let mode;
  if(searching) mode='search';
  else if(libPath.length===0) mode='top';
  else if(libPath.length===1 && top!=='other') mode='subs';
  else if(libPath.length===2 && ranges.length && !rng) mode='ranges';
  else mode='recipes';
  const showingRecipes = (mode==='search'||mode==='recipes');
  // breadcrumb
  let crumb;
  if(searching){ crumb=`<span class="libcrumb">Search results</span>`; }
  else{
    const gName=g?g.name:(top==='other'?'Other':top);
    const parts=[`<button class="libcrumb linky" onclick="libUp(0)">All recipes</button>`];
    if(top){ parts.push(`<span class="libsep">›</span>`, libPath.length>1?`<button class="libcrumb linky" onclick="libUp(1)">${esc(gName)}</button>`:`<span class="libcrumb">${esc(gName)}</span>`); }
    if(sub){ const sName=esc(s?s.name:sub); parts.push(`<span class="libsep">›</span>`, libPath.length>2?`<button class="libcrumb linky" onclick="libUp(2)">${sName}</button>`:`<span class="libcrumb">${sName}</span>`); }
    if(rng){ parts.push(`<span class="libsep">›</span>`, `<span class="libcrumb">${esc(rng==='__none__'?'Other':rng)}</span>`); }
    crumb=parts.join('');
  }
  // count shown only when we're actually listing recipes
  let leafList=inGroup; if(rng) leafList = rng==='__none__' ? leafList.filter(r=>!r.range) : leafList.filter(r=>r.range===rng);
  const shownCount = mode==='search'? matchR.length : (mode==='recipes'? leafList.length : 0);
  const toolbar=`
  <div class="toolbar">
    <input type="text" id="recSearch" placeholder="Search all recipes…" value="${esc(recFilter)}" oninput="recFilter=this.value;refresh()">
    ${showingRecipes?`<select onchange="recCatFilter=this.value;refresh()" title="Filter by category"><option value="">All categories</option>${cats.map(c=>`<option value="${esc(c.id)}"${recCatFilter===c.id?' selected':''}>${esc(c.name)}</option>`).join('')}</select>`:''}
    <button class="btn ghost" onclick="openCategoryManager()">⚙ Categories</button>
    <button class="btn accent" onclick="openBuilder()">+ New recipe</button>
  </div>
  <div class="libbar">${crumb}<span class="count" style="margin-left:auto">${showingRecipes?shownCount+' recipe'+(shownCount===1?'':'s'):''}</span></div>`;
  // body
  let body='';
  if(mode==='search'){
    body = matchR.length ? `<div class="grid">${matchR.map(recipeTileHTML).join('')}</div>`
                         : `<p class="muted" style="padding:20px">No recipes match “${esc(recFilter)}”.</p>`;
  } else if(mode==='top'){
    const tiles=LIB_GROUPS.map(gg=>folderTileHTML(gg.color,gg.name,gg.subs.map(x=>x.name).join(' · '),libCount(gg.id),`libGo('${gg.id}')`));
    const otherN=libCount('other'); if(otherN) tiles.push(folderTileHTML('#8a8175','Other',null,otherN,`libGo('other')`));
    body=`<div class="grid">${tiles.join('')}</div>`;
  } else if(mode==='subs'){
    body=`<div class="grid">${g.subs.map(x=>folderTileHTML(x.color||g.color,x.name,null,libCount(g.id,x.id),`libGo('${g.id}','${x.id}')`)).join('')}</div>`;
  } else if(mode==='ranges'){
    const color=(s&&s.color)||(g&&g.color)||'#143644';
    const tiles=ranges.map(rn=>folderTileHTML(color,rn,null,inGroup.filter(r=>r.range===rn).length,`libGo('${top}','${sub}','${String(rn).replace(/'/g,"\\'")}')`));
    const un=inGroup.filter(r=>!r.range).length;   // recipes that lost their range (e.g. edited on an older version) still appear here, never hidden
    if(un) tiles.push(folderTileHTML('#8a8175','Other',null,un,`libGo('${top}','${sub}','__none__')`));
    body=`<div class="grid">${tiles.join('')}</div>`;
  } else {
    body= leafList.length ? `<div class="grid">${leafList.map(recipeTileHTML).join('')}</div>`
                      : `<p class="muted" style="padding:20px">No recipes in this folder yet.</p>`;
  }
  const bin = (!searching && libPath.length===0) ? deletedRecipesView() : '';
  return toolbar+body+bin;
}

/* ---------- per-recipe pack costing: several pack sizes, each with its own costs ---------- */
function rcState(name){
  const all = store.recipeCosting;
  const st = all[name] || {};
  const rec = findRecipe(name);
  return {
    wastePct: st.wastePct!=null ? st.wastePct : (rec&&rec.wastePct!=null?rec.wastePct:0.05),
    packs: Array.isArray(st.packs)?st.packs:[]
  };
}
function rcSave(name, st){
  const all = store.recipeCosting; all[name]=st; store.recipeCosting=all; scheduleRecipeSync(); refresh();
}
function rcAddPack(){
  const st = rcState(lastArg);
  st.packs = [...st.packs, {id:'p'+Date.now(), kg:10, items:[], sell:null}];
  rcSave(lastArg, st);
}
function rcDelPack(pid){
  const st = rcState(lastArg);
  st.packs = st.packs.filter(p=>p.id!==pid);
  rcSave(lastArg, st);
}
function rcPack(pid){ return rcState(lastArg).packs.find(p=>p.id===pid); }
function rcPackSet(pid, field, val){
  const st = rcState(lastArg);
  const p = st.packs.find(x=>x.id===pid); if(!p) return;
  const v = parseFloat(val);
  if(field==='kg'){ p.kg = v>0?v:p.kg; } else { p[field] = isNaN(v)?null:v; }
  rcSave(lastArg, st);
}
function rcPackAddItem(pid, sel){
  if(!sel.value) return;
  const st = rcState(lastArg);
  const p = st.packs.find(x=>x.id===pid); if(!p) return;
  p.items = [...(p.items||[]), sel.value];
  rcSave(lastArg, st);
}
function rcPackDelItem(pid, itemId){
  const st = rcState(lastArg);
  const p = st.packs.find(x=>x.id===pid); if(!p) return;
  p.items = (p.items||[]).filter(x=>x!==itemId);
  rcSave(lastArg, st);
}
function packCostBox(r, perKg){
  const st = rcState(r.name);
  const items = store.costItems;
  const addable = items.filter(it=>!it.std);
  const rate = it => it.basis==='pct' ? it.cost.toFixed(1)+'%' : (it.basis==='kg' ? GBP(it.cost)+'/kg' : GBP2(it.cost)+'/pack');
  const packCards = st.packs.map(p=>{
    const t = packTotals(perKg, p);
    const lines = t.applied.map(a=>`<div class="row"><span>${esc(a.name)}${chTag(a.ch)} <span style="color:var(--capp);font-size:11px">${rate(a)}</span>${a.std?'':` <button class="btn small danger no-print" style="padding:0 6px;font-size:10px" onclick="rcPackDelItem('${p.id}','${a.id}')">✕</button>`}</span><b>${GBP2(a.v)}</b></div>`).join('');
    const opts = addable.filter(it=>!(p.items||[]).includes(it.id))
      .map(it=>`<option value="${it.id}">${esc(it.name)}${it.ch==='d2c'?' [D2C]':(it.ch==='trade'?' [Trade]':'')} — ${rate(it)}</option>`).join('');
    return `<div class="summary-box" style="margin-top:14px;background:var(--channel)">
      <h3 style="display:flex;align-items:center;gap:8px">Pack
        <input type="number" value="${p.kg}" step="0.5" style="width:70px" onchange="rcPackSet('${p.id}','kg',this.value)"> kg
        <button class="btn small danger no-print" style="margin-left:auto" onclick="rcDelPack('${p.id}')">Remove</button></h3>
      <div class="row"><span>Materials @ ${GBP(perKg)}/kg</span><b>${GBP2(t.mat)}</b></div>
      ${lines}

function setItemField(idx, field, val){
  const items = store.costItems;
  if(field==='cost'){ const v=parseFloat(val); if(isNaN(v)) return; items[idx].cost=v; }
  else if(field==='std'){ items[idx].std = val==='1'; }
  else items[idx][field]=val;
  store.costItems = items; refresh();
}
function addCostItem(){
  const name = document.getElementById('ciName').value.trim();
  const basis = document.getElementById('ciBasis').value;
  const cost = parseFloat(document.getElementById('ciCost').value);
  const std = document.getElementById('ciStd').value==='1';
  if(!name){alert('Please give the cost item a name.');return;}
  if(isNaN(cost)||cost<0){alert('Please enter a cost.');return;}
  const items = store.costItems;
  items.push({id:'ci'+Date.now(), name, basis, cost, std, ch:(document.getElementById('ciCh')||{}).value||'all'});
  store.costItems = items; refresh();
}
function delItem(idx){
  const items = store.costItems;
  if(!confirm('Delete "'+items[idx].name+'"? It will be removed from any recipes using it.')) return;
  const id = items[idx].id;
  items.splice(idx,1); store.costItems = items;
  const all = store.recipeCosting;
  for(const k in all){ if(Array.isArray(all[k].packs)) all[k].packs.forEach(p=>{ p.items=(p.items||[]).filter(x=>x!==id); }); }
  store.recipeCosting = all; refresh();
}
function resetItems(){ if(confirm('Reset all cost items to the spreadsheet defaults? Custom items will be removed.')){kvRemove('wpf_costitems');refresh();} }
function exportItems(){

}

/* Rename a supplier EVERYWHERE: supplier database, ingredient tab, purchase history */
function renameSupplier(oldName){
  const input = prompt('Rename supplier "'+oldName+'" to:', oldName);
  if(!input || !input.trim() || input.trim()===oldName) return;
  const newName = input.trim();
  const db = store.supplierDB;
  const clash = db.some(e=>e.supplier.toLowerCase()===newName.toLowerCase());
  if(clash && !confirm('"'+newName+'" already exists — merge "'+oldName+'" into it?')) return;
  /* supplier price database (dedupe on merge: keep the existing target supplier's entry) */
  const merged = [];
  db.forEach(e=>{
    if(e.supplier===oldName){
      if(clash && db.some(o=>o.supplier.toLowerCase()===newName.toLowerCase() && o.ing===e.ing)) return; // drop duplicate combo
      e.supplier = newName;
    }
    merged.push(e);
  });
  store.supplierDB = merged;
  /* ingredient tab: base spreadsheet suppliers via override map, plus existing overrides & custom ingredients */
  const so = store.supplierOverrides;
  DATA.ingredients.forEach(i=>{ if((so[i.name]!=null?so[i.name]:i.supplier)===oldName) so[i.name]=newName; });
  store.supplierOverrides = so;
  const ci = store.customIngs;
  ci.forEach(i=>{ if(i.supplier===oldName) i.supplier=newName; });
  store.customIngs = ci;
  /* purchase history */
  const ps = store.purchases;
  ps.forEach(p=>{ if(p.supplier===oldName) p.supplier=newName; });
  store.purchases = ps;
  refresh();
}
function supSet(x, field, val){
  const v = parseFloat(val); if(isNaN(v)||v<0) { refresh(); return; }
  const db = store.supplierDB;
  const e = db.find(o=>o.id===SUP_VIEW[x].id); if(!e){refresh();return;}
  e[field]=v; store.supplierDB=db; refresh();
}
function delSupEntry(x){
  const e = SUP_VIEW[x];
  if(!confirm('Remove '+e.supplier+' price for "'+e.ingDisp+'"?')) return;
  store.supplierDB = store.supplierDB.filter(o=>o.id!==e.id);
  refresh();
}
function addSupEntry(){
  const sup = document.getElementById('nsSup').value.trim();
  const ing = keyOf(document.getElementById('nsIng').value.trim());
  const perKg = parseFloat(document.getElementById('nsPrice').value);
  const del = parseFloat(document.getElementById('nsDel').value);
  if(!sup){alert('Please enter a supplier name.');return;}
  if(!ing){alert('Please enter an ingredient.');return;}
  if(isNaN(perKg)||perKg<0){alert('Please enter the £/kg price.');return;}
  const db = store.supplierDB;
  const e = db.find(o=>o.supplier.toLowerCase()===sup.toLowerCase() && o.ing===ing);
  if(e){ e.perKg=perKg; e.del=isNaN(del)?e.del:del; }
  else db.push({id:'s'+Date.now(), supplier:sup, ing, perKg, del:isNaN(del)?0:del});
  store.supplierDB = db; refresh();
}

    ...store.supplierDB.map(e=>[e.supplier,dispName(e.ing),e.perKg,e.del||0,(e.perKg+(e.del||0)).toFixed(4)])]);

/* Delete works the same for every recipe. It's reversible — the recipe drops into
   "Deleted recipes" at the bottom of the list and can be restored. */
function deleteRecipe(name){
  const r = findRecipe(name); if(!r) return;
  if(!confirm('Delete recipe "'+name+'"?\n\nIt will be removed from Recipe Costing and from the Recipe Library, Mixing Sheets and Production Planner everywhere in the app.\n\nYou can bring it back any time from "Deleted recipes" at the bottom of the recipe list.')) return;
  const isBuiltin = DATA.recipes.some(x=>x.name===name);
  const bin = store.deletedRecipes;
  bin.unshift({ name, kind:isBuiltin?'builtin':'custom', at:new Date().toISOString(),
    data: isBuiltin ? null : (store.customRecipes.find(x=>x.name===name)||null),
    edit: store.recipeEdits[name]||null,
    packs: store.recipeCosting[name]||null,
    color: store.tileColors[name]||null });
  store.deletedRecipes = bin;
  if(!isBuiltin) store.customRecipes = store.customRecipes.filter(x=>x.name!==name);
  const e=store.recipeEdits; if(e[name]!==undefined){ delete e[name]; store.recipeEdits=e; }
  const rc=store.recipeCosting; if(rc[name]!==undefined){ delete rc[name]; store.recipeCosting=rc; }
  const tc=store.tileColors; if(tc[name]!==undefined){ delete tc[name]; store.tileColors=tc; }
  show('recipes');
 scheduleRecipeSync(); }
function restoreRecipe(name){
  const bin = store.deletedRecipes;
  const ix = bin.findIndex(d=>d.name===name); if(ix<0) return;
  const d = bin[ix];
  if(d.kind==='custom' && d.data){ const list=store.customRecipes.filter(x=>x.name!==name); list.push(d.data); store.customRecipes=list; }
  if(d.edit){ const e=store.recipeEdits; e[name]=d.edit; store.recipeEdits=e; }
  if(d.packs){ const rc=store.recipeCosting; rc[name]=d.packs; store.recipeCosting=rc; }
  if(d.color){ const tc=store.tileColors; tc[name]=d.color; store.tileColors=tc; }
  bin.splice(ix,1); store.deletedRecipes = bin;
  show('recipeDetail', name);
 scheduleRecipeSync(); }
function exportRecipe(name){
  const r = findRecipe(name);
  const priced = r.ingredients.map(i=>{
    const fb = r.custom ? i.perKg : (i.howPerKg ?? i.djlPerKg ?? 0);
    return {name:i.name, kg:i.kg, std:linePrice(i.name,fb,'std').p, act:linePrice(i.name,fb,'act').p};
  });
  const subS = priced.reduce((a,i)=>a+i.kg*(i.std||0),0);
  const subA = priced.reduce((a,i)=>a+i.kg*(i.act||0),0);
  downloadCSV(name.replace(/[^\w]+/g,'-')+'.csv',[['Ingredient','Weight kg','Standard £/kg delivered','Standard £/batch','Actual £/kg delivered','Actual £/batch'],
    ...priced.map(i=>[dispName(i.name),i.kg,i.std,(i.kg*(i.std||0)).toFixed(2),i.act,(i.kg*(i.act||0)).toFixed(2)]),
    [],['Materials / batch','','',subS.toFixed(2),'',subA.toFixed(2)],
    ['Batch kg','',r.batchSize],
    ['Materials / kg (waste applied in pack costing)','','',(subS/r.batchSize).toFixed(4),'',(subA/r.batchSize).toFixed(4)]]);
}

    <input type="text" placeholder="Recipe name…" value="${esc(draft.name)}" style="min-width:300px;font-weight:600" onchange="draft.name=this.value;builderDirty=true">
    <label class="muted">Brand <input type="text" list="brandList" placeholder="e.g. TUGGS" value="${esc(draft.brand||'')}" style="width:180px;padding:8px;border:1px solid var(--line);border-radius:8px" onchange="draft.brand=this.value.trim();builderDirty=true" title="Which brand (and so which factory) this recipe belongs to — cold-pressed brands go to Blair, everything else to Ayr"></label>
    <datalist id="brandList">${[...new Set([...Object.keys(BRANDHEX),...allRecipes().map(r=>r.brand||costingBrandOf(r.name))])].filter(Boolean).map(b=>`<option value="${esc(b)}">`).join('')}</datalist>
    <label class="muted">Category <select onchange="draft.categoryId=this.value;builderDirty=true" style="padding:8px;border:1px solid var(--line);border-radius:8px" title="Which product category this recipe is">
      ${catList().map(c=>`<option value="${esc(c.id)}"${draft.categoryId===c.id?' selected':''}>${esc(c.name)}</option>`).join('')}
    </select></label>
    <label class="muted">Batch size (kg) <input type="number" style="width:90px;padding:8px;border:1px solid var(--line);border-radius:8px" value="${draft.batchSize}" oninput="draft.batchSize=parseFloat(this.value)||1000;builderDirty=true;recalcBuilder()"></label>
    <select onchange="if(this.value){openBuilder(this.value)}" class="no-print">
      <option value="">Start from existing recipe…</option>
      ${allRecipes().map(r=>`<option value="${esc(r.name)}">${esc(r.name)}</option>`).join('')}
    </select>
  </div>
  <div class="two-col">
    <div>
      <div class="card"><table class="builder-table">
        <thead><tr><th>Ingredient</th><th class="num">Weight (kg)</th><th class="num">% of mix</th><th class="num">£ / kg</th><th class="num">£ / batch</th><th class="no-print"></th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr class="totrow"><td><b>Total</b></td><td class="num"><b id="bTotKg">${NUM(totKg)} kg</b></td><td class="num"><b>${totKg>0?'100%':'—'}</b></td><td></td><td class="num"><b id="bTotBatch">${GBP2(sub)}</b></td><td class="no-print"></td></tr></tfoot>
      </table></div>
      <button class="btn" style="margin-top:10px" onclick="draft.ingredients.push({name:'',kg:0,perKg:0});builderDirty=true;refresh()">+ Add ingredient</button>
      <p class="muted" style="margin-top:8px" id="bMismatch">Pick an ingredient to auto-fill its price — the actual (average of logged purchases) where available, otherwise the target cost (editable per line). Ingredient weights total <b>${NUM(totKg)} kg</b> vs batch size ${NUM(draft.batchSize)} kg${Math.abs(totKg-draft.batchSize)>0.01?' <span style="color:var(--warn)">⚠ mismatch</span>':' ✓'}.</p>
    </div>
    <div class="summary-box">
      <h3>Live costing</h3>
      <div class="row"><span>Materials / batch</span><b id="bSumBatch">${GBP2(sub)}</b></div>
      <div class="row"><span>Ingredient weight</span><b id="bSumWeight">${NUM(totKg)} kg</b></div>
      <div class="row total"><span>Materials / kg</span><b id="bSumPerKg">${GBP(per)}</b></div>
      <p class="muted" style="color:var(--capp);margin-top:8px">Waste, labour, overheads, electric &amp; packaging are added in the recipe's pack costing.</p>
    </div>
  </div>`;
}
function fmtPct(n){ return (Math.round(n*10)/10)+'%'; }
/* commit weight / £-per-kg live, WITHOUT rebuilding the table — keeps focus and means the
   Save button never gets replaced mid-click (that was the "press Save twice" bug). */
function draftIng(idx, field, val){
  const it = draft.ingredients[idx];
  it[field] = parseFloat(val)||0;
  if(field==='perKg') it._priceEdited=true;   // user typed a price → propagate it to the ingredient on save
  builderDirty=true;
  recalcBuilder();
}
function draftIngName(idx, val, commit){
  const it = draft.ingredients[idx]; it.name = val; builderDirty=true;
  if(commit){
    const p = ingPrice(val);
    if(p!=null){ it.perKg = p;
      const inp = document.querySelector(`.builder-table tr[data-r="${idx}"] input[type=number][step="0.001"]`);
      if(inp) inp.value = (+p).toFixed(3);
    }
  }
  recalcBuilder();
}
function delDraftRow(idx){ draft.ingredients.splice(idx,1); builderDirty=true; refresh(); }
function recalcBuilder(){
  if(!draft) return;
  const totKg = draft.ingredients.reduce((a,i)=>a+(i.kg||0),0);
  const sub = draft.ingredients.reduce((a,i)=>a+(i.kg||0)*(i.perKg||0),0);
  const per = draft.batchSize>0 ? sub/draft.batchSize : 0;
  draft.ingredients.forEach((i,idx)=>{
    const pc=document.querySelector(`.pctcell[data-pct="${idx}"]`); if(pc) pc.textContent = totKg>0?fmtPct((i.kg||0)/totKg*100):'—';
    const bt=document.querySelector(`.btcell[data-bt="${idx}"]`); if(bt) bt.innerHTML = '<b>'+GBP2((i.kg||0)*(i.perKg||0))+'</b>';
  });
  const set=(id,html)=>{ const el=document.getElementById(id); if(el) el.innerHTML=html; };
  set('bTotKg', '<b>'+NUM(totKg)+' kg</b>'); set('bTotBatch', '<b>'+GBP2(sub)+'</b>');
  set('bSumBatch', GBP2(sub)); set('bSumWeight', NUM(totKg)+' kg'); set('bSumPerKg', GBP(per));
  const mm=document.getElementById('bMismatch');
  if(mm) mm.innerHTML = `Pick an ingredient to auto-fill its price — the actual (average of logged purchases) where available, otherwise the target cost (editable per line). Ingredient weights total <b>${NUM(totKg)} kg</b> vs batch size ${NUM(draft.batchSize)} kg${Math.abs(totKg-draft.batchSize)>0.01?' <span style="color:var(--warn)">⚠ mismatch</span>':' ✓'}.`;
}
function saveDraft(){
  if(!draft.name.trim()){alert('Please give the recipe a name.');return;}
  const newName = draft.name.trim();
  const wasCustom = !!draft.editing && store.customRecipes.some(r=>r.name===draft.editing);
  const wasStock  = !!draft.editing && DATA.recipes.some(r=>r.name===draft.editing);
  if(allRecipes().some(r=>r.name===newName && r.name!==draft.editing)){alert('A recipe with that name already exists — please choose another name.');return;}
  const ings = draft.ingredients.filter(i=>i.name && i.kg>0);
  if(!ings.length){alert('Add at least one ingredient with a weight.');return;}
  const sub = ings.reduce((a,i)=>a+i.kg*i.perKg,0);
  const rec = {name:newName, custom:{perKg: sub/(draft.batchSize||1000)},
    brand:(draft.brand||'').trim(), appName:draft.appName||undefined, range:draft.range||undefined,
    batchSize:draft.batchSize||1000, wastePct:draft.wastePct??0.05,
    ingredients:ings.map(i=>({name:keyOf(i.name),kg:i.kg,perKg:i.perKg}))};
  if(wasStock && newName===draft.editing){
    /* editing a spreadsheet recipe in place — saved as an override, can be reverted */
    const e = store.recipeEdits; e[newName]=rec; store.recipeEdits=e;
  } else {
    let list = wasCustom ? store.customRecipes.filter(r=>r.name!==draft.editing) : store.customRecipes;
    list = [...list, rec]; store.customRecipes = list;
    if(wasCustom && newName!==draft.editing){
      /* carry pack costing + tile colour over to the new name */
      const rc = store.recipeCosting; if(rc[draft.editing]){rc[newName]=rc[draft.editing]; delete rc[draft.editing]; store.recipeCosting=rc;}
      const tc = store.tileColors; if(tc[draft.editing]){tc[newName]=tc[draft.editing]; delete tc[draft.editing]; store.tileColors=tc;}
    }
  }
  // remember the category against this recipe (and carry it if the recipe was renamed)
  { const m=store.recipeCategory; if(draft.categoryId) m[newName]=draft.categoryId;
    if(draft.editing && draft.editing!==newName && m[draft.editing]){ delete m[draft.editing]; } store.recipeCategory=m; }
  // a price typed against an ingredient becomes that ingredient's STANDARD price — it shows in the
  // Ingredients tab and flows into every recipe that uses it (not just this one)
  { const po=store.priceOverrides; let changed=false;
    ings.forEach(i=>{ if(!i._priceEdited) return; const p=+i.perKg; if(p>0){ const k=keyOf(i.name); if(po[k]!==p){ po[k]=p; changed=true; } } });
    if(changed) store.priceOverrides=po; }
  draft=null; builderDirty=false;
  scheduleRecipeSync();
  show('recipeDetail', newName);
}

function refresh(){
  const ae = document.activeElement;
  const focusId = ae && ae.id ? ae.id : null;
  const selStart = focusId && ae.selectionStart!=null ? ae.selectionStart : null;
  if(view==='builder'){ document.getElementById('main').innerHTML = builderView(); }
  else show(view);
  if(focusId){
    const el = document.getElementById(focusId);
    if(el){ el.focus(); if(selStart!=null){try{el.setSelectionRange(selStart,selStart)}catch(e){}} }
  }
}
(async function boot(){
  if(SHARED){
    /* shared mode: the ONE backup lives on the app's main ⤓ Backup button (it includes costing),
       so the per-computer Save/Load buttons are hidden to avoid two backup systems */
    document.querySelectorAll('.databtn').forEach(b=>b.style.display='none');
    try{ const r=await kvApi('GET'); KV=r.data||{}; }
    catch(e){ document.getElementById('main').innerHTML='<div style="padding:40px;text-align:center;color:#4b5f6d"><h2 style="color:#143644">Could not load the shared costing data</h2><p>Check the connection and reload this page. Nothing has been lost.</p></div>'; return; }
    startPolling(); setSyncState('saved','● Shared');
    await migrateAppRecipes();   // one-time: app-made recipes move in here for good
    await pullAppRecipes();      // safety net for any recipe rows costing doesn't own
    scheduleRecipeSync();        // costing recipes appear everywhere in the app
  }
  /* the app's Recipe Library can ask us to open a specific recipe ("Edit in Recipe Costing") */
  window.addEventListener('message',e=>{
    const d=e.data;
    if(d && d.openRecipe){
      const n=findRecipe(d.openRecipe)?d.openRecipe:(allRecipes().find(r=>r.name.toLowerCase()===String(d.openRecipe).toLowerCase())||{}).name;
      if(n) show('recipeDetail', n); else show('recipes');
      try{ parent.postMessage({openedRecipe:d.openRecipe},'*'); }catch(err){}
    }
  });
  show('products');
})();
</script>
